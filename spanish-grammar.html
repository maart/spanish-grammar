      <div class="table-source-links">
        <a href="https://www.rae.es/buen-uso-espa%C3%B1ol/conjugaci%C3%B3n-espa%C3%B1ola" target="_blank" rel="noreferrer">RAE: Conjugación española</a>
        <a href="https://www.rae.es/gtg/tiempo" target="_blank" rel="noreferrer">RAE: время и система форм</a>
        <a href="https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/niveles/02_gramatica_inventario_b1-b2.htm" target="_blank" rel="noreferrer">Instituto Cervantes: B1–B2</a>
      </div>
    </details>
    <div class="filter-tabs" aria-label="Фильтр времен">
      ${Object.entries(TENSE_FILTERS).map(([key, filter]) => `
        <button class="small-button ${state.tenseFilter === key ? "is-active" : ""}" type="button" data-tense-filter="${key}" aria-pressed="${state.tenseFilter === key}">
          ${filter.label}<span class="filter-count">${filter.ids.length}</span>
        </button>
      `).join("")}
    </div>
    <p class="muted">${activeFilter.description}</p>
    <button class="small-button tense-toc-toggle" type="button" data-toggle-tense-toc aria-controls="tenseToc" aria-expanded="${state.showTenseToc}">
      ${state.showTenseToc ? "▲ Скрыть оглавление" : `▼ Показать оглавление (${visibleGroups.reduce((total, group) => total + group.visibleIds.length, 0)})`}
    </button>
    ${state.showTenseToc ? `
    <div class="quick-nav" id="tenseToc" aria-label="Оглавление времен">
      ${visibleGroups.map((group) => `
        <div class="tense-group">
          <div class="tense-group-title">${group.title}</div>
          <div class="tense-group-links">
            ${group.visibleIds.map((id) => {
              const tense = tenseById(id);
              const badge = tenseBadge(id);
              return `
                <button class="small-button term-button tense-nav-button ${badge.kind === "rare" ? "is-rare" : ""}" type="button" data-jump="${id}">
                  <span class="tense-nav-main">
                    <span>${TENSE_NAV_LABELS[id] || tense.name}</span>
                    <small>${tense.ru}</small>
                  </span>
                  ${badgeMarkup(id)}
                </button>
              `;
            }).join("")}
          </div>
        </div>
      `).join("")}
    </div>
    ` : ""}
  `});
  content.appendChild(nav);
  bindClickAll(nav, "[data-toggle-tense-toc]", () => {
    state.showTenseToc = !state.showTenseToc;
    renderTenses();
    scrollToCard("tensesTop");
  });
  bindClickAll(nav, "[data-tense-filter]", (event) => {
    const button = event.currentTarget;
    state.tenseFilter = button.dataset.tenseFilter;
    localStorage.setItem("msg:tenseFilter", state.tenseFilter);
    renderTenses();
    scrollToCard("tensesTop");
  });
  bindClickAll(nav, "[data-jump]", (event) => {
    state.focusedTense = event.currentTarget.dataset.jump;
    state.returnMood = null;
    state.openMoreExamplesTense = null;
    renderTenses();
    updateRouteHash(`tense-${state.focusedTense}`);
    scrollToCard(`tense-${state.focusedTense}`);
  });

  visibleGroups.forEach((group) => {
    content.appendChild(groupHeading(group.title, group.description));

    group.visibleIds.map(tenseById).forEach((tense) => {
      const section = renderTenseCard(tense);
      content.appendChild(section);
    });
  });
}

function visibleTenseGroups() {
  return TENSE_GROUPS
    .map((group) => ({ ...group, visibleIds: filteredTenseIds(group.tenseIds) }))
    .filter((group) => group.visibleIds.length > 0);
}

function renderTenseCard(tense) {
  const mobileOpen = state.focusedTense === tense.id || state.openMobileTense === tense.id;
  const section = infoSection({ id: `tense-${tense.id}`, className: `info-card tense-card ${mobileOpen ? "is-mobile-open" : ""}` });
  const formationOpen = state.openFormationTense === tense.id;
  const signalsOpen = state.openSignalsTense === tense.id;
  const exceptionsOpen = state.openExceptionTense === tense.id;
  section.innerHTML = `
    <div class="tense-card-head">
      <div>
        <div class="tense-title-row">
          <h2 lang="es">${tense.name}</h2>
          ${badgeMarkup(tense.id)}
        </div>
        <p class="muted">${tense.ru} · ${tense.mood}</p>
      </div>
      <button class="chip formula-button" type="button" data-formation="${tense.id}" aria-expanded="${formationOpen}" title="Показать образование времени">
        ${formatFormula(tense.formula || "окончания по типу глагола")}
      </button>
    </div>
    <p>${tense.use}</p>
    ${tenseExamplesMarkup(tense.id)}
    ${state.focusedTense === tense.id ? "" : `<button class="small-button tense-card-mobile-toggle ${mobileOpen ? "danger" : "success"}" type="button" data-mobile-tense="${tense.id}" aria-expanded="${mobileOpen}">
      ${mobileOpen ? "Скрыть детали" : "Показать детали"}
    </button>`}
    <div class="tense-actions is-compact">
      ${disclosureButton({ open: formationOpen, target: tense.id, label: "Образование", hideLabel: "Скрыть образование", action: "formation" })}
      ${disclosureButton({ open: signalsOpen, target: tense.id, label: "Признаки", hideLabel: "Скрыть признаки", action: "signals" })}
      ${disclosureButton({ open: exceptionsOpen, target: tense.id, label: "Исключения", hideLabel: "Скрыть исключения", action: "exceptions" })}
    </div>
  `;
  bindClickAll(section, "[data-mobile-tense]", () => {
    const closing = state.openMobileTense === tense.id;
    state.openMobileTense = closing ? null : tense.id;
    state.openFormationTense = null;
    state.openSignalsTense = null;
    state.openExceptionTense = null;
    state.openMoreExamplesTense = null;
    renderTenses();
    scrollToCard(`tense-${tense.id}`);
  });
  bindClickAll(section, "[data-formation]", () => {
    state.openFormationTense = state.openFormationTense === tense.id ? null : tense.id;
    renderTenses();
    scrollToCard(`tense-${tense.id}`);
  });
  section.querySelector("[data-signals]").addEventListener("click", () => {
    state.openSignalsTense = state.openSignalsTense === tense.id ? null : tense.id;
    renderTenses();
    scrollToCard(`tense-${tense.id}`);
  });
  section.querySelector("[data-exceptions]").addEventListener("click", () => {
    state.openExceptionTense = state.openExceptionTense === tense.id ? null : tense.id;
    renderTenses();
    scrollToCard(`tense-${tense.id}`);
  });
  section.querySelector("[data-tense-examples]")?.addEventListener("click", () => {
    state.openMoreExamplesTense = state.openMoreExamplesTense === tense.id ? null : tense.id;
    renderTenses();
    scrollToCard(`tense-${tense.id}`);
  });
  if (formationOpen) {
    section.insertAdjacentHTML("beforeend", `<div class="tense-detail-block">${formationTable(tense)}</div>`);
  }
  if (signalsOpen) {
    section.appendChild(renderTenseSignals(tense));
  }
  if (exceptionsOpen) {
    section.appendChild(renderTenseExceptions(tense.id));
  }
  return section;
}

function filteredTenseIds(ids) {
  const filter = TENSE_FILTERS[state.tenseFilter] || TENSE_FILTERS.basic;
  return ids.filter((id) => filter.ids.includes(id));
}

function tenseExamplesMarkup(id) {
  const examples = TENSE_EXAMPLES[id] || [];
  if (examples.length === 0) return "";
  const expanded = state.openMoreExamplesTense === id;
  const visibleExamples = expanded ? examples : examples.slice(0, 1);
  return `<div class="example-grid ${expanded ? "is-expanded" : ""}">
    ${visibleExamples.map(([es, ru, context]) => `<div class="example-card">
      ${context ? `<small class="example-context">${context}</small>` : ""}
      <strong lang="es">${es}</strong>
      <span>${ru}</span>
    </div>`).join("")}
  </div>
  ${examples.length > 1 ? `<button class="small-button example-more-button" type="button" data-tense-examples="${id}" aria-expanded="${expanded}">
    ${expanded ? "Скрыть остальные примеры" : `Показать остальные примеры (${examples.length - 1})`}
  </button>` : ""}`;
}

function tenseBadge(id) {
  const [label, kind] = TENSE_BADGES[id] || ["справка", "compound"];
  return { label, kind };
}

function badgeMarkup(id) {
  const badge = tenseBadge(id);
  return `<span class="tense-badge ${badge.kind}">${badge.label}</span>`;
}

function scrollToCard(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
}

function formationTable(tense) {
  if (tense.endings) {
    return endingsTable(tense);
  }
  if (COMPOUND_TENSE_AUX[tense.id]) {
    return compoundPatternTable(COMPOUND_TENSE_AUX[tense.id]);
  }
  if (tense.id === "imperativo_afirmativo") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>Схема</th><th>Пример</th></tr></thead><tbody>
      <tr><td>tú</td><td>обычно 3-е лицо presente</td><td>habla, come, vive</td></tr>
      <tr><td>usted</td><td>${formatFormula("presente de subjuntivo")}</td><td>hable, coma, viva</td></tr>
      <tr><td>nosotros</td><td>${formatFormula("presente de subjuntivo")} с побудительным значением</td><td>hablemos, comamos, vivamos</td></tr>
      <tr><td>vosotros</td><td>${grammarSlot("infinitivo")} без -r + d</td><td>hablad, comed, vivid</td></tr>
      <tr><td>ustedes</td><td>${formatFormula("presente de subjuntivo")}</td><td>hablen, coman, vivan</td></tr>
    </tbody></table></div>`;
  }
  if (tense.id === "imperativo_negativo") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>Схема</th><th>Пример</th></tr></thead><tbody>
      <tr><td>tú</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hables</td></tr>
      <tr><td>usted</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hable</td></tr>
      <tr><td>nosotros</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hablemos</td></tr>
      <tr><td>vosotros</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no habléis</td></tr>
      <tr><td>ustedes</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hablen</td></tr>
    </tbody></table></div>`;
  }
  if (tense.id === "formas_no_personales") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>-ar</th><th>-er</th><th>-ir</th></tr></thead><tbody>
      <tr><td>Infinitivo</td><td>hablar</td><td>comer</td><td>vivir</td></tr>
      <tr><td>Gerundio</td><td>-ando</td><td>-iendo</td><td>-iendo</td></tr>
      <tr><td>Participio</td><td>-ado</td><td>-ido</td><td>-ido</td></tr>
      <tr><td>Infinitivo compuesto</td><td colspan="3">haber + ${grammarSlot("participio")}: haber hablado</td></tr>
      <tr><td>Gerundio compuesto</td><td colspan="3">habiendo + ${grammarSlot("participio")}: habiendo hablado</td></tr>
    </tbody></table></div>`;
  }
  return `<p class="muted">Схема образования будет добавлена.</p>`;
}

function compoundPatternTable(auxKey) {
  const alternatives = HABER_FORM_ALTERNATIVES[auxKey];
  return `<div class="table-wrap"><table><thead><tr><th>Лицо</th><th>Схема</th></tr></thead><tbody>
    ${PEOPLE.map((person, index) => {
      const auxiliary = alternatives
        ? `${HABER_FORMS[auxKey][index]} / ${alternatives[index]}`
        : HABER_FORMS[auxKey][index];
      return `<tr><th>${person}</th><td>${auxiliary} + ${grammarSlot("participio")}</td></tr>`;
    }).join("")}
  </tbody></table></div>`;
}

function endingsTable(tense) {
  const endingRows = tense.endingVariants || Object.entries(tense.endings);
  const rows = endingRows.map(([type, endings]) => {
    const label = tense.endingVariants
      ? type
      : (type === "all" ? grammarSlot("infinitivo") : `-${type}`);
    return `<tr><th>${label}</th>${endings.map((ending) => `<td>${formatEnding(ending)}</td>`).join("")}</tr>`;
  }).join("");
  return `${tense.formationNote ? `<p class="muted">${tense.formationNote}</p>` : ""}<div class="table-wrap"><table><thead><tr><th>Тип</th>${PEOPLE.map((person) => `<th>${person}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function formatEnding(ending) {
  if (ending === "-") return ending;
  return ending.startsWith("-") ? ending : `-${ending}`;
}

function grammarSlot(label) {
  return `<span class="grammar-slot">${label}</span>`;
}

function formatFormula(value) {
  return value.replace(/participio|infinitivo|gerundio|subjuntivo/g, (match) => grammarSlot(match));
}

function renderTables() {
  const content = clearContent();
  const focusedTable = Number.isInteger(state.focusedTable) ? INDEXED_TABLES[state.focusedTable] : null;

  if (focusedTable) {
    const groupTables = INDEXED_TABLES.filter((item) => item.group === focusedTable.group);
    const position = groupTables.findIndex((item) => item.index === focusedTable.index);
    const previous = position > 0 ? groupTables[position - 1] : null;
    const next = position < groupTables.length - 1 ? groupTables[position + 1] : null;
    const toolbar = infoSection({
      id: "tablesTop",
      html: `
        <div class="focused-table-toolbar">
          <div class="focused-table-actions">
            <button class="small-button primary" type="button" data-table-back>← К оглавлению</button>
            <span class="focused-table-status">${position + 1} из ${groupTables.length} в разделе</span>
          </div>
          <div class="focused-table-paging" aria-label="Навигация между шпаргалками">
            <button class="small-button" type="button" data-table-previous="${previous?.index ?? ""}" ${previous ? `aria-label="Предыдущая шпаргалка: ${escapeHTML(previous.title)}"` : "disabled"}>← Ранее</button>
            <button class="small-button" type="button" data-table-next="${next?.index ?? ""}" ${next ? `aria-label="Следующая шпаргалка: ${escapeHTML(next.title)}"` : "disabled"}>Далее →</button>
          </div>
        </div>
      `
    });
    content.appendChild(toolbar);
    content.appendChild(renderUsefulTableCard(focusedTable));
    bindClickAll(toolbar, "[data-table-back]", () => {
      state.focusedTable = null;
      renderTables();
      updateRouteHash("tables");
      scrollToCard("tablesTop");
    });
    bindClickAll(toolbar, "[data-table-previous]", (event) => {
      openTableByIndex(Number(event.currentTarget.dataset.tablePrevious));
    });
    bindClickAll(toolbar, "[data-table-next]", (event) => {
      openTableByIndex(Number(event.currentTarget.dataset.tableNext));
    });
    return;
  }

  const visibleTables = INDEXED_TABLES.filter((item) => tableMatchesFilter(item));
  const subgroups = getSubgroupsForFilter(state.tableFilter);
  const nav = infoSection({
    id: "tablesTop",
    html: `
    <h2>Шпаргалки</h2>
    <p class="muted">Выбери раздел, затем открой нужную шпаргалку. На экране будет показан только один материал.</p>
    <details class="table-sources">
      <summary>Нормативные источники</summary>
      <div class="table-source-links">
        <a href="https://www.rae.es/gram%C3%A1tica-b%C3%A1sica" target="_blank" rel="noreferrer">RAE: Nueva gramática básica</a>
        <a href="https://www.rae.es/dpd/" target="_blank" rel="noreferrer">RAE: Diccionario panhispánico de dudas</a>
        <a href="https://www.rae.es/ortograf%C3%ADa/" target="_blank" rel="noreferrer">RAE: Ortografía</a>
        <a href="https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/indice.htm" target="_blank" rel="noreferrer">Instituto Cervantes: Plan curricular</a>
      </div>
    </details>
    <div class="table-filter-controls">
      <label class="table-filter-control">
        <span>Раздел</span>
        <select data-table-filter aria-label="Раздел шпаргалок">
          ${TABLE_FILTERS.map((filter) => `<option value="${filter.id}" ${state.tableFilter === filter.id ? "selected" : ""}>${filter.label} · ${TABLE_FILTER_COUNTS[filter.id]}</option>`).join("")}
        </select>
      </label>
      ${subgroups.length > 1 ? `
        <label class="table-filter-control">
          <span>Тема</span>
          <select data-table-subgroup aria-label="Тема шпаргалок">
            <option value="">Все темы · ${visibleTables.length}</option>
            ${subgroups.map((subgroup) => `<option value="${escapeHTML(subgroup)}" ${state.tableSubgroup === subgroup ? "selected" : ""}>${subgroup} · ${countSubgroupTables(state.tableFilter, subgroup)}</option>`).join("")}
          </select>
        </label>
      ` : ""}
    </div>
  `});
  content.appendChild(nav);
  nav.querySelector("[data-table-filter]")?.addEventListener("change", (event) => {
    state.tableFilter = event.currentTarget.value;
    state.tableSubgroup = "";
    localStorage.setItem("msg:tableFilter", state.tableFilter);
    localStorage.setItem("msg:tableSubgroup", state.tableSubgroup);
    renderTables();
  });
  nav.querySelector("[data-table-subgroup]")?.addEventListener("change", (event) => {
    state.tableSubgroup = event.currentTarget.value;
    localStorage.setItem("msg:tableSubgroup", state.tableSubgroup);
    renderTables();
  });

  const catalog = document.createElement("div");
  catalog.className = "table-catalog";
  catalog.setAttribute("aria-label", "Оглавление шпаргалок");
  TABLE_GROUPS.forEach((group) => {
    const groupTables = visibleTables.filter((item) => item.group === group.title);
    if (groupTables.length === 0) return;
    const section = infoSection({
      className: "info-card table-catalog-group",
      html: `
        <header>
          <h2>${group.title} <span class="filter-count">${groupTables.length}</span></h2>
          <p class="muted">${group.description}</p>
        </header>
        <div class="table-catalog-links">
          ${groupTables.map((item) => `
            <button class="table-catalog-link" type="button" data-table-open="${item.index}">
              <span>${item.title}</span>
              <small>${item.subgroup ? `<strong>${item.subgroup}.</strong> ` : ""}${item.summary || tableSummary(item)}</small>
            </button>
          `).join("")}
        </div>
      `
    });
    catalog.appendChild(section);
  });
  content.appendChild(catalog);
  bindClickAll(catalog, "[data-table-open]", (event) => {
    openTableByIndex(Number(event.currentTarget.dataset.tableOpen));
  });
}

function renderUsefulTableCard(item) {
  const index = item.index;
  const summary = item.summary || tableSummary(item);
  const mistake = item.mistake || tableMistake(item);
  const related = item.related ? relatedTablesMarkup(item.related) : "";
  const section = infoSection({
    id: `table-${index}`,
    className: "info-card table-card is-open",
    html: `
      <p class="table-context">${item.group}${item.subgroup ? ` · ${item.subgroup}` : ""}</p>
      <h2>${item.title}</h2>
      <p class="muted">${item.description}</p>
      <div class="table-summary"><strong>Главное:</strong> ${summary}</div>
      <div class="table-wrap">${LINKED_TABLE_HTML[index]}</div>
      ${mistake ? `<div class="table-mistake"><strong>Типичная ошибка:</strong> ${mistake}</div>` : ""}
      ${related}
    `
  });
  bindClickAll(section, "[data-open-tense]", (event) => {
    openTenseFromVerb(event.currentTarget.dataset.openTense);
  });
  bindClickAll(section, "[data-table-jump-related]", (event) => {
    openTableFromLink(event.currentTarget.dataset.tableJumpRelated);
  });
  return section;
}

function openTableFromLink(targetId) {
  const match = /^table-(\d+)$/.exec(targetId);
  if (!match) return;
  openTableByIndex(Number(match[1]));
}

function openTableByIndex(index, { updateRoute = true } = {}) {
  const item = INDEXED_TABLES[index];
  if (!item) return;
  state.focusedTable = index;
  renderTables();
  if (updateRoute) updateRouteHash(`table-${index}`);
  requestAnimationFrame(() => scrollToCard("tablesTop"));
}

function relatedTablesMarkup(indices) {
  const items = indices.map((i) => INDEXED_TABLES[i]).filter(Boolean);
  if (items.length === 0) return "";
  return `
    <div class="table-related">
      <strong>Связанные шпаргалки:</strong>
      <div class="table-related-links">
        ${items.map((item) => `<button class="small-button" type="button" data-table-jump-related="table-${item.index}">${item.title}</button>`).join("")}
      </div>
    </div>
  `;
}

function tableMatchesFilter(item) {
  const filter = state.tableFilter;
  let ok = false;
  if (filter === "all") ok = true;
  else {
    const groups = TABLE_FILTER_GROUPS[filter];
    ok = !groups || groups.some((g) => item.group === g);
  }
  if (!ok) return false;
  if (state.tableSubgroup && item.subgroup !== state.tableSubgroup) return false;
  return true;
}

function getSubgroupsForFilter(filterId) {
  if (filterId === "all") return [];
  const groups = TABLE_FILTER_GROUPS[filterId];
  if (!groups) return [];
  const subgroups = new Set();
  INDEXED_TABLES.forEach((item) => {
    if (groups.some((g) => item.group === g)) {
      subgroups.add(item.subgroup);
    }
  });
  return Array.from(subgroups);
}

function countSubgroupTables(filterId, subgroup) {
  return INDEXED_TABLES.filter((item) => {
    if (filterId === "all") return item.subgroup === subgroup;
    const groups = TABLE_FILTER_GROUPS[filterId];
    if (!groups) return item.subgroup === subgroup;
    return groups.some((g) => item.group === g) && item.subgroup === subgroup;
  }).length;
}

function countFilteredTables(filterId) {
  return USEFUL_TABLES.filter((item) => {
    if (filterId === "all") return true;
    const groups = TABLE_FILTER_GROUPS[filterId];
    if (!groups) return true;
    return groups.some((g) => item.group === g);
  }).length;
}

function tableSummary(item) {
  const map = {
    "Lo/la/los/las: кого? что?": "lo/la/los/las заменяют прямой объект: кого? что?",
    "Le/les: кому?": "le/les заменяют косвенный объект: кому? для кого?",
    "Порядок местоимений: se lo, te lo": "косвенное местоимение идет перед прямым; le/les перед lo/la/los/las превращается в se.",
    "Артикли: el/la/los/las и un/una": "артикль согласуется с родом и числом существительного.",
    "Por/para: причина или цель": "por чаще про причину/путь/обмен, para про цель/адресата/срок.",

function linkTableTenses(html) {

    ["Pretérito Imperfecto", "imperfecto"],
    ["Futuro Simple", "futuro"],
    ["Futuro Perfecto", "futuro_perfecto"],
    ["Condicional Simple", "condicional"],
    ["Condicional Compuesto", "condicional_compuesto"],
    ["Presente de Subjuntivo", "subjuntivo_presente"],
    ["Pretérito Perfecto de Subjuntivo", "subjuntivo_perfecto"],
    ["Imperfecto de Subjuntivo", "subjuntivo_imperfecto"],
    ["Pluscuamperfecto de Subjuntivo", "subjuntivo_pluscuamperfecto"],
    ["Futuro de Subjuntivo", "subjuntivo_futuro"],
    ["Imperativo Afirmativo", "imperativo_afirmativo"],
    ["Imperativo Negativo", "imperativo_negativo"],
    ["condicional simple", "condicional"],
    ["condicional compuesto", "condicional_compuesto"],
    ["imperfecto de subjuntivo", "subjuntivo_imperfecto"],
    ["pluscuamperfecto de subjuntivo", "subjuntivo_pluscuamperfecto"],
    ["pretérito anterior", "preterito_anterior"],
    ["futuro perfecto", "futuro_perfecto"],
    ["presente de subjuntivo", "subjuntivo_presente"],
    ["pretérito perfecto de subjuntivo", "subjuntivo_perfecto"]

function renderMoods() {
  const content = clearContent();
  const selected = MOODS.find((mood) => mood.id === state.selectedMood) || MOODS[0];
  const selector = document.createElement("section");
  selector.className = "info-card";
  selector.innerHTML = `
    <h2>Наклонения и Condicional</h2>
    <p class="muted">Сравни, сообщает ли говорящий содержание, выражает отношение к нему, побуждает адресата или помещает действие в гипотетическую рамку.</p>

      <summary>Источники и терминология</summary>
      <p>Правила сверены с <a href="https://www.rae.es/libro-estilo-lengua-espa%C3%B1ola/el-modo-indicativo-o-subjuntivo" target="_blank" rel="noopener">RAE: Indicativo o Subjuntivo</a>, <a href="https://www.rae.es/gtg/condicional-simple" target="_blank" rel="noopener">RAE: Condicional Simple</a> и <a href="https://cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/niveles/02_gramatica_inventario_b1-b2.htm" target="_blank" rel="noopener">Plan Curricular del Instituto Cervantes B1-B2</a>. Condicional оставлен отдельной учебной карточкой для сравнения, но нормативно это время Indicativo.</p>
    </details>
    <div class="tense-actions">
      <button class="small-button ${state.showMoodChooser ? "danger" : "success"}" type="button" data-toggle-mood-chooser aria-expanded="${state.showMoodChooser}" aria-controls="moodChooser">
        ${state.showMoodChooser ? "Скрыть подсказку" : "Как выбрать наклонение"}

    </div>
    ${state.showMoodChooser ? moodChooserMarkup() : ""}

          <span>${MOOD_TAB_LABELS[mood.id]?.[0] || mood.title}</span>
          <small>${MOOD_TAB_LABELS[mood.id]?.[1] || mood.ru}</small>
        </button>
      `).join("")}
    </div>
  `;
  content.appendChild(selector);
  selector.querySelectorAll("[data-mood], [data-choose-mood]").forEach((button) => {
    button.addEventListener("click", () => {
      selectMood(button.dataset.mood || button.dataset.chooseMood);
    });

  selector.querySelector("[data-toggle-mood-chooser]").addEventListener("click", () => {
    state.showMoodChooser = !state.showMoodChooser;
    renderMoods();
  });

  const section = document.createElement("section");
  section.className = "info-card";
  section.id = `mood-panel-${selected.id}`;
  section.setAttribute("role", "tabpanel");
  section.setAttribute("aria-labelledby", `mood-tab-${selected.id}`);

    <h2 lang="es">${selected.title}</h2>
    <p class="muted">${selected.ru}</p>

      <div><dt>Как узнать</dt><dd>${selected.signals}</dd></div>
      <div><dt>Что помнить</dt><dd>${selected.remember}</dd></div>
      <div><dt>Связанные времена</dt><dd>${moodTenseLinks(selected)}</dd></div>
    </div>
    <h3>Формулы-триггеры</h3>

    ${selected.id === "imperativo" ? imperativoDetailsMarkup() : ""}
    ${selected.confusions?.length ? `
      <div class="tense-actions">
        <button class="small-button ${state.showMoodConfusion ? "danger" : "success"}" type="button" data-toggle-mood-confusion aria-expanded="${state.showMoodConfusion}">
          ${state.showMoodConfusion ? "Скрыть сравнение" : moodComparisonLabel(selected.id)}
        </button>
      </div>
    ` : ""}
    ${state.showMoodConfusion ? moodConfusionMarkup(selected) : ""}
    ${selected.extra ? `

const CARD_MASTERY_MIN_ATTEMPTS = 3;
const CARD_MASTERY_MIN_ACCURACY = 80;
const CARD_MASTERY_MIN_STREAK = 2;
const QUIZ_TYPE_LABELS = {
  infinitive: "Русский → испанский",
  meaning: "Испанский → русский",
  conjugation: "Спряжение"
};
let activeQuizKeydownCleanup = null;

function selectedQuizPersons() {
  const persons = Array.isArray(state.quizConfig.persons) ? state.quizConfig.persons : [];
  const valid = [...new Set(persons.filter((index) => Number.isInteger(index) && index >= 0 && index < PEOPLE.length))];
  return valid.sort((a, b) => a - b);
}

function getAllTenseIds() {
  return QUIZ_TENSES.map((t) => t.id);
}

function getTenseName(id) {
  return QUIZ_TENSES.find((t) => t.id === id)?.name || id;
}

function quizAnswerKey(value, stripAccents = false) {
  const normalized = String(value)
    .trim()
    .replace(/\s+/g, " ")
    .toLowerCase()
    .normalize(stripAccents ? "NFD" : "NFC");
  return stripAccents ? normalized.replace(/[\u0300-\u036f]/g, "") : normalized;
}

function translationAnswers(translation) {
  const full = String(translation).trim();
  const alternatives = full
    .replace(/\([^)]*\)/g, "")
    .split(/[,;/]|\s+или\s+/i)
    .map((item) => item.trim())
    .filter((item) => item.length > 1);
  return [...new Set([full, ...alternatives])];
}

function infinitiveAnswers(verb, cards) {
  const translation = quizAnswerKey(translationFor(verb), true);
  return cards
    .filter((candidate) => quizAnswerKey(translationFor(candidate), true) === translation)
    .map(displayInfinitive);
}

function generateInfinitiveQuestions(cards, count) {
  const shuffled = shuffle([...cards]);
  const selected = count > 0 ? shuffled.slice(0, count) : shuffled;
  return selected.map((verb) => ({
    type: "infinitive",
    verb,
    question: translationFor(verb),
    answer: displayInfinitive(verb),
    acceptedAnswers: infinitiveAnswers(verb, cards)
  }));
}

function generateMeaningQuestions(cards, count) {
  const shuffled = shuffle([...cards]);
  const selected = count > 0 ? shuffled.slice(0, count) : shuffled;
  return selected.map((verb) => ({
    type: "meaning",
    verb,
    question: displayInfinitive(verb),
    answer: translationFor(verb),
    acceptedAnswers: translationAnswers(translationFor(verb))
  }));
}

function quizFormsFor(verb, tense) {
  return formsFor(verb)[tense];
}

function generateConjugationQuestions(cards, tenses, persons, count) {
  const tenseList = tenses.filter((id) => getAllTenseIds().includes(id));
  const personList = Array.isArray(persons) ? persons : [];
  const buckets = shuffle(cards).map((verb) => {
    const questions = [];
    for (const tense of tenseList) {
      const tenseForms = quizFormsFor(verb, tense);
      if (!tenseForms) continue;
      for (const personIdx of personList) {
        if (personIdx >= tenseForms.length) continue;
        const form = tenseForms[personIdx];
        if (form === "-") continue;
        questions.push({
          type: "conjugation",
          verb,
          tense,
          person: personIdx,
          question: `${displayInfinitive(verb)} — ${getTenseName(tense)} — ${PEOPLE[personIdx]}`,
          answer: form
        });
      }
    }
    return { verb, questions: shuffle(questions) };
  }).filter((bucket) => bucket.questions.length > 0);

  const result = [];
  while (buckets.some((bucket) => bucket.questions.length > 0) && (count === 0 || result.length < count)) {
    const round = shuffle(buckets.filter((bucket) => bucket.questions.length > 0));
    if (result.length > 0 && round.length > 1 && round[0].verb === result.at(-1).verb) {
      [round[0], round[1]] = [round[1], round[0]];
    }
    for (const bucket of round) {
      if (count > 0 && result.length >= count) break;
      result.push(bucket.questions.pop());
    }
  }
  return result;
}

function evaluateAnswer(userInput, question) {
  const candidates = question.acceptedAnswers?.length ? question.acceptedAnswers : [question.answer];
  const exact = quizAnswerKey(userInput);
  if (candidates.some((answer) => exact === quizAnswerKey(answer))) {
    return { status: "correct", message: "Верно!" };
  }
  const accentless = quizAnswerKey(userInput, true);
  if (accentless && candidates.some((answer) => accentless === quizAnswerKey(answer, true))) {
    return { status: "almost", message: "Почти верно: проверь ударение или диакритический знак." };
  }
  if (question.type === "conjugation" && question.verb.endsWith("se")) {
    const base = question.verb.slice(0, -2);
    const baseAnswer = formsFor(base)[question.tense]?.[question.person];
    if (baseAnswer && accentless === quizAnswerKey(baseAnswer, true)) {
      return { status: "almost", message: "Почти верно: у возвратного глагола нужно местоимение." };
    }
  }
  return { status: "wrong", message: "Ответ пока неверный." };
}

function cardStatsFor(verb) {
  return state.cardStats[verb] || { attempts: 0, correct: 0, mistakes: 0, streak: 0, lastReviewed: null };
}

function cardAccuracy(stats) {
  return stats.attempts > 0 ? Math.round((stats.correct / stats.attempts) * 100) : 0;
}

function isCardMastered(verb) {
  const stats = cardStatsFor(verb);
  return stats.attempts >= CARD_MASTERY_MIN_ATTEMPTS &&
    cardAccuracy(stats) >= CARD_MASTERY_MIN_ACCURACY &&
    stats.streak >= CARD_MASTERY_MIN_STREAK;
}

function cardNeedsReview(verb) {
  return cardStatsFor(verb).mistakes > 0 && !isCardMastered(verb);
}

function studyCardCounts() {
  return state.cards.reduce((counts, verb) => {
    const stats = cardStatsFor(verb);
    if (stats.attempts === 0) counts.unreviewed += 1;
    else counts.reviewed += 1;
    if (cardNeedsReview(verb)) counts.mistakes += 1;
    if (isCardMastered(verb)) counts.mastered += 1;
    return counts;
  }, { reviewed: 0, unreviewed: 0, mistakes: 0, mastered: 0 });
}

function cardsForFilter(filter = state.cardsFilter) {
  if (filter === "unreviewed") return state.cards.filter((verb) => cardStatsFor(verb).attempts === 0);
  if (filter === "mistakes") return state.cards.filter(cardNeedsReview);
  if (filter === "mastered") return state.cards.filter(isCardMastered);
  return [...state.cards];
}

function cardDifficulty(verb) {
  const stats = cardStatsFor(verb);
  if (stats.attempts === 0) return verbInfo(verb).irregular ? 1 : 0;
  return stats.mistakes * 3 + (stats.attempts - stats.correct) - stats.streak * 0.25;
}

function saveCardStats() {
  localStorage.setItem("msg:cardStats", JSON.stringify(state.cardStats));
}

function difficultStudyCards() {
  const reviewed = state.cards.filter(cardNeedsReview);
  const source = reviewed.length > 0 ? reviewed : state.cards.filter((verb) => verbInfo(verb).irregular);
  return [...(source.length > 0 ? source : state.cards)].sort((a, b) => cardDifficulty(b) - cardDifficulty(a));
}

function visibleStudyCards() {
  const query = normalize(state.cardsQuery);
  const filtered = cardsForFilter().filter((verb) => {
    if (!query) return true;
    return normalize(displayInfinitive(verb)).includes(query) || normalize(translationFor(verb)).includes(query);
  });
  if (state.cardsSort === "alphabetical") {
    return filtered.sort((a, b) => displayInfinitive(a).localeCompare(displayInfinitive(b), "es"));
  }
  if (state.cardsSort === "difficult") {
    return filtered.sort((a, b) => cardDifficulty(b) - cardDifficulty(a));
  }
  if (state.cardsSort === "irregular") {
    return filtered.sort((a, b) => Number(verbInfo(b).irregular) - Number(verbInfo(a).irregular) || displayInfinitive(a).localeCompare(displayInfinitive(b), "es"));
  }
  return filtered.sort((a, b) => state.cards.indexOf(b) - state.cards.indexOf(a));
}

  cfg.persons = selectedQuizPersons();
  const quickCount = Math.min(5, state.cards.length);

        <button class="small-button primary" type="button" data-preset="quick">Быстрая проверка · ${quickCount}</button>

        <button class="small-button" type="button" data-toggle-quiz-panel aria-expanded="${state.showQuizPanel}">${state.showQuizPanel ? "Скрыть режимы" : "Режимы квиза"}</button>
      </div>` : ""}
    </div>
    ${state.cards.length > 0 ? `<div class="cards-overview" aria-label="Прогресс изучения">
      <div><strong>${studyCounts.reviewed}</strong><span>проверено</span></div>
      <div><strong>${studyCounts.unreviewed}</strong><span>не проверено</span></div>
      <div><strong>${studyCounts.mistakes}</strong><span>с ошибками</span></div>
      <div><strong>${studyCounts.mastered}</strong><span>освоено</span></div>
    </div>

      <summary>Как считаются статусы?</summary>
      <div class="cards-status-help-grid">
        <div><strong>Проверено</strong><span>Есть хотя бы один ответ.</span></div>
        <div><strong>Не проверено</strong><span>Ответов пока не было.</span></div>
        <div><strong>С ошибками</strong><span>Есть ошибки, и глагол ещё не освоен.</span></div>
        <div><strong>Освоено</strong><span>Минимум 3 ответа, точность от 80% и серия от 2.</span></div>

    </div>

  const list = listCard.querySelector(".verb-list");
  visibleCards.forEach((verb) => {
    const stats = cardStatsFor(verb);
    const accuracy = cardAccuracy(stats);
    const mastered = isCardMastered(verb);
    const needsReview = cardNeedsReview(verb);
    const status = stats.attempts === 0 ? "Не проверялся" : mastered ? "Освоен" : needsReview ? "Повторить" : "В работе";
    const statusClass = stats.attempts === 0 ? "is-unreviewed" : mastered ? "is-mastered" : needsReview ? "is-mistake" : "is-progress";
    const row = renderVerbListItem(verb, { showBadges: false });
    row.classList.add("is-study-card");
    row.insertAdjacentHTML("beforeend", `<div class="cards-study-footer">
      <div class="cards-study-meta">
        <span class="${statusClass}" title="${mastered ? "Минимум 3 ответа, точность от 80% и серия от 2" : "Статус изучения"}">${status}</span>
      </div>
      <div class="cards-study-progress" title="${stats.correct} правильных из ${stats.attempts}">
        <span class="cards-study-progress-track" role="progressbar" aria-label="Точность: ${accuracy}%" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${accuracy}"><i style="width: ${accuracy}%"></i></span>

  if (visibleCards.length === 0) list.innerHTML = `<p class="muted">В избранном нет совпадений с этим запросом.</p>`;
  listCard.querySelector("#cardsSearch").addEventListener("input", (event) => {

      input?.setSelectionRange(input.value.length, input.value.length);

function saveQuizSession() {
  if (state.cardQuiz.length === 0) return;
  const session = {
    cardQuiz: state.cardQuiz,
    cardQuizIndex: state.cardQuizIndex,
    cardQuizInput: state.cardQuizInput,
    cardQuizAnswered: state.cardQuizAnswered,
    cardQuizCorrect: state.cardQuizCorrect,
    cardQuizTotal: state.cardQuizTotal,
    cardQuizAttempts: state.cardQuizAttempts,
    cardQuizSnapshot: state.cardQuizSnapshot,
    cardQuizAllVerbs: state.cardQuizAllVerbs,
    savedAt: new Date().toISOString()
  };
  state.savedQuizSession = session;
  localStorage.setItem("msg:quizSession", JSON.stringify(session));
}

function clearSavedQuizSession() {
  state.savedQuizSession = null;
  localStorage.removeItem("msg:quizSession");
}

function resumeCardQuiz() {
  const session = state.savedQuizSession;
  if (!session?.cardQuiz?.length) return;
  state.cardQuiz = session.cardQuiz.filter((question) => state.cards.includes(question.verb));
  if (state.cardQuiz.length === 0) {
    clearSavedQuizSession();
    renderCards();
    return;
  }
  state.cardQuizIndex = Math.min(Number(session.cardQuizIndex) || 0, state.cardQuiz.length);
  state.cardQuizInput = session.cardQuizInput || "";
  state.cardQuizAnswered = Boolean(session.cardQuizAnswered);
  state.cardQuizCorrect = Number(session.cardQuizCorrect) || 0;
  state.cardQuizTotal = Number(session.cardQuizTotal) || 0;
  state.cardQuizAttempts = Array.isArray(session.cardQuizAttempts) ? session.cardQuizAttempts : [];
  state.cardQuizSnapshot = Array.isArray(session.cardQuizSnapshot) ? session.cardQuizSnapshot : [...state.cardQuiz];
  state.cardQuizAllVerbs = [...new Set(state.cardQuiz.map((question) => question.verb))];
  renderCards();
}

function recordCardAttempt(question, result) {
  const previous = cardStatsFor(question.verb);
  const correct = result.status === "correct";
  state.cardStats[question.verb] = {
    attempts: previous.attempts + 1,
    correct: previous.correct + (correct ? 1 : 0),
    mistakes: previous.mistakes + (correct ? 0 : 1),
    streak: correct ? previous.streak + 1 : 0,
    lastReviewed: new Date().toISOString()
  };
  saveCardStats();
}

function startQuizPreset(preset) {
  if (preset === "quick") {
    state.quizConfig = { ...state.quizConfig, type: "infinitive", count: 5 };
    saveQuizConfig();
    startCardQuiz("new", { cards: state.cards });
    return;
  }
  if (preset === "basic") {
    state.quizConfig = {
      ...state.quizConfig,
      type: "conjugation",
      count: 10,
      tenses: [...BASIC_QUIZ_TENSES],
      persons: PEOPLE.map((_, index) => index)
    };
    saveQuizConfig();
    startCardQuiz("new", { cards: state.cards });
    return;
  }
  if (preset === "mistakes") {
    const mistakeCards = cardsForFilter("mistakes");
    const questions = generateConjugationQuestions(
      mistakeCards,
      BASIC_QUIZ_TENSES,
      PEOPLE.map((_, index) => index),
      10
    );
    beginCardQuiz(questions);
    return;
  }
  const difficult = difficultStudyCards();
  state.quizConfig = { ...state.quizConfig, type: "conjugation", count: 10, tenses: [...BASIC_QUIZ_TENSES] };
  if (selectedQuizPersons().length === 0) state.quizConfig.persons = PEOPLE.map((_, index) => index);
  saveQuizConfig();
  startCardQuiz("new", { cards: difficult });
}

function startSingleVerbQuiz(verb) {
  const questions = generateConjugationQuestions(
    [verb],
    BASIC_QUIZ_TENSES,
    PEOPLE.map((_, index) => index),
    5
  );
  beginCardQuiz(questions);
}

function beginCardQuiz(questions) {
  if (!Array.isArray(questions) || questions.length === 0) return;
  state.cardQuiz = questions;
  state.cardQuizSnapshot = questions.map((q) => ({ ...q }));
  state.cardQuizAllVerbs = [...new Set(questions.map((q) => q.verb))];
  state.cardQuizIndex = 0;
  state.cardQuizInput = "";
  state.cardQuizAnswered = false;
  state.cardQuizCorrect = 0;
  state.cardQuizTotal = 0;
  state.cardQuizAttempts = [];
  state.cardUndo = null;
  saveQuizSession();
  renderCards();
}

function startCardQuiz(mode = "new", options = {}) {
  const cfg = state.quizConfig;
  const sourceCards = Array.isArray(options.cards) && options.cards.length > 0 ? options.cards : state.cards;
  let questions;
  if (mode === "mistakes") {
    questions = state.cardQuizAttempts
      .filter((attempt) => !attempt.correct && state.cards.includes(attempt.question.verb))
      .map((attempt) => ({ ...attempt.question }));
  } else if (mode === "same" && state.cardQuizSnapshot.length > 0) {
    questions = state.cardQuizSnapshot.filter((question) => state.cards.includes(question.verb)).map((q) => ({ ...q }));
  } else if (cfg.type === "conjugation") {
    questions = generateConjugationQuestions(sourceCards, cfg.tenses, selectedQuizPersons(), cfg.count);
  } else if (cfg.type === "meaning") {
    questions = generateMeaningQuestions(sourceCards, cfg.count);
  } else {
    questions = generateInfinitiveQuestions(sourceCards, cfg.count);
  }
  beginCardQuiz(questions);
}

function renderCardQuiz(content) {
  const question = state.cardQuiz[state.cardQuizIndex];
  if (!question) {
    renderCardQuizResults(content);
    return;
  }
  const info = verbInfo(question.verb);
  const card = document.createElement("section");
  card.className = "info-card study-card";
  const progress = Math.round(((state.cardQuizIndex + 1) / state.cardQuiz.length) * 100);
  const isConjugation = question.type === "conjugation";
  const isMeaning = question.type === "meaning";
  const eyebrow = isConjugation ? "Проспрягай" : isMeaning ? "Переведи на русский" : "Переведи на испанский";
  const placeholder = isConjugation ? "Введи форму..." : isMeaning ? "Введи перевод..." : "Введи инфинитив...";
  const questionHeading = isConjugation ? question.question : isMeaning ? question.question : info.ru;

  let answerHTML;
  if (state.cardQuizAnswered) {
    const result = evaluateAnswer(state.cardQuizInput, question);
    const isCorrect = result.status === "correct";
    const enteredAnswer = state.cardQuizInput
      ? escapeHTML(state.cardQuizInput)
      : "Ответ не указан";
    answerHTML = `
      <input class="quiz-input is-${result.status}" type="text" value="${enteredAnswer}" readonly aria-label="Данный ответ">
      <div class="quiz-feedback is-${result.status}" role="status">
        ${escapeHTML(result.message)}${!isCorrect ? `<br>Правильный ответ: <strong>${escapeHTML(question.answer)}</strong>` : ""}
      </div>
    `;
  } else {
    answerHTML = `
      <input class="quiz-input" id="quizAnswerInput" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" aria-label="Ответ" placeholder="${placeholder}" value="${escapeHTML(state.cardQuizInput)}">
      ${!isMeaning ? `<div class="quiz-character-row" aria-label="Испанские символы">
        ${QUIZ_CHARACTERS.map((character) => `<button class="quiz-character-button" type="button" data-quiz-character="${character}" aria-label="Вставить ${character}">${character}</button>`).join("")}
      </div>` : ""}
    `;
  }

  card.innerHTML = `
    <div class="study-card-top">
      <span>Вопрос ${state.cardQuizIndex + 1} из ${state.cardQuiz.length}</span>
      <div class="quiz-stats" aria-label="Текущий результат">
        <span aria-label="Правильных ответов: ${state.cardQuizCorrect}">✓ <strong>${state.cardQuizCorrect}</strong></span>
        <span aria-label="Ошибок: ${state.cardQuizTotal - state.cardQuizCorrect}">✗ <strong>${state.cardQuizTotal - state.cardQuizCorrect}</strong></span>
      </div>
      <button class="small-button" type="button" data-stop>Закончить</button>
    </div>
    <div class="study-progress" role="progressbar" aria-label="Прогресс квиза" aria-valuemin="1" aria-valuemax="${state.cardQuiz.length}" aria-valuenow="${state.cardQuizIndex + 1}"><span style="width: ${progress}%"></span></div>
    <div class="study-face">
      <p class="eyebrow">${eyebrow}</p>
      <h2 ${isMeaning ? `lang="es"` : ""}>${escapeHTML(questionHeading)}</h2>
      ${answerHTML}
    </div>
    <div class="study-actions">
      ${!state.cardQuizAnswered
        ? `
          <button class="small-button primary" type="button" id="checkAnswer">Проверить</button>
          <button class="small-button danger" type="button" id="skipAnswer">Не знаю</button>
        `
        : `<button class="small-button primary" type="button" id="nextQuestion">Дальше →</button>`
      }
    </div>
  `;
  content.appendChild(card);

  const input = card.querySelector("#quizAnswerInput");
  if (input) {
    input.focus();
    input.addEventListener("input", () => {
      state.cardQuizInput = input.value;
      saveQuizSession();
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleCheckAnswer();
      }
    });
    card.querySelectorAll("[data-quiz-character]").forEach((button) => {
      button.addEventListener("click", () => {
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? start;
        input.setRangeText(button.dataset.quizCharacter, start, end, "end");
        input.focus();
      });
    });
  }

  const handleCheckAnswer = (skip = false) => {
    const val = skip ? "" : input?.value || "";
    if (!skip && !val.trim()) return;
    const result = skip ? { status: "wrong", message: "Ответ не указан." } : evaluateAnswer(val, question);
    const isCorrect = result.status === "correct";
    state.cardQuizInput = val;
    state.cardQuizAnswered = true;
    state.cardQuizTotal += 1;
    if (isCorrect) {
      state.cardQuizCorrect += 1;
    }
    state.cardQuizAttempts.push({
      question: { ...question },
      userAnswer: val.trim(),
      correct: isCorrect,
      status: result.status
    });
    recordCardAttempt(question, result);
    saveQuizSession();
    renderCards();
  };

  const handleNext = () => {
    state.cardQuizIndex += 1;
    state.cardQuizInput = "";
    state.cardQuizAnswered = false;
    saveQuizSession();
    if (state.cardQuizIndex >= state.cardQuiz.length) {
      renderCards();
      return;
    }
    renderCards();
  };

  card.querySelector("#checkAnswer")?.addEventListener("click", () => handleCheckAnswer());
  card.querySelector("#skipAnswer")?.addEventListener("click", () => handleCheckAnswer(true));
  card.querySelector("#nextQuestion")?.addEventListener("click", handleNext);
  card.querySelector("[data-stop]")?.addEventListener("click", stopCardQuiz);

  const handleGlobalKeydown = (e) => {
    if (state.cardQuiz.length === 0) return;
    if (e.key === "Escape") {
      e.preventDefault();
      stopCardQuiz();
      return;
    }
    if (state.cardQuizAnswered && e.key === "ArrowRight") {
      e.preventDefault();
      handleNext();
      return;
    }
  };

  bindQuizHotkeys(handleGlobalKeydown);
  if (state.cardQuizAnswered) requestAnimationFrame(() => card.querySelector("#nextQuestion")?.focus());
}

function quizQuestionLabel(question) {
  if (question.type === "infinitive") return `${question.question} → инфинитив`;
  if (question.type === "meaning") return `${question.question} → перевод`;
  return `${displayInfinitive(question.verb)} · ${getTenseName(question.tense)} · ${PEOPLE[question.person]}`;
}

function renderCardQuizResults(content) {
  const total = state.cardQuizTotal;
  const correct = state.cardQuizCorrect;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const allVerbs = state.cardQuizAllVerbs;
  const wrongAttempts = state.cardQuizAttempts.filter((attempt) => !attempt.correct);
  const wrongVerbs = new Set(wrongAttempts.map((attempt) => attempt.question.verb));
  const card = document.createElement("section");
  card.className = "info-card study-card";
  const rows = allVerbs.map((verb) => {
    const info = verbInfo(verb);
    const wasWrong = wrongVerbs.has(verb);
    return `<div class="quiz-wrong-row ${wasWrong ? "is-wrong" : ""}">
      <span><strong>${displayInfinitive(verb)}</strong> — ${info.ru}${wasWrong ? " <span class=\"quiz-wrong-badge\">✗</span>" : ""}</span>
      ${state.cards.includes(verb) ? `<button class="small-button danger" type="button" data-remove="${verb}">Убрать из избранного</button>` : `<span class="muted">Убран</span>`}
    </div>`;
  }).join("");
  const allHTML = `<div class="quiz-wrong-list quiz-verb-list"><h3>Глаголы из квиза (${allVerbs.length})</h3>${rows}</div>`;
  const mistakesHTML = wrongAttempts.length > 0 ? `
    <div class="quiz-wrong-list is-mistakes">
      <h3>Разобрать ошибки (${wrongAttempts.length})</h3>
      ${wrongAttempts.map((attempt) => `
        <div class="quiz-mistake-row">
          <strong class="quiz-mistake-question">${escapeHTML(quizQuestionLabel(attempt.question))}</strong>
          <div class="quiz-answer-comparison">
            <span>Твой ответ<strong>${attempt.userAnswer ? escapeHTML(attempt.userAnswer) : "Нет ответа"}</strong></span>
            <span>Правильно<strong>${escapeHTML(attempt.question.answer)}</strong></span>
          </div>
          <div class="quiz-result-links">
            <button class="small-button" type="button" data-result-verb="${attempt.question.verb}">Открыть глагол</button>
            ${attempt.question.tense ? `<button class="small-button" type="button" data-result-tense="${attempt.question.tense}">Посмотреть время</button>` : ""}
          </div>
        </div>
      `).join("")}
    </div>
  ` : `<div class="quiz-feedback is-correct">Все ответы верны.</div>`;
  card.innerHTML = `
    <div class="study-card-top">
      <span>Результат</span>
      <button class="small-button" type="button" data-stop>Закрыть</button>
    </div>
    <div class="study-face">
      <p class="eyebrow">Квиз завершён</p>
      <h2>${correct} из ${total}</h2>
      <p class="muted">${pct}% правильных ответов</p>
    </div>
    ${mistakesHTML}
    ${state.cardUndo ? `<div class="cards-undo" role="status"><p><strong>${displayInfinitive(state.cardUndo.verb)}</strong> убран из избранного.</p><button class="small-button" type="button" data-undo-remove>Отменить</button></div>` : ""}
    ${allHTML}
    <div class="study-actions">
      ${wrongAttempts.length > 0 ? `<button class="small-button primary" type="button" id="retryMistakes">Повторить ошибки (${wrongAttempts.length})</button>` : ""}
      <button class="small-button" type="button" id="restartQuiz">Повторить весь квиз</button>
      <button class="small-button" type="button" id="backToCards">К списку</button>
    </div>
  `;
  content.appendChild(card);
  card.querySelectorAll("[data-remove]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const verb = btn.dataset.remove;
      const index = state.cards.indexOf(verb);
      state.cardUndo = { verb, index };
      state.cards = state.cards.filter((item) => item !== verb);
      saveCards();
      renderCards();
    });
  });
  card.querySelector("[data-undo-remove]")?.addEventListener("click", () => {
    const { verb, index } = state.cardUndo;
    const restored = [...state.cards];
    restored.splice(Math.max(0, Math.min(index, restored.length)), 0, verb);
    state.cards = [...new Set(restored)];
    state.cardUndo = null;
    saveCards();
    renderCards();
  });
  card.querySelectorAll("[data-result-verb]").forEach((button) => button.addEventListener("click", () => {
    clearQuizHotkeys();
    openVerbFromReference(button.dataset.resultVerb);
  }));
  card.querySelectorAll("[data-result-tense]").forEach((button) => button.addEventListener("click", () => {
    clearQuizHotkeys();
    openTenseFromVerb(button.dataset.resultTense);
  }));
  card.querySelector("#retryMistakes")?.addEventListener("click", () => startCardQuiz("mistakes"));
  card.querySelector("#restartQuiz")?.addEventListener("click", () => startCardQuiz("same"));
  card.querySelector("#backToCards")?.addEventListener("click", stopCardQuiz);
  card.querySelector("[data-stop]")?.addEventListener("click", stopCardQuiz);

  const handleResultsKeydown = (e) => {
    if (e.key === "Escape") {
      e.preventDefault();
      stopCardQuiz();
      return;
    }
    if (e.key === "Enter" && e.target.tagName !== "BUTTON") {
      e.preventDefault();
      startCardQuiz("same");
      return;
    }
  };
  bindQuizHotkeys(handleResultsKeydown);
}

function stopCardQuiz() {
  clearQuizHotkeys();
  clearSavedQuizSession();
  state.cardQuiz = [];
  state.cardQuizIndex = 0;
  state.cardQuizInput = "";
  state.cardQuizAnswered = false;
  state.cardQuizCorrect = 0;
  state.cardQuizTotal = 0;
  state.cardQuizAttempts = [];
  state.cardQuizSnapshot = [];
  state.cardQuizAllVerbs = [];
  state.cardUndo = null;
  renderCards();
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function shuffle(items) {
  const arr = [...items];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function infoCard(title, text) {
  const card = document.createElement("article");
  card.className = "info-card";
  card.innerHTML = `<h2>${title}</h2><p class="muted">${text}</p>`;
  return card;
}

function validateData() {
  const tenseIds = new Set(DATA.tenses.map((tense) => tense.id));
  const tableGroups = new Set(DATA.tableGroups.map((group) => group.title));
  const issues = [];
  DATA.tenseGroups.forEach((group) => {
    group.tenseIds.filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для группы ${group.title}: ${id}`));
  });
  Object.entries(DATA.tenseFilters).forEach(([key, filter]) => {
    filter.ids.filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для фильтра ${key}: ${id}`));
  });
  DATA.moods.forEach((mood) => {
    (mood.tenseIds || []).filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для наклонения ${mood.title}: ${id}`));
  });
  DATA.usefulTables.forEach((item) => {
    if (!tableGroups.has(item.group)) issues.push(`Нет группы шпаргалок для ${item.title}: ${item.group}`);
  });
  return issues;
}

function exceptionVerbsFor(tenseId) {
  const key = exceptionKeyForTense(tenseId);
  return BASE_VERBS.filter((verb) => isExceptionFor(verb, key));
}

function isExceptionFor(verb, key) {
  if (key === "participio") {
    return Boolean(IRREGULARS[verb]?.participle || generatedParticiple(verb));
  }
  if (key === "indefinido") {
    return Boolean(IRREGULARS[verb]?.indefinido || irregularIndefinidoStem(verb) || vowelStemIndefinido(verb) || thirdPersonStemChangeIndefinido(verb) || orthographicIndefinido(verb));
  }
  if (key === "futuro" || key === "condicional") {
    return Boolean(irregularFutureStem(verb));
  }
  if (key === "subjuntivo_presente") {
    return Boolean(IRREGULARS[verb]?.subjuntivo_presente || generatedSubjuntivoPresente(verb));
  }
  if (key === "presente") {
    return Boolean(IRREGULARS[verb]?.presente || generatedPresent(verb));
  }
  return Boolean(IRREGULARS[verb]?.[key]);
}

function exceptionKeyForTense(tenseId) {
  if (["perfecto", "pluscuamperfecto", "preterito_anterior", "futuro_perfecto", "condicional_compuesto", "subjuntivo_perfecto", "subjuntivo_pluscuamperfecto", "subjuntivo_futuro_perfecto", "formas_no_personales"].includes(tenseId)) {
    return "participio";
  }
  if (tenseId === "imperativo_negativo") {
    return "subjuntivo_presente";
  }
  return tenseId;
}

function renderTenseExceptions(tenseId) {
  const key = exceptionKeyForTense(tenseId);
  const specialVerbs = specialExceptionVerbsFor(key);
  const patterns = exceptionPatternsFor(key);
  const block = document.createElement("div");
  block.className = "compact-exceptions";
  block.insertAdjacentHTML("beforeend", `<h3>Исключения</h3>`);
  if (specialVerbs.length === 0 && patterns.length === 0) {
    block.insertAdjacentHTML("beforeend", `<p class="muted">Для этого времени в текущей базе исключений пока нет.</p>`);
    return block;
  }
  if (specialVerbs.length > 0) {
    block.appendChild(exceptionTable("Особые глаголы без простой логики", ["Глагол", "Формы", "Перевод"], specialVerbs.map((verb) => {
      const info = verbInfo(verb);
      const forms = key === "participio" ? [info.participle] : info.forms[key] || [];
      return [verbLink(verb), `<span class="compact-forms">${forms.join(", ")}</span>`, info.ru];
    })));
  }
  if (patterns.length > 0) {
    block.appendChild(exceptionTable("Паттерны", ["Паттерн", "Как меняется", "Примеры"], patterns.map((item) => [
      item.name,
      item.change,
      linkVerbExamples(item.examples)
    ])));
  }
  block.addEventListener("click", (event) => {
    const button = event.target.closest("[data-open-verb]");
    if (!button) return;
    openVerbFromReference(button.dataset.openVerb);
  });
  return block;
}

function verbLink(verb) {
  return `<button class="verb-link-button" type="button" data-open-verb="${verb}" lang="es">${displayInfinitive(verb)}</button>`;
}

function linkVerbExamples(text) {
  return text.replace(/(^|;\s*)([a-zñ]+)\s*->/g, (match, prefix, verb) => {
    if (!BASE_VERBS.includes(verb)) return match;
    return `${prefix}${verbLink(verb)} ->`;
  });
}

function openVerbFromReference(verb) {
  if (!BASE_VERBS.includes(verb)) return;
  state.view = "verbs";
  state.query = "";
  syncActiveTab("verbs");
  selectVerb(verb, { keepReturnQuery: false });
}

function openTenseFromVerb(tenseId) {
  if (!tenseById(tenseId)) return;
  state.view = "tenses";
  state.focusedTense = tenseId;
  state.returnMood = null;
  state.openMoreExamplesTense = null;
  syncActiveTab("tenses");
  render();
  updateRouteHash(`tense-${tenseId}`);
  scrollToCard(`tense-${tenseId}`);
}

function openTenseFromMood(tenseId, moodId) {
  if (!tenseById(tenseId) || !MOODS.some((mood) => mood.id === moodId)) return;
  state.view = "tenses";
  state.focusedTense = tenseId;
  state.returnMood = moodId;
  state.openMoreExamplesTense = null;
  syncActiveTab("tenses");
  render();
  updateRouteHash(`tense-${tenseId}`);
  scrollToCard(`tense-${tenseId}`);
}

function exceptionTable(title, headers, rows) {
  const section = document.createElement("div");
  section.className = "exception-subtable";
  section.insertAdjacentHTML("beforeend", `<h4>${title}</h4>`);
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  const table = document.createElement("table");
  table.innerHTML = `<thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead>`;
  const body = document.createElement("tbody");
  rows.forEach((cells) => {
    const row = document.createElement("tr");
    row.innerHTML = cells.map((cell, index) => index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`).join("");
    body.appendChild(row);
  });
  table.appendChild(body);
  wrap.appendChild(table);
  section.appendChild(wrap);
  return section;
}

function specialExceptionVerbsFor(key) {
  const map = {
    presente: ["ser", "estar", "ir", "haber", "dar", "saber", "ver", "oir"],
    indefinido: ["ser", "ir", "dar", "andar", "caber", "estar", "hacer", "poder", "querer", "saber"],
    imperfecto: ["ser", "ir", "ver"],
    futuro: ["decir", "hacer"],
    condicional: ["decir", "hacer"],
    subjuntivo_presente: ["ser", "estar", "ir", "haber", "dar", "saber", "ver", "oir"],
    imperativo_afirmativo: ["ser", "ir", "tener", "hacer", "decir", "venir", "poner", "salir", "saber"],
    participio: ["abrir", "cubrir", "decir", "escribir", "hacer", "morir", "poner", "romper", "ver"]
  };
  return (map[key] || []).filter((verb) => BASE_VERBS.includes(verb) && isExceptionFor(verb, key));
}

function renderTenseSignals(tense) {
  const block = document.createElement("div");
  block.className = "compact-exceptions";
  const sections = tense.signals || DEFAULT_SIGNAL_SECTIONS;
  block.insertAdjacentHTML("beforeend", `<h3>Признаки времени</h3>`);
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  const table = document.createElement("table");
  table.innerHTML = `<thead><tr><th>Группа</th><th>Признаки и подсказки</th></tr></thead>`;
  const body = document.createElement("tbody");
  sections.forEach(([group, text]) => {
    const row = document.createElement("tr");
    row.innerHTML = `<th>${group}</th><td>${text}</td>`;
    body.appendChild(row);
  });
  table.appendChild(body);
  wrap.appendChild(table);
  block.appendChild(wrap);
  return block;
}

function renderExceptionCard(verb, tenseId) {
  const info = verbInfo(verb);
  const card = document.createElement("article");
  card.className = "verb-card";
  const title = tenseId === "participio" ? "Participio irregular" : tenseById(tenseId).name;
  card.innerHTML = `
    <div class="card-head">
      <div>
        <h2>${info.displayInfinitive}</h2>
        <p class="muted">${info.ru} · ${title}</p>
      </div>
    </div>
    <div class="chips">${info.tags.map((tag) => `<span class="chip alert">${tag}</span>`).join("")}</div>
  `;
  if (tenseId === "participio") {
    card.insertAdjacentHTML("beforeend", `<dl class="forms-line"><div><dt>Participio</dt><dd>${info.participle}</dd></div><div><dt>Infinitivo</dt><dd>${verb}</dd></div></dl>`);
    return card;
  }
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  wrap.appendChild(selectedTenseOnlyTable(verb, tenseId));
  card.appendChild(wrap);
  return card;
}

const TABLE_FILTER_COUNTS = TABLE_FILTERS.reduce((acc, f) => { acc[f.id] = countFilteredTables(f.id); return acc; }, {});

const VIEW_RENDERERS = {

function render() {
  document.body.classList.toggle("dark", state.dark);
  const themeToggle = $(SELECTORS.themeToggle);
  const themeLabel = state.dark ? "Включить светлую тему" : "Включить тёмную тему";
  themeToggle.setAttribute("aria-label", themeLabel);
  themeToggle.title = themeLabel;
  syncActiveTab();
  (VIEW_RENDERERS[state.view] || renderVerbs)();
}

function prepareResponsiveTables(root) {
  root.querySelectorAll("table").forEach((table) => {
    const headRows = table.tHead?.rows;
    const headRow = headRows?.[headRows.length - 1];
    if (!headRow) return;

    const headers = [];
    Array.from(headRow.cells).forEach((cell) => {
      const label = cell.textContent.trim();
      const span = Math.max(1, cell.colSpan || 1);
      for (let index = 0; index < span; index += 1) headers.push(label);
    });
    if (headers.length === 0) return;

    table.classList.add("responsive-table");
    Array.from(table.tBodies).forEach((body) => {
      Array.from(body.rows).forEach((row) => {
        const cells = Array.from(row.cells);
        const isSectionRow = cells.length === 1 && cells[0].colSpan > 1;
        row.classList.toggle("is-section-row", isSectionRow);
        let column = 0;
        cells.forEach((cell) => {
          const span = Math.max(1, cell.colSpan || 1);
          const labels = headers.slice(column, column + span).filter(Boolean);
          const label = isSectionRow ? "" : [...new Set(labels)].join(" / ");
          cell.dataset.label = label;
          if (label) cell.setAttribute("aria-label", label);
          column += span;
        });
      });
    });
  });
}

const dataIssues = validateData();
if (dataIssues.length > 0) {
  console.warn("Проверь данные справочника:", dataIssues);
}

$all(SELECTORS.tabs).forEach((tab) => {
  tab.addEventListener("click", () => setView(tab.dataset.view));
});

$(SELECTORS.homeTitle).addEventListener("click", () => {
  setView("verbs");
  scrollAppTop();
});

$(SELECTORS.themeToggle).addEventListener("click", () => {
  state.dark = !state.dark;
  localStorage.setItem("msg:theme", state.dark ? "dark" : "light");
  render();
});

const floatingTopButton = $(SELECTORS.floatingTopButton);
let footerInView = false;
function updateFloatingTopButton() {
  const visible = window.scrollY > 420 && !footerInView;
  floatingTopButton.classList.toggle("is-visible", visible);
  floatingTopButton.setAttribute("aria-hidden", String(!visible));
  floatingTopButton.tabIndex = visible ? 0 : -1;
}

floatingTopButton.addEventListener("click", () => {
  scrollAppTop();
});

window.addEventListener("scroll", updateFloatingTopButton, { passive: true });

if ("IntersectionObserver" in window) {
  const footerObserver = new IntersectionObserver((entries) => {
    footerInView = entries.some((entry) => entry.isIntersecting);
    updateFloatingTopButton();
  }, { threshold: 0.05 });
  footerObserver.observe(document.querySelector(".app-footer"));
}

window.addEventListener("hashchange", () => {
  if (!applyRouteHash()) {
    updateRouteHash("verbs", { replace: true });
    resetVerbLanding();
    render();
  }
});

document.addEventListener("keydown", (e) => {
  const isInput = e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable;

  if ((e.ctrlKey || e.metaKey) && e.key === "f") {
    e.preventDefault();
    const input = document.getElementById("searchInput");
    if (input) { input.focus(); input.select(); }
    return;
  }

  if (e.key === "Enter" && isInput && state.view === "verbs" && normalize(state.query)) {
    e.preventDefault();
    const verbs = filteredVerbs();
    if (verbs.length > 0) {
      selectVerb(verbs[0]);
    }
    return;
  }

  if (!isInput && /^[1-5]$/.test(e.key)) {
    const views = ["verbs", "tenses", "moods", "tables", "cards"];
    setView(views[parseInt(e.key) - 1]);
    e.preventDefault();
    return;
  }

  if (e.key === "Escape") {
    if (state.view !== "verbs") {
      setView("verbs");
      e.preventDefault();
      return;
    }
    if (state.selectedVerb) {
      if (state.previousVerbQuery) {
        state.query = state.previousVerbQuery;
        state.previousVerbQuery = null;
      }
      state.selectedVerb = null;
      state.searchCursor = -1;
      updateRouteHash("verbs");
      render();
      e.preventDefault();
    } else if (state.query) {
      state.query = "";
      state.searchCursor = -1;
      render();
      e.preventDefault();
    } else if (isInput) {
      e.target.blur();
      e.preventDefault();
    }
    return;
  }

  if ((e.key === "ArrowDown" || e.key === "ArrowUp") && state.view === "verbs") {
    const picks = document.querySelectorAll(".verb-pick");
    if (picks.length === 0) return;
    const active = document.activeElement;
    let idx = Array.from(picks).indexOf(active);
    e.preventDefault();
    if (e.key === "ArrowDown") {
      if (idx < picks.length - 1) {
        picks[idx + 1].focus();
        picks[idx + 1].scrollIntoView({ block: "nearest" });
      }
    } else {
      if (idx > 0) {
        picks[idx - 1].focus();
        picks[idx - 1].scrollIntoView({ block: "nearest" });
      } else if (idx <= 0) {
        const input = document.getElementById("searchInput");
        if (input) input.focus();
      }
    }
  }
});

if (!window.location.hash) updateRouteHash("verbs", { replace: true });
if (!applyRouteHash()) {
  updateRouteHash("verbs", { replace: true });
  resetVerbLanding();
  render();
}
updateFloatingTopButton();

    </script>
  </body>
