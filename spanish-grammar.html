<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Spanish Grammar</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f6f3ee;
  --surface: #fffdf8;
  --surface-2: #f0ebe2;
  --text: #20201d;
  --muted: #6e675d;
  --line: #d9d0c3;
  --accent: #c43d31;
  --accent-2: #176b5b;
  --accent-soft: #fde7e1;
  --success: #1f7a4d;
  --success-soft: #dff4e9;
  --danger: #b9362e;
  --danger-soft: #fde2dc;
  --page-width: 980px;
  --shadow: 0 18px 50px rgba(57, 45, 30, 0.12);
}

body.dark {
  color-scheme: dark;
  --bg: #191a17;
  --surface: #24251f;
  --surface-2: #303128;
  --text: #f6f1e8;
  --muted: #bbb3a6;
  --line: #464237;
  --accent: #f36f5d;
  --accent-2: #5cc4ac;
  --accent-soft: #402621;
  --success: #71d39b;
  --success-soft: #193325;
  --danger: #ff8a78;
  --danger-soft: #3d201c;
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}

button,
input {
  font: inherit;
}

.app-shell {
  width: min(var(--page-width), calc(100vw - 28px));
  min-width: 0;
  min-height: 100vh;
  margin: 0 auto;
  padding: 18px 14px 28px;
}

.topbar,
.search-panel,
.content > article,
.content > section,
.selected-verb-panel > article,
.list-grid > article,
.list-grid > section {
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.topbar {
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 18px 16px 24px;
  border-radius: 8px;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 7px;
  background: linear-gradient(180deg, #c43d31 0 25%, #f1c232 25% 75%, #c43d31 75% 100%);
}

.brand-block {
  display: grid;
  gap: 10px;
}

.brand-kicker {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
}

.brand-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.brand-stats span {
  border: 1px solid color-mix(in srgb, var(--accent-2) 42%, var(--line));
  border-radius: 999px;
  padding: 4px 9px;
  background: color-mix(in srgb, var(--success-soft) 52%, var(--surface));
  color: var(--accent-2);
  font-size: 12px;
  font-weight: 900;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(28px, 6vw, 40px);
  line-height: 1;
}

#homeTitle {
  cursor: pointer;
}

h2 {
  margin-bottom: 4px;
  font-size: 25px;
}

h3 {
  margin-bottom: 10px;
  font-size: 18px;
}

.icon-button,
.favorite-button {
  display: inline-grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
}

.search-panel {
  padding: 14px;
  border-radius: 8px;
}

.search-panel label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.search-row {
  display: grid;
  gap: 8px;
}

input[type="search"] {
  min-width: 0;
  height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px;
  background: var(--surface-2);
  color: var(--text);
}

.muted {
  color: var(--muted);
}

.tabs {
  position: sticky;
  top: 0;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(5, minmax(72px, 1fr));
  gap: 6px;
  margin: 12px 0 0;
  padding: 8px 0 6px;
  overflow-x: auto;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(12px);
}

.tab {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-weight: 800;
  white-space: nowrap;
}

.tab.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.content {
  display: grid;
  gap: 12px;
  margin-top: 6px;
}

.content > *,
.list-grid > * {
  min-width: 0;
}

.verb-card,
.info-card {
  width: 100%;
  padding: 16px;
  border-radius: 8px;
}

.info-card[id] {
  scroll-margin-top: 72px;
}

.card-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0;
}

.chips:empty {
  display: none;
}

.chip {
  padding: 6px 9px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.chip.alert {
  background: var(--accent-soft);
  color: var(--accent);
}

.action-row,
.quick-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0;
}

.quick-nav {
  margin-bottom: 0;
}

.tense-group {
  display: grid;
  gap: 8px;
  width: 100%;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.tense-group-title {
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.tense-group-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 8px;
}

.tense-nav-button {
  justify-content: start;
  min-height: 86px;
  padding: 10px;
  text-align: left;
}

.tense-nav-button.is-rare {
  opacity: 0.68;
}

.tense-nav-button:hover,
.tense-nav-button:focus-visible {
  opacity: 1;
}

.tense-nav-main {
  display: grid;
  gap: 3px;
  min-width: 0;
}

.tense-nav-main span,
.tense-nav-main small {
  overflow-wrap: anywhere;
}

.tense-nav-main span {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}

.tense-nav-main small {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.tense-badge {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  min-height: 22px;
  border: 1px solid color-mix(in srgb, var(--accent-2) 35%, var(--line));
  border-radius: 999px;
  padding: 2px 7px;
  background: var(--success-soft);
  color: var(--accent-2);
  font-size: 11px;
  font-weight: 900;
}

.tense-badge.compound {
  border-color: var(--line);
  background: var(--surface);
  color: var(--muted);
}

.tense-badge.rare {
  border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
  background: var(--accent-soft);
  color: var(--accent);
}

.content > section.group-heading {
  margin-top: 8px;
  padding: 20px 4px 6px;
  border: 0;
  border-top: 2px solid var(--line);
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.content > section.group-heading h2 {
  margin-bottom: 3px;
  color: var(--accent-2);
  font-size: 17px;
  text-transform: uppercase;
}

.content > section.group-heading .muted {
  margin-bottom: 0;
}

.content > section.subgroup-heading {
  margin-top: 2px;
  padding: 10px 4px 0;
  border: 0;
  background: transparent;
  box-shadow: none;
}

.content > section.subgroup-heading h3 {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.table-summary,
.table-mistake {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: var(--surface-2);
}

.table-summary strong,
.table-mistake strong {
  color: var(--accent-2);
}

.table-mistake {
  border-color: color-mix(in srgb, var(--accent) 36%, var(--line));
  background: color-mix(in srgb, var(--accent-soft) 56%, var(--surface));
}

.table-card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.tense-card-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
}

.tense-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.tense-title-row h2 {
  margin-bottom: 0;
}

.tense-card-head .chip {
  flex: 0 1 auto;
  max-width: 42%;
  text-align: right;
}

.tense-actions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin: 12px 0;
}

.tense-actions .small-button {
  min-width: 0;
}

.tense-actions.is-compact {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.filter-tabs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
  margin: 12px 0;
}

.filter-tabs .small-button.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.table-filter-tabs {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.table-subgroup-tabs {
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  margin-top: 0;
  margin-bottom: 4px;
}

.table-subgroup-tabs .small-button {
  font-size: 12px;
  min-height: 32px;
  padding: 0 8px;
}

.table-search {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  outline: none;
  margin: 8px 0;
}
.table-search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
}
.table-search-count {
  margin: -4px 0 8px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
}

@media (min-width: 640px) {
  .table-filter-tabs {
    grid-template-columns: repeat(4, 1fr);
  }
}

.toc-toggle {
  width: 100%;
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.7;
}

.toc-toggle:hover {
  opacity: 1;
}

.filter-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 9px;
  background: var(--bg);
  color: var(--text-muted);
  margin-left: 4px;
  line-height: 1;
}

.small-button.is-active .filter-count {
  background: rgba(255,255,255,0.25);
  color: white;
}

.mood-tabs {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin-top: 12px;
}

.mood-tabs .small-button {
  height: auto;
  min-height: 50px;
  padding: 7px 10px;
}

.mood-tabs .small-button span,
.mood-tabs .small-button small {
  display: block;
}

.mood-tabs .small-button small {
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.mood-tabs .small-button.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.mood-tabs .small-button.is-active small {
  color: white;
}

.mood-chooser-block {
  display: grid;
  gap: 10px;
  margin: 12px 0;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.mood-chooser-block h2,
.mood-chooser-block h3 {
  margin-bottom: 0;
}

.choice-grid,
.mood-trigger-groups,
.confusion-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.choice-card,
.mood-trigger-group,
.confusion-card,
.mood-quiz-card,
.condicional-note {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: var(--surface-2);
}

.choice-card strong,
.mood-trigger-group strong,
.confusion-card strong,
.mood-quiz-card strong {
  display: block;
  margin-bottom: 4px;
  color: var(--accent-2);
}

.choice-card span,
.mood-trigger-group span,
.confusion-card span,
.mood-quiz-card span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.mood-quiz-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.condicional-note {
  margin: 10px 0;
  border-color: color-mix(in srgb, var(--accent-2) 45%, var(--line));
  background: color-mix(in srgb, var(--success-soft) 58%, var(--surface));
}

.condicional-note strong,
.condicional-note span {
  display: block;
}

.condicional-note span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.mood-tense-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tense-detail-block {
  margin-top: 12px;
}

.example-grid,
.condition-grid {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}

.example-card,
.condition-card {
  display: grid;
  gap: 4px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.example-card strong,
.condition-card strong {
  color: var(--accent-2);
}

.condition-card code {
  width: fit-content;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 7px;
  background: var(--surface);
  color: var(--accent);
  font: inherit;
  font-size: 12px;
  font-weight: 900;
}

.detail-list {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}

.detail-list div {
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.small-button {
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 10px;
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  font-weight: 800;
}

.small-button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.small-button.primary {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}

.small-button.success {
  border-color: color-mix(in srgb, var(--success) 60%, var(--line));
  background: var(--success-soft);
  color: var(--success);
}

.small-button.danger {
  border-color: color-mix(in srgb, var(--danger) 60%, var(--line));
  background: var(--danger-soft);
  color: var(--danger);
}

.term-button {
  display: grid;
  gap: 2px;
  height: auto;
  min-height: 44px;
  text-align: left;
}

.term-button span,
.term-button small {
  min-width: 0;
}

.term-button small {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.state-note {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  margin-top: 2px;
  padding: 4px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.forms-line {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin: 10px 0 14px;
}

.forms-line div {
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

dt {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

dd {
  margin: 2px 0 0;
  font-weight: 800;
}

.table-wrap {
  min-width: 0;
  overflow-x: visible;
}

.table-card .table-wrap {
  display: none;
}
.table-card.is-open .table-wrap {
  display: block;
  animation: tableFadeIn 0.18s ease;
}

@keyframes tableFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

table {
  width: 100%;
  min-width: 0;
  table-layout: fixed;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 8px;
}

th,
td {
  padding: 10px;
  border: 1px solid var(--line);
  text-align: left;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: normal;
  vertical-align: top;
}

th {
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
}

td.irregular {
  color: var(--accent);
  font-weight: 900;
}

.compact-exceptions {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.compact-exceptions h3 {
  margin-bottom: 8px;
}

.exception-subtable {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.exception-subtable h4 {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.compact-exceptions table {
  min-width: 0;
}

.compact-exceptions th,
.compact-exceptions td {
  padding: 7px 8px;
  font-size: 13px;
  white-space: normal;
}

.compact-forms {
  color: var(--accent);
  font-weight: 900;
}

.grammar-slot {
  display: inline-block;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 0.9em;
  font-weight: 900;
}

.verb-link-button {
  min-height: 28px;
  border: 1px solid color-mix(in srgb, var(--accent-2) 55%, var(--line));
  border-radius: 8px;
  padding: 3px 8px;
  background: var(--surface-2);
  color: var(--accent-2);
  cursor: pointer;
  font: inherit;
  font-weight: 900;
}

.verb-link-button:hover {
  border-color: var(--accent-2);
  background: var(--success-soft);
}

.selected-verb-panel table th .verb-link-button {
  width: 100%;
  text-align: left;
}

.list-grid {
  display: grid;
  gap: 10px;
}

.selected-verb-panel {
  min-width: 0;
}

.verb-list-card {
  display: grid;
  gap: 12px;
}

.verb-list {
  display: grid;
  gap: 8px;
}

.verb-list.is-suggestions {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  column-gap: 22px;
  row-gap: 10px;
}

.verb-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: stretch;
  gap: 8px;
}

.verb-pick {
  min-width: 0;
  min-height: 58px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  text-align: left;
}

.verb-pick,
.verb-row-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.verb-pick strong,
.verb-pick small {
  display: block;
}

.verb-pick strong {
  font-size: 17px;
}

.verb-pick small {
  margin-top: 2px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.verb-row-meta {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}

.verb-row-meta span {
  padding: 5px 7px;
  border-radius: 999px;
  background: var(--surface);
}

.verb-row-meta span.badge-regular {
  background: color-mix(in srgb, var(--success) 15%, transparent);
  color: var(--success);
}

.verb-row-meta span.badge-irregular {
  background: color-mix(in srgb, var(--accent-2) 18%, transparent);
  color: var(--accent-2);
}

.verb-row-meta span.badge-special {
  background: color-mix(in srgb, var(--danger) 15%, transparent);
  color: var(--danger);
}

.verb-row-meta span.badge-stem {
  background: color-mix(in srgb, #e6a817 15%, transparent);

function tenseById(id) {

function isReflexive(verb) {

function baseVerb(verb) {

function verbType(verb) {
  const b = baseVerb(verb);
  if (b.endsWith("ar")) return "ar";
  if (b.endsWith("er")) return "er";

function stem(verb) {

function generatedPresent(verb) {
  if (IRREGULARS[verb]?.presente) return IRREGULARS[verb].presente;
  const type = verbType(verb);
  const endings = TENSES[0].endings[type];
  const base = endings.map((ending) => stem(verb) + ending);
  const yoIrregulars = [
    ["tener", "tengo"], ["poner", "pongo"], ["venir", "vengo"], ["salir", "salgo"],
    ["hacer", "hago"], ["decir", "digo"], ["traer", "traigo"], ["caer", "caigo"],
    ["oir", "oigo"], ["valer", "valgo"]
  ];
  for (const [ending, yo] of yoIrregulars) {
    if (verb.endsWith(ending)) base[0] = verb.slice(0, -ending.length) + yo;
  }
  if (verb.endsWith("ducir")) base[0] = verb.slice(0, -3) + "zco";
  else if (verb.endsWith("cer") || verb.endsWith("cir")) base[0] = verb.slice(0, -3) + "zco";
  else if (verb.endsWith("ger") || verb.endsWith("gir")) base[0] = verb.slice(0, -3) + "jo";
  else if (verb.endsWith("guir")) base[0] = stemChange(verb.slice(0, -4) + "g", "e", "i") + "o";
  if (verb.endsWith("uir")) {
    const root = stem(verb);
    base[0] = root + "yo";
    base[1] = root + "yes";
    base[2] = root + "ye";
    base[5] = root + "yen";
  }

  const stemChangeSpec = [
    ["e", "ie"], ["o", "ue"], ["e", "i"], ["u", "ue"]
  ].find(([from, to]) => hasStemChange(verb, from, to));
  if (stemChangeSpec) {
    const [from, to] = stemChangeSpec;
    [0, 1, 2, 5].forEach((index) => {
      if (!(index === 0 && base[0] !== stem(verb) + endings[0])) {
        base[index] = stemChange(stem(verb), from, to) + endings[index];
      }
    });
  }
  return base.some((form, index) => form !== stem(verb) + endings[index]) ? base : null;
}

function irregularIndefinido(verb) {
  const irregular = IRREGULARS[verb]?.indefinido;

    const endings = stem.endsWith("j")

  if (thirdPerson) return thirdPerson;

function irregularIndefinidoStem(verb) {
  const patterns = [
    ["tener", "tuv"], ["venir", "vin"], ["poner", "pus"], ["decir", "dij"],
    ["traer", "traj"], ["ducir", "duj"]
  ];
  for (const [ending, replacement] of patterns) {
    if (verb.endsWith(ending)) {
      return verb.slice(0, -ending.length) + replacement;
    }
  }
  if (verb === "andar") return "anduv";
  if (verb === "caber") return "cup";
  if (verb === "querer") return "quis";
  if (verb === "saber") return "sup";
  if (verb === "hacer") return "hic";
  if (verb === "estar") return "estuv";
  if (verb === "poder") return "pud";

function irregularFutureStem(verb) {
  const exact = {
    caber: "cabr",
    decir: "dir",
    haber: "habr",
    hacer: "har",
    poder: "podr",
    querer: "querr",
    saber: "sabr"
  };
  if (exact[verb]) return exact[verb];
  const patterns = [
    ["poner", "pondr"],
    ["salir", "saldr"],
    ["tener", "tendr"],
    ["valer", "valdr"],
    ["venir", "vendr"]
  ];
  for (const [ending, replacement] of patterns) {
    if (verb.endsWith(ending)) {

function thirdPersonStemChangeIndefinido(verb) {
  if (!verb.endsWith("ir")) return null;
  const base = regularIndefinido(verb);
  if (hasStemChange(verb, "e", "i")) {
    const changed = stemChange(stem(verb), "e", "i");
    base[2] = changed + "ió";
    base[5] = changed + "ieron";
    return base;
  }
  if (hasStemChange(verb, "o", "u")) {
    const changed = stemChange(stem(verb), "o", "u");
    base[2] = changed + "ió";
    base[5] = changed + "ieron";
    return base;

  if (verb.endsWith("uir")) {
    const root = stem(verb);

function orthographicIndefinido(verb) {
  if (!verb.endsWith("ar")) return null;
  const forms = null;
  if (verb.endsWith("car")) {
    const root = verb.slice(0, -3) + "qu";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];

  if (verb.endsWith("gar")) {
    const root = verb.slice(0, -3) + "gu";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];
  }
  if (verb.endsWith("zar")) {
    const root = verb.slice(0, -3) + "c";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];

  return forms;

function generatedSubjuntivoPresente(verb) {
  if (IRREGULARS[verb]?.subjuntivo_presente) return IRREGULARS[verb].subjuntivo_presente;
  const a = ["a", "as", "a", "amos", "áis", "an"];

  const make = (root, endings) => endings.map((ending) => root + ending);
  if (verb.endsWith("tener")) return make(verb.slice(0, -5) + "teng", a);
  if (verb.endsWith("poner")) return make(verb.slice(0, -5) + "pong", a);
  if (verb.endsWith("venir")) return make(verb.slice(0, -5) + "veng", a);
  if (verb.endsWith("salir")) return make(verb.slice(0, -5) + "salg", a);
  if (verb.endsWith("traer")) return make(verb.slice(0, -5) + "traig", a);
  if (verb.endsWith("caer")) return make(verb.slice(0, -4) + "caig", a);
  if (verb === "oir") return make("oig", a);
  if (verb.endsWith("valer")) return make(verb.slice(0, -5) + "valg", a);
  if (verb.endsWith("ducir")) return make(verb.slice(0, -3) + "zc", a);
  if (verb.endsWith("cer") || verb.endsWith("cir")) return make(verb.slice(0, -3) + "zc", a);
  if (verb.endsWith("ger") || verb.endsWith("gir")) {
    let root = verb.slice(0, -3) + "j";
    if (hasStemChange(verb, "e", "i")) root = stemChange(verb.slice(0, -3), "e", "i") + "j";
    return make(root, a);
  }
  if (verb.endsWith("guir")) return make(stemChange(verb.slice(0, -4) + "g", "e", "i"), a);
  if (verb.endsWith("uir")) return make(stem(verb) + "y", a);
  if (verb.endsWith("gar") && hasStemChange(verb, "u", "ue")) {
    return make(stemChange(stem(verb), "u", "ue") + "u", e);
  }

  if (verb.endsWith("gar")) return make(verb.slice(0, -3) + "gu", e);

    const root = hasStemChange(verb, "e", "ie")
      ? stemChange(stem(verb), "e", "ie").slice(0, -1) + "c"

    if (index === 3 || index === 4) {
      if (from === "e" && to === "i") root = stemChange(root, "e", "i");
      else if (from === "e" && to === "ie" && verb.endsWith("ir")) root = stemChange(root, "e", "i");
      else if (from === "o" && to === "ue" && verb.endsWith("ir")) root = stemChange(root, "o", "u");
    } else {
      root = stemChange(root, from, to);
    }
    return root + ending;
  });
}

function generatedParticiple(verb) {
  const participles = [
    ["satisfacer", "satisfecho"], ["absolver", "absuelto"],
    ["abrir", "abierto"], ["cubrir", "cubierto"], ["escribir", "escrito"],
    ["poner", "puesto"], ["volver", "vuelto"], ["resolver", "resuelto"],
    ["romper", "roto"], ["ver", "visto"], ["hacer", "hecho"], ["decir", "dicho"],
    ["morir", "muerto"], ["freir", "frito"], ["imprimir", "impreso"], ["pudrir", "podrido"]
  ];
  for (const [ending, form] of participles) {
    if (verb.endsWith(ending)) return verb.slice(0, -ending.length) + form;
  }
  return null;
}

function hasStemChange(verb, from, to) {
  const groups = {
    "e:ie": ["tener", "venir", "pensar", "cerrar", "empezar", "comenzar", "querer", "entender", "perder", "preferir", "sentir", "mentir", "convertir", "divertir", "advertir", "sugerir", "atravesar", "calentar", "apretar", "acertar"],
    "o:ue": ["poder", "dormir", "morir", "volver", "devolver", "recordar", "contar", "costar", "mostrar", "probar", "almorzar", "soñar", "mover", "morder", "sonar"],
    "e:i": ["pedir", "repetir", "servir", "vestir", "seguir", "conseguir", "perseguir", "elegir", "corregir", "competir", "impedir", "medir", "despedir", "reir", "sonreir", "freir"],
    "u:ue": ["jugar"]
  };
  return groups[`${from}:${to}`]?.some((ending) => verb.endsWith(ending));
}

function stemChange(value, from, to) {
  const index = value.lastIndexOf(from);
  if (index < 0) return value;
  return value.slice(0, index) + to + value.slice(index + from.length);
}

function formsFor(verb) {
  const irregular = IRREGULARS[verb] || {};
  return {
    presente: irregular.presente || regularPresent(verb),
    perfecto: compound("presente", verb),
    indefinido: irregularIndefinido(verb) || regularIndefinido(verb),
    imperfecto: irregular.imperfecto || regularImperfecto(verb),
    pluscuamperfecto: compound("imperfecto", verb),
    preterito_anterior: compound("indefinido", verb),
    futuro: regularFuture(verb),
    futuro_perfecto: compound("futuro", verb),
    condicional: regularCondicional(verb),
    condicional_compuesto: compound("condicional", verb),
    subjuntivo_presente: irregular.subjuntivo_presente || regularSubjuntivoPresente(verb),
    subjuntivo_perfecto: compound("subjPresente", verb),
    subjuntivo_imperfecto: irregular.subjuntivo_imperfecto || regularSubjuntivoImperfecto(verb),
    subjuntivo_pluscuamperfecto: compound("subjImperfecto", verb),
    subjuntivo_futuro: regularSubjuntivoFuturo(verb),
    subjuntivo_futuro_perfecto: compound("subjFuturo", verb),
    imperativo_afirmativo: irregular.imperativo_afirmativo || regularImperativoAfirmativo(verb),
    imperativo_negativo: (irregular.subjuntivo_presente || regularSubjuntivoPresente(verb)).map((form, index) => index === 0 ? "-" : `no ${form}`),
    formas_no_personales: [verb, gerund(verb), participle(verb), "-", "-", "-"]
  };
}

function verbInfo(verb) {
  const irregular = IRREGULARS[verb];
  const typeLabel = isReflexive(verb) ? `-${verbType(verb)} -se` : `-${verbType(verb)}`;
  return {
    infinitive: verb,
    displayInfinitive: displayInfinitive(verb),
    ru: translationFor(verb),
    type: typeLabel,
    tags: irregular?.tags || generatedTags(verb),
    participle: participle(verb),
    gerund: gerund(verb),
    forms: formsFor(verb),
    irregular: Boolean(irregular),
    reflexive: isReflexive(verb)
  };
}

function displayInfinitive(verb) {
  return DISPLAY_INFINITIVES[verb] || verb;
}

function translationFor(verb) {
  if (IRREGULARS[verb]?.ru) return IRREGULARS[verb].ru;
  if (TRANSLATIONS[verb]) return TRANSLATIONS[verb];
  if (verb.endsWith("se")) {
    const base = verb.slice(0, -2);
    if (TRANSLATIONS[base]) return `${TRANSLATIONS[base]} себя / возвратное действие`;
  }
  if (verb.startsWith("des") && TRANSLATIONS[verb.slice(3)]) {
    return `обратное действие: ${TRANSLATIONS[verb.slice(3)]}`;
  }
  if (verb.startsWith("re") && TRANSLATIONS[verb.slice(2)]) {
    return `снова / повторно: ${TRANSLATIONS[verb.slice(2)]}`;
  }
  return "перевод уточняется";
}

function generatedTags(verb) {
  const tags = ["правильный", `-${verbType(verb)}`, ...verbExceptionLabels(verb)];
  if (isReflexive(verb)) tags.push("-se");
  return Array.from(new Set(tags));
}

function filteredVerbs() {
  const query = normalize(state.query);
  if (!query) {
    return COMMON_VERB_SUGGESTIONS.filter((verb) => BASE_VERBS.includes(verb));
  }
  return BASE_VERBS
    .map((verb, index) => ({ verb, index, score: searchScore(verb, query) }))
    .filter((item) => item.score < 100)
    .sort((a, b) => a.score - b.score || a.index - b.index)
    .map((item) => item.verb);
}

function fuzzyMatch(query, target) {
  let qi = 0;
  for (let ti = 0; ti < target.length && qi < query.length; ti++) {
    if (query[qi] === target[ti]) qi++;
  }
  return qi === query.length;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 2) return 99;
  let prev = [];
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i - 1] === b[j - 1] ? prev[j - 1] : 1 + Math.min(prev[j - 1], prev[j], curr[j - 1]);
    }
    prev = curr;
  }
  return prev[n];
}

function searchScore(verb, query) {
  const info = verbInfo(verb);
  const infinitive = normalize(info.infinitive);
  const display = normalize(info.displayInfinitive);
  const ru = normalize(info.ru);
  const forms = Object.values(info.forms).flat().map(normalize);
  const isShortQuery = query.length < 3;
  if (infinitive === query || display === query) return 0;
  if (infinitive.startsWith(query) || display.startsWith(query)) return 1;
  if (forms.some((form) => form === query)) return 2;
  if (forms.some((form) => form.startsWith(query))) return 3;
  if (wordStartsWith(ru, query)) return 4;
  if (!isShortQuery && ru.includes(query)) return 5;
  if (!isShortQuery && (infinitive.includes(query) || display.includes(query))) return 6;
  if (!isShortQuery && forms.some((form) => form.includes(query))) return 7;
  if (!isShortQuery && normalize([info.infinitive, info.displayInfinitive, info.ru, info.participle, info.gerund].join(" ")).includes(query)) return 8;
  if (!isShortQuery && (fuzzyMatch(query, infinitive) || fuzzyMatch(query, display))) return 9;
  if (!isShortQuery && fuzzyMatch(query, ru)) return 9;
  if (!isShortQuery && forms.some((form) => fuzzyMatch(query, form))) return 9;
  if (query.length >= 4 && levenshtein(query, infinitive) <= 2) return 10;
  if (query.length >= 4 && levenshtein(query, display) <= 2) return 10;
  return 100;
}

function normalize(value) {
  return value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function wordStartsWith(value, query) {
  return normalize(value)
    .split(/[\s,;/()]+/)
    .filter(Boolean)
    .some((word) => word.startsWith(query));
}

function saveCards() {
  localStorage.setItem("msg:cards", JSON.stringify(state.cards));
}

function toggleCard(verb) {
  const wasSaved = state.cards.includes(verb);
  state.cards = wasSaved
    ? state.cards.filter((item) => item !== verb)
    : [...state.cards, verb];
  state.cardFeedback = { verb, added: !wasSaved };
  saveCards();
  render();
  window.setTimeout(() => {
    if (state.cardFeedback?.verb === verb) {
      state.cardFeedback = null;
      render();
    }
  }, 900);
}

function resetVerbLanding() {
  state.view = "verbs";
  state.query = "";
  state.selectedVerb = null;
  state.verbCardMode = "basic";
}

function setView(view) {
  if (view === "verbs") {
    resetVerbLanding();
  } else {
    state.view = view;
  }
  syncActiveTab(view);
  render();
}

function renderVerbCard(verb) {
  const template = $(SELECTORS.verbTemplate);
  const node = template.content.firstElementChild.cloneNode(true);
  const info = verbInfo(verb);
  node.querySelector("h2").textContent = info.displayInfinitive;
  node.querySelector(".muted").textContent = info.ru;

  const favoriteButton = node.querySelector(".favorite-button");
  favoriteButton.textContent = state.cards.includes(verb) ? "★" : "☆";
  favoriteButton.setAttribute("aria-label", state.cards.includes(verb) ? "Убрать из избранного" : "Добавить в избранное");
  favoriteButton.title = "Избранное";
  favoriteButton.classList.toggle("is-card-feedback", state.cardFeedback?.verb === verb);
  favoriteButton.addEventListener("click", () => toggleCard(verb));

  const chips = node.querySelector(".chips");
  chips.insertAdjacentHTML("beforebegin", verbPassport(info));

  const line = node.querySelector(".forms-line");
  [
    ["Gerundio", info.gerund],
    ["Participio", info.participle]
  ].forEach(([label, value]) => {
    const item = document.createElement("div");
    item.innerHTML = `<dt>${label}</dt><dd>${value}</dd>`;
    line.appendChild(item);
  });

  const wrap = node.querySelector(".table-wrap");
  wrap.insertAdjacentHTML("beforebegin", `
    <div class="verb-card-tabs" aria-label="Режим карточки глагола">
      <button class="small-button ${state.verbCardMode === "basic" ? "is-active" : ""}" type="button" data-verb-mode="basic">Основные</button>
      <button class="small-button ${state.verbCardMode === "all" ? "is-active" : ""}" type="button" data-verb-mode="all">Все времена</button>
    </div>
  `);
  node.querySelectorAll("[data-verb-mode]").forEach((button) => {
    button.addEventListener("click", () => {
      state.verbCardMode = button.dataset.verbMode;
      renderVerbs();
      scrollToCard("content");
    });
  });
  wrap.insertAdjacentHTML("beforebegin", `<div class="state-note">Красным выделены формы, которые отличаются от регулярного шаблона.</div>`);
  if (state.verbCardMode === "all") {
    wrap.appendChild(conjugationTable(info, TENSES.filter((tense) => tense.id !== "formas_no_personales").map((tense) => tense.id)));
  } else {
    wrap.appendChild(conjugationTable(info, MAIN_VERB_TENSE_IDS));
  }
  return node;
}

function verbPassport(info) {
  const verb = info.infinitive;
  const reflexive = isReflexive(verb);
  const baseType = verbType(verb);
  const rawTags = info.tags || [];
  const badges = [];

  badges.push(`<span>- ${baseType}</span>`);

  if (reflexive) {
    badges.push(`<span class="badge-reflexive" title="Возвратный глагол">-se</span>`);
  }

  const status = rawTags.includes("полностью неправильный")
    ? "полностью неправильный"
    : hasIrregularBehavior(info)
      ? "неправильный"
      : "правильный";

  const exceptions = verbExceptionLabels(verb);
  const tooltip = exceptions.length > 0 ? exceptions.join(" · ") : status;

  if (status === "правильный") {
    badges.push(`<span class="badge-regular" title="Правильный глагол">правильный</span>`);
  } else if (status === "полностью неправильный") {
    badges.push(`<span class="badge-special" title="${escapeHTML(tooltip)}">полностью неправильный</span>`);
  } else {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">неправильный</span>`);
  }

  if (rawTags.includes("вспомогательный")) {
    badges.push(`<span title="Вспомогательный глагол">вспомогательный</span>`);
  }

  return `<div class="verb-passport">${badges.join("")}</div>`;
}

function hasYoIrregular(verb) {
  const forms = formsFor(verb).presente;
  const regular = regularPresentPattern(verb);
  return Boolean(forms?.[0] && regular?.[0] && normalize(forms[0]) !== normalize(regular[0]));
}

function hasFullPresentIrregular(verb) {
  const forms = formsFor(verb).presente || [];
  const regular = regularPresentPattern(verb);
  const different = forms.filter((form, index) => regular[index] && normalize(form) !== normalize(regular[index])).length;
  return different >= 4 && !hasStemChange(verb, "e", "ie") && !hasStemChange(verb, "o", "ue") && !hasStemChange(verb, "e", "i") && !hasStemChange(verb, "u", "ue");
}

function hasSpecialSubjuntivo(verb) {
  const forms = formsFor(verb).subjuntivo_presente || [];
  const regular = regularSubjuntivoPresentePattern(verb);
  return forms.some((form, index) => regular[index] && normalize(form) !== normalize(regular[index]));
}

function hasIrregularParticiple(verb) {
  return normalize(participle(verb)) !== normalize(regularParticiplePattern(verb));
}

function hasThirdPersonIndefinidoChange(verb) {
  return Boolean(thirdPersonStemChangeIndefinido(verb));
}

function hasIndefinidoSpecialStem(verb) {
  return Boolean(IRREGULARS[verb]?.indefinido || irregularIndefinidoStem(verb));
}

function hasOrthographicIndefinidoChange(verb) {
  return Boolean(orthographicIndefinido(verb));
}

function hasCompletelyIrregularProfile(verb) {
  return ["ser", "ir"].includes(verb);
}

function verbExceptionLabels(verb) {
  const labels = [];
  if (hasCompletelyIrregularProfile(verb)) labels.push("полностью особые формы");
  if (hasFullPresentIrregular(verb)) labels.push("presente: особые формы");
  else if (hasYoIrregular(verb)) labels.push("yo: особая форма");
  if (hasStemChange(verb, "e", "ie")) labels.push("смена корня: e → ie");
  if (hasStemChange(verb, "o", "ue")) labels.push("смена корня: o → ue");
  if (hasStemChange(verb, "e", "i")) labels.push("смена корня: e → i");
  if (hasStemChange(verb, "u", "ue")) labels.push("смена корня: u → ue");
  if (hasIndefinidoSpecialStem(verb)) labels.push("indefinido: особая основа");
  else if (hasThirdPersonIndefinidoChange(verb)) labels.push("indefinido: 3-е лицо меняет корень");
  else if (hasOrthographicIndefinidoChange(verb)) labels.push("indefinido: орфографическая замена");
  if (irregularFutureStem(verb)) labels.push("futuro/condicional: особая основа");
  if (hasSpecialSubjuntivo(verb)) labels.push("subjuntivo: особая форма");
  if (hasIrregularParticiple(verb)) labels.push("participio: особая форма");
  return Array.from(new Set(labels));
}

function conjugationTable(info, tenseIds = MAIN_VERB_TENSE_IDS) {
  const table = document.createElement("table");
  const head = document.createElement("thead");
  head.innerHTML = `<tr><th>Время</th>${PEOPLE.map((person) => `<th>${person}</th>`).join("")}</tr>`;
  table.appendChild(head);

  const body = document.createElement("tbody");
  tenseIds.map(tenseById).filter(Boolean).forEach((tense) => {
    const row = document.createElement("tr");
    const forms = info.forms[tense.id];
    row.innerHTML = `<th><button class="verb-link-button" type="button" data-open-tense="${tense.id}">${verbTenseLabel(tense)}</button></th>${forms.map((form, index) => {
      const cls = isIrregularForm(info.infinitive, tense.id, form, index) ? " class=\"irregular\"" : "";
      return `<td${cls}>${form}</td>`;
    }).join("")}`;
    body.appendChild(row);
  });
  table.appendChild(body);
  table.addEventListener("click", (event) => {
    const button = event.target.closest("[data-open-tense]");
    if (!button) return;
    openTenseFromVerb(button.dataset.openTense);
  });
  return table;
}

function verbTenseLabel(tense) {
  const labels = {
    presente: "Presente",
    perfecto: "Perfecto Compuesto",
    indefinido: "Indefinido",
    imperfecto: "Imperfecto",
    pluscuamperfecto: "Pluscuamperfecto",
    preterito_anterior: "Pretérito Anterior",
    futuro: "Futuro",
    futuro_perfecto: "Futuro Perfecto",
    condicional: "Condicional",
    condicional_compuesto: "Condicional Compuesto",
    subjuntivo_presente: "Subj. Presente",
    subjuntivo_perfecto: "Subj. Perfecto",
    subjuntivo_imperfecto: "Subj. Imperfecto",
    subjuntivo_pluscuamperfecto: "Subj. Pluscuamperfecto",
    subjuntivo_futuro: "Subj. Futuro",
    subjuntivo_futuro_perfecto: "Subj. Futuro Perfecto",
    imperativo_afirmativo: "Imperativo +",
    imperativo_negativo: "Imperativo -"
  };
  return labels[tense.id] || tense.name;
}

function singleTenseTable(verbs, tenseId) {
  const table = document.createElement("table");
  table.innerHTML = `<thead><tr><th>Глагол</th>${PEOPLE.map((person) => `<th>${person}</th>`).join("")}</tr></thead>`;
  const body = document.createElement("tbody");

    const info = verbInfo(verb);

    const forms = info.forms[tenseId] || [];
    row.innerHTML = `<th>${info.displayInfinitive}</th>${PEOPLE.map((_, index) => `<td>${forms[index] || "-"}</td>`).join("")}`;
    body.appendChild(row);
  });
  table.appendChild(body);
  return table;
}

function selectedTenseOnlyTable(verb, tenseId) {
  const info = verbInfo(verb);
  const table = document.createElement("table");
  table.innerHTML = `<thead><tr>${PEOPLE.map((person) => `<th>${person}</th>`).join("")}</tr></thead>`;
  const body = document.createElement("tbody");
  body.innerHTML = `<tr>${PEOPLE.map((_, index) => `<td class="irregular">${info.forms[tenseId]?.[index] || "-"}</td>`).join("")}</tr>`;
  table.appendChild(body);
  return table;
}

function regularFormsForComparison(verb, tenseId) {
  const compoundAux = COMPOUND_TENSE_AUX[tenseId];
  if (compoundAux) return compoundPattern(compoundAux, verb);
  const map = {
    presente: regularPresentPattern,
    indefinido: regularIndefinidoPattern,
    imperfecto: regularImperfecto,
    futuro: regularFuturePattern,
    condicional: regularCondicionalPattern,
    subjuntivo_presente: regularSubjuntivoPresentePattern,
    subjuntivo_imperfecto: regularSubjuntivoImperfecto,
    subjuntivo_futuro: regularSubjuntivoFuturo,
    imperativo_afirmativo: regularImperativoAfirmativoPattern,
    imperativo_negativo: regularImperativoNegativoPattern,
    formas_no_personales: (item) => [item, stem(item) + (verbType(item) === "ar" ? "ando" : "iendo"), regularParticiplePattern(item), "-", "-", "-"]
  };
  return map[tenseId]?.(verb) || null;
}

function isIrregularForm(verb, tenseId, form, index) {
  if (form === "-") return false;
  const regularForms = regularFormsForComparison(verb, tenseId);
  if (!regularForms?.[index]) return false;
  return normalize(form) !== normalize(regularForms[index]);
}

function renderVerbs() {
  const content = clearContent();
  const searchPanel = document.createElement("section");
  searchPanel.className = "search-panel";
  searchPanel.setAttribute("aria-label", "Поиск глаголов");
  searchPanel.innerHTML = `
    <label for="searchInput">Поиск по глаголу, форме или переводу</label>
    <div class="search-row">
      <input id="searchInput" type="search" placeholder="Например: tener, tengo, ser, hecho, делать, идти, быть" value="${state.query}">
    </div>
  `;
  const selectedPanel = document.createElement("div");
  selectedPanel.className = "selected-verb-panel";
  const results = document.createElement("div");
  results.className = "list-grid";
  content.appendChild(searchPanel);

  searchPanel.querySelector("#searchInput").addEventListener("input", (event) => {
    state.query = event.target.value;
    state.verbCardMode = "basic";
    state.searchCursor = -1;
    if (!normalize(state.query)) state.selectedVerb = null;
    renderVerbResults(content, results, selectedPanel);
  });
  renderVerbResults(content, results, selectedPanel);
}

function renderVerbResults(content, results, selectedPanel) {
  results.innerHTML = "";
  selectedPanel.innerHTML = "";
  selectedPanel.remove();
  results.remove();
  const verbs = filteredVerbs();

  if (verbs.length === 0) {
    results.appendChild(infoCard("Ничего не найдено", "Проверь инфинитив. Попробуй без ударения: reir. Можно искать форму: fui, tengo, hecho."));
    content.appendChild(results);
    return;
  }

  const isSearchMode = Boolean(normalize(state.query));
  const isDefaultSuggestionPage = !isSearchMode && !state.selectedVerb;
  const isExactSelectedSearch = isSearchMode && state.selectedVerb && normalize(state.query) === normalize(state.selectedVerb);

  if (isSearchMode && !verbs.includes(state.selectedVerb)) {
    state.selectedVerb = verbs[0];
  }

  if (state.selectedVerb) {
    selectedPanel.appendChild(renderVerbCard(state.selectedVerb));
  }

  if (isSearchMode && !isExactSelectedSearch) {
    results.appendChild(renderBestMatchCard(verbs[0]));
  }

  const listCard = document.createElement("section");
  listCard.className = "info-card verb-list-card";
  listCard.innerHTML = `
    <div class="card-head">
      <div>
        <h2>${state.query ? `Найдено: ${verbs.length}` : "20 частых глаголов"}</h2>
        <p class="muted">${state.query ? "Выбери глагол, чтобы открыть карточку с основными временами." : "Кликни по глаголу из списка или набери слово/форму в поиске, если нужного глагола здесь нет."}</p>
      </div>
    </div>
    <div class="verb-list"></div>
  `;
  const list = listCard.querySelector(".verb-list");
  if (isDefaultSuggestionPage) {
    list.classList.add("is-suggestions");
    COMMON_VERB_SUGGESTIONS
      .filter((verb) => BASE_VERBS.includes(verb))
      .forEach((verb) => list.appendChild(renderVerbListItem(verb, { showBadges: true })));
  } else {
    verbs.forEach((verb) => list.appendChild(renderVerbListItem(verb)));
  }
  if (!isExactSelectedSearch) {
    results.appendChild(listCard);
  }

  if (isSearchMode) {
    if (!isExactSelectedSearch) content.appendChild(results);
    if (state.selectedVerb) content.appendChild(selectedPanel);
  } else {
    if (state.selectedVerb) content.appendChild(selectedPanel);
    content.appendChild(results);
  }
}

function renderBestMatchCard(verb) {
  const info = verbInfo(verb);
  const reason = searchMatchReason(info) || "Самое близкое совпадение по запросу";
  const card = document.createElement("section");
  card.className = "info-card best-match-card";
  card.innerHTML = `
    <div class="card-head">
      <div>
        <h2>Лучшее совпадение</h2>
        <p class="muted">${reason}</p>
      </div>
    </div>

function verbListBadges(info) {
  const verb = info.infinitive;
  const reflexive = isReflexive(verb);
  const baseType = verbType(verb);
  const badges = [];

  const typeLabel = reflexive ? `- ${baseType}` : `-${baseType}`;
  badges.push(`<span>${typeLabel}</span>`);

  if (reflexive) {
    badges.push(`<span class="badge-reflexive" title="Возвратный глагол">-se</span>`);
  }

  if (!hasIrregularBehavior(info)) {
    badges.push(`<span class="badge-regular" title="Правильный глагол">прав.</span>`);
    return badges;
  }

  const exceptions = verbExceptionLabels(verb);
  const tooltip = exceptions.length > 0 ? exceptions.join(" · ") : "Неправильный";

  if (hasCompletelyIrregularProfile(verb)) {
    badges.push(`<span class="badge-special" title="${escapeHTML(tooltip)}">особый</span>`);
  } else if (
    hasStemChange(verb, "e", "ie") ||
    hasStemChange(verb, "o", "ue") ||
    hasStemChange(verb, "e", "i") ||
    hasStemChange(verb, "u", "ue")
  ) {
    const changes = [];
    if (hasStemChange(verb, "e", "ie")) changes.push("e→ie");
    if (hasStemChange(verb, "o", "ue")) changes.push("o→ue");
    if (hasStemChange(verb, "e", "i")) changes.push("e→i");
    if (hasStemChange(verb, "u", "ue")) changes.push("u→ue");
    badges.push(`<span class="badge-stem" title="${escapeHTML(tooltip)}">смена ${changes.join(", ")}</span>`);
  } else if (hasIndefinidoSpecialStem(verb) || irregularFutureStem(verb)) {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">особая основа</span>`);
  } else if (hasYoIrregular(verb)) {
    badges.push(`<span class="badge-yo" title="${escapeHTML(tooltip)}">yo особ.</span>`);
  } else if (hasIrregularParticiple(verb)) {
    badges.push(`<span class="badge-part" title="${escapeHTML(tooltip)}">part.</span>`);
  } else {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">неправ.</span>`);
  }

  return badges;
}

function searchMatchReason(info) {
  const query = normalize(state.query);
  if (!query) return "";
  const formMatch = findFormMatch(info, query);
  if (formMatch) {
    return `Найдено по форме: ${formMatch.form} = ${formMatch.person}, ${formMatch.tense}`;
  }
  if (normalize(info.ru).includes(query)) return "Найдено по русскому переводу";
  if (normalize(info.displayInfinitive).includes(query) || normalize(info.infinitive).includes(query)) return "Найдено по инфинитиву";
  if (normalize(info.participle).includes(query)) return "Найдено по participio";
  if (normalize(info.gerund).includes(query)) return "Найдено по gerundio";
  if (fuzzyMatch(query, normalize(info.displayInfinitive)) || fuzzyMatch(query, normalize(info.infinitive))) return "Найдено по инфинитиву (нечёткий)";
  if (fuzzyMatch(query, normalize(info.ru))) return "Найдено по переводу (нечёткий)";
  return "";
}

function findFormMatch(info, query) {
  for (const tense of TENSES) {
    const forms = info.forms[tense.id] || [];
    const index = forms.findIndex((form) => {
      const n = normalize(form);
      return n === query || n.startsWith(query) || fuzzyMatch(query, n);
    });
    if (index >= 0) {
      return { form: forms[index], person: PEOPLE[index] || "forma", tense: tense.name };
    }
  }
  return null;
}

function highlightSearchMatch(value) {
  const source = String(value);
  const query = normalize(state.query);
  if (!query) return escapeHtml(source);
  const normalizedSource = normalize(source);
  const start = normalizedSource.indexOf(query);
  if (start === -1) return escapeHtml(source);
  const end = start + query.length;
  return [
    escapeHtml(source.slice(0, start)),
    `<mark class="search-mark">${escapeHtml(source.slice(start, end))}</mark>`,
    escapeHtml(source.slice(end))
  ].join("");
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function hasIrregularBehavior(info) {
  return Boolean(
    info.irregular ||
    verbExceptionLabels(info.infinitive).length > 0 ||
    info.tags.some((tag) => tag.includes("неправильный"))
  );
}

function tenseBadge(id) {

function formationTable(tense) {
  if (tense.endings) {
    return endingsTable(tense);
  }
  if (COMPOUND_TENSE_AUX[tense.id]) {
    return compoundPatternTable(COMPOUND_TENSE_AUX[tense.id]);
  }
  if (tense.id === "imperativo_afirmativo") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>Схема</th><th>Пример</th></tr></thead><tbody>
      <tr><td>tú</td><td>обычно 3-е лицо presente</td><td>habla, come, vive</td></tr>
      <tr><td>usted</td><td>${formatFormula("presente de subjuntivo")}</td><td>hable, coma, viva</td></tr>
      <tr><td>vosotros</td><td>${grammarSlot("infinitivo")} без -r + d</td><td>hablad, comed, vivid</td></tr>
      <tr><td>ustedes</td><td>${formatFormula("presente de subjuntivo")}</td><td>hablen, coman, vivan</td></tr>
    </tbody></table></div>`;
  }
  if (tense.id === "imperativo_negativo") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>Схема</th><th>Пример</th></tr></thead><tbody>
      <tr><td>tú</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hables</td></tr>
      <tr><td>usted</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hable</td></tr>
      <tr><td>vosotros</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no habléis</td></tr>
      <tr><td>ustedes</td><td>no + ${grammarSlot("subjuntivo")}</td><td>no hablen</td></tr>
    </tbody></table></div>`;
  }
  if (tense.id === "formas_no_personales") {
    return `<div class="table-wrap"><table><thead><tr><th>Форма</th><th>-ar</th><th>-er</th><th>-ir</th></tr></thead><tbody>
      <tr><td>Infinitivo</td><td>hablar</td><td>comer</td><td>vivir</td></tr>
      <tr><td>Gerundio</td><td>-ando</td><td>-iendo</td><td>-iendo</td></tr>
      <tr><td>Participio</td><td>-ado</td><td>-ido</td><td>-ido</td></tr>
    </tbody></table></div>`;
  }
  return `<p class="muted">Схема образования будет добавлена.</p>`;
}

function compoundPatternTable(auxKey) {
  return `<div class="table-wrap"><table><thead><tr><th>Лицо</th><th>Схема</th></tr></thead><tbody>
    ${PEOPLE.map((person, index) => `<tr><th>${person}</th><td>${HABER_FORMS[auxKey][index]} + ${grammarSlot("participio")}</td></tr>`).join("")}
  </tbody></table></div>`;
}

function endingsTable(tense) {
  const rows = Object.entries(tense.endings).map(([type, endings]) => {
    return `<tr><th>${type === "all" ? grammarSlot("infinitivo") : `-${type}`}</th>${endings.map((ending) => `<td>${formatEnding(ending)}</td>`).join("")}</tr>`;
  }).join("");
  return `<div class="table-wrap"><table><thead><tr><th>Тип</th>${PEOPLE.map((person) => `<th>${person}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function formatEnding(ending) {
  if (ending === "-") return ending;
  return ending.startsWith("-") ? ending : `-${ending}`;
}

function grammarSlot(label) {
  return `<span class="grammar-slot">${label}</span>`;
}

function formatFormula(value) {
  return value.replace(/participio|infinitivo|gerundio|subjuntivo/g, (match) => grammarSlot(match));
}

function tableMatchesFilter(item) {

  if (filter === "all") ok = true;
  else {
    const groups = TABLE_FILTER_GROUPS[filter];
    ok = !groups || groups.some((g) => item.group === g);
  }
  if (!ok) return false;
  if (state.tableSubgroup && item.subgroup !== state.tableSubgroup) return false;
  const q = state.tableQuery && normalize(state.tableQuery);
  if (!q) return true;
  const tableText = item.table ? normalize(item.table.replace(/<[^>]*>/g, " ")) : "";
  const summaryText = item.summary ? normalize(item.summary) : normalize(tableSummary(item));
  const searchText = normalize(item.title + " " + item.description + " " + summaryText + " " + tableText);
  return searchText.includes(q);
}

function getSubgroupsForFilter(filterId) {
  if (filterId === "all") return [];
  const groups = TABLE_FILTER_GROUPS[filterId];
  if (!groups) return [];
  const subgroups = new Set();
  INDEXED_TABLES.forEach((item) => {
    if (groups.some((g) => item.group === g)) {
      subgroups.add(item.subgroup);
    }
  });
  return Array.from(subgroups);
}

function countSubgroupTables(filterId, subgroup) {
  return INDEXED_TABLES.filter((item) => {
    if (filterId === "all") return item.subgroup === subgroup;
    const groups = TABLE_FILTER_GROUPS[filterId];
    if (!groups) return item.subgroup === subgroup;
    return groups.some((g) => item.group === g) && item.subgroup === subgroup;
  }).length;
}

function renderSubgroupFilters(visibleTables) {
  if (state.tableFilter === "all") return "";
  const subgroups = getSubgroupsForFilter(state.tableFilter);
  if (subgroups.length <= 1) return "";
  return `
    <div class="filter-tabs table-subgroup-tabs" aria-label="Подкатегории">
      <button class="small-button ${state.tableSubgroup === "" ? "is-active" : ""}" type="button" data-table-subgroup="">
        Все <span class="filter-count">${visibleTables.length}</span>
      </button>
      ${subgroups.map((sub) => `
        <button class="small-button ${state.tableSubgroup === sub ? "is-active" : ""}" type="button" data-table-subgroup="${sub}">
          ${sub} <span class="filter-count">${countSubgroupTables(state.tableFilter, sub)}</span>
        </button>
      `).join("")}
    </div>
  `;
}

function countFilteredTables(filterId) {
  return USEFUL_TABLES.filter((item) => {
    if (filterId === "all") return true;
    const groups = TABLE_FILTER_GROUPS[filterId];
    if (!groups) return true;
    return groups.some((g) => item.group === g);
  }).length;
}

const QUIZ_TENSES = [
  { id: "presente", name: "Presente" },
  { id: "perfecto", name: "Perfecto" },
  { id: "indefinido", name: "Indefinido" },
  { id: "imperfecto", name: "Imperfecto" },
  { id: "futuro", name: "Futuro" },
  { id: "condicional", name: "Condicional" },
  { id: "subjuntivo_presente", name: "Subj. Presente" },
  { id: "subjuntivo_imperfecto", name: "Subj. Imperfecto" },
  { id: "imperativo_afirmativo", name: "Imperativo" }
];

const QUIZ_COUNTS = [3, 5, 10, 20, 0];

function saveQuizConfig() {
  localStorage.setItem("msg:quizConfig", JSON.stringify(state.quizConfig));
}

function getAllTenseIds() {
  return QUIZ_TENSES.map((t) => t.id);
}

function getTenseName(id) {
  return QUIZ_TENSES.find((t) => t.id === id)?.name || id;
}

function generateInfinitiveQuestions(cards, count) {
  const shuffled = shuffle([...cards]);
  const selected = count > 0 ? shuffled.slice(0, count) : shuffled;
  return selected.map((verb) => ({
    type: "infinitive",
    verb,
    question: translationFor(verb),
    answer: displayInfinitive(verb)
  }));
}

function generateConjugationQuestions(cards, tenses, persons, count) {
  const questions = [];
  const tenseList = tenses.length > 0 ? tenses : getAllTenseIds();

  for (const verb of cards) {
    const forms = formsFor(verb);
    for (const tense of tenseList) {
      const tenseForms = forms[tense];
      if (!tenseForms) continue;

      for (const personIdx of persons) {
        if (personIdx >= tenseForms.length) continue;
        const form = tenseForms[personIdx];
        if (form === "-") continue;

        questions.push({
          type: "conjugation",
          verb,
          tense,
          person: personIdx,
          question: `${displayInfinitive(verb)} — ${getTenseName(tense)} — ${PEOPLE[personIdx]}`,
          answer: form
        });
      }
    }
  }

  const shuffled = shuffle(questions);
  return count > 0 ? shuffled.slice(0, count) : shuffled;
}

function checkAnswer(userInput, question) {
  const normalized = userInput.trim().toLowerCase().normalize("NFC");
  const correct = question.answer.toLowerCase().normalize("NFC");
  if (normalized === correct) return true;

  if (question.type === "conjugation" && question.verb.endsWith("se")) {
    const base = question.verb.slice(0, -2);
    const baseForms = formsFor(base);
    const baseForm = baseForms[question.tense]?.[question.person];
    if (baseForm && normalized === baseForm.toLowerCase().normalize("NFC")) return true;
  }

  return false;
}

function startCardQuiz() {
  const cfg = state.quizConfig;
  let questions;
  if (cfg.type === "conjugation") {
    questions = generateConjugationQuestions(state.cards, cfg.tenses, cfg.persons, cfg.count);
  } else {
    questions = generateInfinitiveQuestions(state.cards, cfg.count);
  }
  if (questions.length === 0) return;
  state.cardQuiz = questions;
  state.cardQuizIndex = 0;
  state.cardQuizRevealed = false;
  state.cardQuizInput = "";
  state.cardQuizAnswered = false;
  state.cardQuizCorrect = 0;
  state.cardQuizTotal = 0;
  state.cardQuizWrong = [];
  renderCards();
}

function renderCardQuiz(content) {
  const question = state.cardQuiz[state.cardQuizIndex];
  if (!question) {
    renderCardQuizResults(content);
    return;
  }
  const info = verbInfo(question.verb);
  const card = document.createElement("section");
  card.className = "info-card study-card";
  const progress = Math.round(((state.cardQuizIndex + 1) / state.cardQuiz.length) * 100);
  const isConjugation = question.type === "conjugation";
  const eyebrow = isConjugation ? "Проспрягай" : "Переведи на испанский";
  const placeholder = isConjugation ? "Введи форму..." : "Введи инфинитив...";

  let answerHTML;
  if (state.cardQuizAnswered) {
    const isCorrect = checkAnswer(state.cardQuizInput, question);
    answerHTML = `
      <input class="quiz-input ${isCorrect ? "is-correct" : "is-wrong"}" type="text" value="${escapeHTML(state.cardQuizInput)}" readonly>
      ${!isCorrect ? `<div class="quiz-feedback is-wrong">Неправильно: <strong>${escapeHTML(question.answer)}</strong></div>` : `<div class="quiz-feedback is-correct">Верно!</div>`}
    `;
  } else {
    answerHTML = `<input class="quiz-input" id="quizAnswerInput" type="text" autocomplete="off" placeholder="${placeholder}" value="${escapeHTML(state.cardQuizInput)}">`;
  }

  const hotkeyHint = !state.cardQuizAnswered
    ? `<span class="muted" style="font-size:12px">Enter — проверить · Esc — закончить</span>`
    : `<span class="muted" style="font-size:12px">→ — дальше · Esc — закончить</span>`;

  card.innerHTML = `
    <div class="study-card-top">
      <div class="quiz-stats">
        <span>✓ <strong>${state.cardQuizCorrect}</strong></span>
        <span>✗ <strong>${state.cardQuizTotal - state.cardQuizCorrect}</strong></span>
      </div>
      <button class="small-button" type="button" data-stop>Закончить</button>
    </div>
    <div class="study-progress" aria-hidden="true"><span style="width: ${progress}%"></span></div>
    <div class="study-face">
      <p class="eyebrow">${eyebrow}</p>
      <h2>${isConjugation ? question.question : info.ru}</h2>
      ${answerHTML}
    </div>
    <div class="study-actions">
      ${!state.cardQuizAnswered
        ? `<button class="small-button primary" type="button" id="checkAnswer">Проверить</button>`
        : `<button class="small-button primary" type="button" id="nextQuestion">Дальше →</button>`
      }
    </div>
    <div style="text-align:center">${hotkeyHint}</div>
  `;
  content.appendChild(card);

  const input = card.querySelector("#quizAnswerInput");
  if (input) {
    input.focus();
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleCheckAnswer();
      }
    });
  }

  const handleCheckAnswer = () => {
    const val = input?.value || "";
    if (!val.trim()) return;
    state.cardQuizInput = val;
    state.cardQuizAnswered = true;
    state.cardQuizTotal += 1;
    if (checkAnswer(val, question)) {
      state.cardQuizCorrect += 1;
    } else {
      state.cardQuizWrong.push(question.verb);
    }
    renderCards();
  };

  const handleNext = () => {
    state.cardQuizIndex += 1;
    state.cardQuizInput = "";
    state.cardQuizAnswered = false;
    if (state.cardQuizIndex >= state.cardQuiz.length) {
      renderCards();
      return;
    }
    renderCards();
  };

  card.querySelector("#checkAnswer")?.addEventListener("click", handleCheckAnswer);
  card.querySelector("#nextQuestion")?.addEventListener("click", handleNext);
  card.querySelector("[data-stop]")?.addEventListener("click", stopCardQuiz);

  const handleGlobalKeydown = (e) => {
    if (state.cardQuiz.length === 0) return;
    if (e.key === "Escape") {
      e.preventDefault();
      stopCardQuiz();
      return;
    }
    if (state.cardQuizAnswered && e.key === "ArrowRight") {
      e.preventDefault();
      handleNext();
      return;
    }
    if (!state.cardQuizAnswered && e.key === "Enter") {
      e.preventDefault();
      handleCheckAnswer();
      return;
    }
  };

  document.addEventListener("keydown", handleGlobalKeydown);
  const cleanup = () => document.removeEventListener("keydown", handleGlobalKeydown);
  card.addEventListener("remove", cleanup, { once: true });
  card._cleanupHotkeys = cleanup;
}

function renderCardQuizResults(content) {
  const total = state.cardQuizTotal;
  const correct = state.cardQuizCorrect;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const wrong = [...new Set(state.cardQuizWrong)];
  const card = document.createElement("section");
  card.className = "info-card study-card";
  let wrongHTML = "";
  if (wrong.length > 0) {
    const rows = wrong.map((verb) => {
      const info = verbInfo(verb);
      return `<div class="quiz-wrong-row">
        <span><strong>${displayInfinitive(verb)}</strong> — ${info.ru}</span>
        <button class="small-button danger" type="button" data-remove="${verb}">Убрать из избранного</button>
      </div>`;
    }).join("");
    wrongHTML = `<div class="quiz-wrong-list"><h3>Неправильные ответы (${wrong.length})</h3>${rows}</div>`;
  }
  card.innerHTML = `
    <div class="study-card-top">
      <span>Результат</span>
      <button class="small-button" type="button" data-stop>Закрыть</button>
    </div>
    <div class="study-face">
      <p class="eyebrow">Квиз завершён</p>
      <h2>${correct} из ${total}</h2>
      <p class="muted">${pct}% правильных ответов</p>
    </div>
    ${wrongHTML}
    <div class="study-actions">
      <button class="small-button primary" type="button" id="restartQuiz">Ещё раз</button>
      <button class="small-button" type="button" id="backToCards">К списку</button>
    </div>
    <div style="text-align:center"><span class="muted" style="font-size:12px">Esc — закрыть · Enter — ещё раз</span></div>
  `;
  content.appendChild(card);
  card.querySelectorAll("[data-remove]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const verb = btn.dataset.remove;
      state.cards = state.cards.filter((item) => item !== verb);
      saveCards();
      btn.closest(".quiz-wrong-row").remove();
      const remaining = card.querySelectorAll("[data-remove]").length;
      if (remaining === 0) {
        const list = card.querySelector(".quiz-wrong-list");
        if (list) list.remove();
      }
    });
  });
  card.querySelector("#restartQuiz")?.addEventListener("click", startCardQuiz);
  card.querySelector("#backToCards")?.addEventListener("click", stopCardQuiz);
  card.querySelector("[data-stop]")?.addEventListener("click", stopCardQuiz);

  const handleResultsKeydown = (e) => {
    if (e.key === "Escape") {
      e.preventDefault();
      stopCardQuiz();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      startCardQuiz();
      return;
    }
  };
  document.addEventListener("keydown", handleResultsKeydown);
  const cleanupResults = () => document.removeEventListener("keydown", handleResultsKeydown);
  card.addEventListener("remove", cleanupResults, { once: true });
  card._cleanupHotkeys = cleanupResults;
}

function stopCardQuiz() {
  document.querySelectorAll(".study-card").forEach((card) => {
    if (card._cleanupHotkeys) card._cleanupHotkeys();
  });
  state.cardQuiz = [];
  state.cardQuizIndex = 0;
  state.cardQuizRevealed = false;
  state.cardQuizInput = "";
  state.cardQuizAnswered = false;
  state.cardQuizCorrect = 0;
  state.cardQuizTotal = 0;
  state.cardQuizWrong = [];
  renderCards();
}

function escapeHTML(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function shuffle(items) {
  return items
    .map((item) => ({ item, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ item }) => item);
}

function infoCard(title, text) {
  const card = document.createElement("article");
  card.className = "info-card";
  card.innerHTML = `<h2>${title}</h2><p class="muted">${text}</p>`;
  return card;
}

function validateData() {
  const tenseIds = new Set(DATA.tenses.map((tense) => tense.id));
  const tableGroups = new Set(DATA.tableGroups.map((group) => group.title));
  const issues = [];
  DATA.tenseGroups.forEach((group) => {
    group.tenseIds.filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для группы ${group.title}: ${id}`));
  });
  Object.entries(DATA.tenseFilters).forEach(([key, filter]) => {
    filter.ids.filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для фильтра ${key}: ${id}`));
  });
  DATA.moods.forEach((mood) => {
    (mood.tenseIds || []).filter((id) => !tenseIds.has(id)).forEach((id) => issues.push(`Нет времени для наклонения ${mood.title}: ${id}`));
  });
  DATA.usefulTables.forEach((item) => {
    if (!tableGroups.has(item.group)) issues.push(`Нет группы шпаргалок для ${item.title}: ${item.group}`);
  });
  return issues;
}

function exceptionVerbsFor(tenseId) {
  const key = exceptionKeyForTense(tenseId);
  return BASE_VERBS.filter((verb) => isExceptionFor(verb, key));
}

function isExceptionFor(verb, key) {
  if (key === "participio") {
    return Boolean(IRREGULARS[verb]?.participle || generatedParticiple(verb));
  }
  if (key === "indefinido") {
    return Boolean(IRREGULARS[verb]?.indefinido || irregularIndefinidoStem(verb) || thirdPersonStemChangeIndefinido(verb) || orthographicIndefinido(verb));
  }
  if (key === "futuro" || key === "condicional") {
    return Boolean(irregularFutureStem(verb));
  }
  if (key === "subjuntivo_presente") {
    return Boolean(IRREGULARS[verb]?.subjuntivo_presente || generatedSubjuntivoPresente(verb));
  }
  if (key === "presente") {
    return Boolean(IRREGULARS[verb]?.presente || generatedPresent(verb));
  }
  return Boolean(IRREGULARS[verb]?.[key]);
}

function exceptionKeyForTense(tenseId) {
  if (["perfecto", "pluscuamperfecto", "preterito_anterior", "futuro_perfecto", "condicional_compuesto", "subjuntivo_perfecto", "subjuntivo_pluscuamperfecto", "subjuntivo_futuro_perfecto", "formas_no_personales"].includes(tenseId)) {
    return "participio";
  }
  if (tenseId === "imperativo_negativo") {
    return "subjuntivo_presente";
  }
  return tenseId;
}

function renderTenseExceptions(tenseId) {
  const key = exceptionKeyForTense(tenseId);
  const specialVerbs = specialExceptionVerbsFor(key);
  const patterns = exceptionPatternsFor(key);
  const block = document.createElement("div");
  block.className = "compact-exceptions";
  block.insertAdjacentHTML("beforeend", `<h3>Исключения</h3>`);
  if (specialVerbs.length === 0 && patterns.length === 0) {
    block.insertAdjacentHTML("beforeend", `<p class="muted">Для этого времени в текущей базе исключений пока нет.</p>`);
    return block;
  }
  if (specialVerbs.length > 0) {
    block.appendChild(exceptionTable("Особые глаголы без простой логики", ["Глагол", "Формы", "Перевод"], specialVerbs.map((verb) => {
      const info = verbInfo(verb);
      const forms = key === "participio" ? [info.participle] : info.forms[key] || [];
      return [verbLink(verb), `<span class="compact-forms">${forms.join(", ")}</span>`, info.ru];
    })));
  }
  if (patterns.length > 0) {
    block.appendChild(exceptionTable("Паттерны", ["Паттерн", "Как меняется", "Примеры"], patterns.map((item) => [
      item.name,
      item.change,
      linkVerbExamples(item.examples)
    ])));
  }
  block.addEventListener("click", (event) => {
    const button = event.target.closest("[data-open-verb]");
    if (!button) return;
    openVerbFromReference(button.dataset.openVerb);
  });
  return block;
}

function verbLink(verb) {
  return `<button class="verb-link-button" type="button" data-open-verb="${verb}">${displayInfinitive(verb)}</button>`;
}

function linkVerbExamples(text) {
  return text.replace(/(^|;\s*)([a-zñ]+)\s*->/g, (match, prefix, verb) => {
    if (!BASE_VERBS.includes(verb)) return match;
    return `${prefix}${verbLink(verb)} ->`;
  });
}

function openVerbFromReference(verb) {
  if (!BASE_VERBS.includes(verb)) return;
  state.view = "verbs";
  state.query = "";
  state.selectedVerb = verb;
  syncActiveTab("verbs");
  render();
  scrollToCard("content");
}

function openTenseFromVerb(tenseId) {
  if (!tenseById(tenseId)) return;
  state.view = "tenses";
  state.tenseFilter = "all";
  syncActiveTab("tenses");
  render();
  scrollToCard(`tense-${tenseId}`);
}

function exceptionTable(title, headers, rows) {
  const section = document.createElement("div");
  section.className = "exception-subtable";
  section.insertAdjacentHTML("beforeend", `<h4>${title}</h4>`);
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  const table = document.createElement("table");
  table.innerHTML = `<thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead>`;
  const body = document.createElement("tbody");
  rows.forEach((cells) => {
    const row = document.createElement("tr");
    row.innerHTML = cells.map((cell, index) => index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`).join("");
    body.appendChild(row);
  });
  table.appendChild(body);
  wrap.appendChild(table);
  section.appendChild(wrap);
  return section;
}

function specialExceptionVerbsFor(key) {
  const map = {
    presente: ["ser", "estar", "ir", "haber", "dar", "saber", "ver", "oir"],
    indefinido: ["ser", "ir", "dar", "andar", "caber", "estar", "hacer", "poder", "querer", "saber"],
    imperfecto: ["ser", "ir", "ver"],
    futuro: ["decir", "hacer"],
    condicional: ["decir", "hacer"],
    subjuntivo_presente: ["ser", "estar", "ir", "haber", "dar", "saber", "ver", "oir"],
    imperativo_afirmativo: ["ser", "ir", "tener", "hacer", "decir", "venir", "poner", "salir"],
    participio: ["abrir", "cubrir", "decir", "escribir", "hacer", "morir", "poner", "romper", "ver"]
  };
  return (map[key] || []).filter((verb) => BASE_VERBS.includes(verb) && isExceptionFor(verb, key));
}

function renderTenseSignals(tense) {
  const block = document.createElement("div");

  const info = verbInfo(verb);
  const card = document.createElement("article");
  card.className = "verb-card";

  card.innerHTML = `
    <div class="card-head">
      <div>
        <h2>${info.displayInfinitive}</h2>
        <p class="muted">${info.ru} · ${title}</p>
      </div>
    </div>
    <div class="chips">${info.tags.map((tag) => `<span class="chip alert">${tag}</span>`).join("")}</div>
  `;
  if (tenseId === "participio") {
    card.insertAdjacentHTML("beforeend", `<dl class="forms-line"><div><dt>Participio</dt><dd>${info.participle}</dd></div><div><dt>Infinitivo</dt><dd>${verb}</dd></div></dl>`);
    return card;
  }
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";

}

const INDEXED_TABLES = USEFUL_TABLES.map((item, index) => ({ ...item, index }));
const LINKED_TABLE_HTML = INDEXED_TABLES.map((item) => linkTableTenses(item.table));
const TABLE_FILTER_COUNTS = TABLE_FILTERS.reduce((acc, f) => { acc[f.id] = countFilteredTables(f.id); return acc; }, {});

const VIEW_RENDERERS = {
  verbs: renderVerbs,
  tenses: renderTenses,
  tables: renderTables,
  moods: renderMoods,
  cards: renderCards
};

function render() {
  document.body.classList.toggle("dark", state.dark);
  syncActiveTab();
  (VIEW_RENDERERS[state.view] || renderVerbs)();
}

const dataIssues = validateData();
if (dataIssues.length > 0) {
  console.warn("Проверь данные справочника:", dataIssues);
}

$all(SELECTORS.tabs).forEach((tab) => {
  tab.addEventListener("click", () => setView(tab.dataset.view));
});

$(SELECTORS.homeTitle).addEventListener("click", () => {
  setView("verbs");
  scrollAppTop();
});

$(SELECTORS.themeToggle).addEventListener("click", () => {
  state.dark = !state.dark;
  localStorage.setItem("msg:theme", state.dark ? "dark" : "light");
  render();
});

const floatingTopButton = $(SELECTORS.floatingTopButton);
function updateFloatingTopButton() {
  floatingTopButton.classList.toggle("is-visible", window.scrollY > 420);
}

floatingTopButton.addEventListener("click", () => {
  scrollAppTop();
});

window.addEventListener("scroll", updateFloatingTopButton, { passive: true });

document.addEventListener("keydown", (e) => {
  const isInput = e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable;

  if ((e.ctrlKey || e.metaKey) && e.key === "f") {
    e.preventDefault();
    const input = document.getElementById("searchInput");
    if (input) { input.focus(); input.select(); }
    return;
  }

  if (e.key === "Enter" && isInput && state.view === "verbs" && normalize(state.query)) {
    e.preventDefault();
    const verbs = filteredVerbs();
    if (verbs.length > 0) {
      state.selectedVerb = verbs[0];
      state.verbCardMode = "basic";
      state.query = verbs[0];
      render();
      scrollToCard("content");
    }
    return;
  }

  if (!isInput && /^[1-5]$/.test(e.key)) {
    const views = ["verbs", "tenses", "moods", "tables", "cards"];
    setView(views[parseInt(e.key) - 1]);
    e.preventDefault();
    return;
  }

  if (e.key === "Escape") {
    if (state.view !== "verbs") {
      setView("verbs");
      e.preventDefault();
      return;
    }
    if (state.selectedVerb) {
      state.selectedVerb = null;
      state.searchCursor = -1;
      render();
      e.preventDefault();
    } else if (state.query) {
      state.query = "";
      state.searchCursor = -1;
      render();
      e.preventDefault();
    } else if (isInput) {
      e.target.blur();
      e.preventDefault();
    }
    return;
  }

  if ((e.key === "ArrowDown" || e.key === "ArrowUp") && state.view === "verbs") {
    const picks = document.querySelectorAll(".verb-pick");
    if (picks.length === 0) return;
    const active = document.activeElement;
    let idx = Array.from(picks).indexOf(active);
    e.preventDefault();
    if (e.key === "ArrowDown") {
      if (idx < picks.length - 1) {
        picks[idx + 1].focus();
        picks[idx + 1].scrollIntoView({ block: "nearest" });
      }
    } else {
      if (idx > 0) {
        picks[idx - 1].focus();
        picks[idx - 1].scrollIntoView({ block: "nearest" });
      } else if (idx <= 0) {
        const input = document.getElementById("searchInput");
        if (input) input.focus();
      }
    }
  }
});

render();
updateFloatingTopButton();
