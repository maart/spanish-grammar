<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Справочник по испанскому</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f6f3ee;
  --surface: #fffdf8;
  --surface-2: #f0ebe2;
  --text: #20201d;
  --muted: #6e675d;
  --line: #d9d0c3;
  --accent: #c43d31;
  --on-accent: #fff;
  --accent-2: #176b5b;
  --accent-soft: #fde7e1;
  --success: #1f7a4d;
  --success-soft: #dff4e9;
  --danger: #b9362e;
  --danger-soft: #fde2dc;
  --page-width: 980px;
  --shadow: 0 18px 50px rgba(57, 45, 30, 0.12);
}

body.dark {
  color-scheme: dark;
  --bg: #191a17;
  --surface: #24251f;
  --surface-2: #303128;
  --text: #f6f1e8;
  --muted: #bbb3a6;
  --line: #464237;
  --accent: #f36f5d;
  --on-accent: #20201d;
  --accent-2: #5cc4ac;
  --accent-soft: #402621;
  --success: #71d39b;
  --success-soft: #193325;
  --danger: #ff8a78;
  --danger-soft: #3d201c;
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}

button,
input {
  font: inherit;
}

:where(button, input, select, summary, a):focus-visible {
  outline: 3px solid color-mix(in srgb, var(--accent-2) 72%, white);
  outline-offset: 2px;
}

.app-shell {
  width: min(var(--page-width), calc(100vw - 28px));
  min-width: 0;
  min-height: 100vh;
  margin: 0 auto;
  padding: 18px 14px 28px;
}

.topbar,
.search-panel,
.content > article,
.content > section,
.selected-verb-panel > article,
.list-grid > article,
.list-grid > section {
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.topbar {
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 18px 16px 24px;
  border-radius: 8px;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 7px;
  background: linear-gradient(180deg, #c43d31 0 25%, #f1c232 25% 75%, #c43d31 75% 100%);
}

.brand-block {
  display: grid;
  gap: 10px;
}

.brand-kicker {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
}

.brand-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.brand-stats span {
  border: 1px solid color-mix(in srgb, var(--accent-2) 42%, var(--line));
  border-radius: 999px;
  padding: 4px 9px;
  background: color-mix(in srgb, var(--success-soft) 52%, var(--surface));
  color: var(--accent-2);
  font-size: 12px;
  font-weight: 900;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(28px, 6vw, 40px);
  line-height: 1;
}

#homeTitle {
  cursor: pointer;
}

h2 {
  margin-bottom: 4px;
  font-size: 25px;
}

h3 {
  margin-bottom: 10px;
  font-size: 18px;
}

.icon-button,
.favorite-button {
  display: inline-grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
}

.search-panel {
  padding: 14px;
  border-radius: 8px;
}

.search-panel label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.search-row {
  display: grid;
  gap: 8px;
}

.search-status {
  min-height: 18px;
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.search-status:empty {
  display: none;
}

input[type="search"] {
  min-width: 0;
  height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px;
  background: var(--surface-2);
  color: var(--text);
}

.muted {
  color: var(--muted);
}

.tabs {
  position: sticky;
  top: 8px;
  z-index: 15;
  display: grid;
  grid-template-columns: repeat(5, minmax(72px, 1fr));
  gap: 6px;
  margin: 12px 0 0;
  padding: 8px 0 6px;
  overflow-x: auto;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(12px);
}

.tab {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-weight: 800;
  white-space: nowrap;
}

.tab-label-mobile {
  display: none;
}

.tab.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--on-accent);
}

.content {
  display: grid;
  gap: 12px;
  margin-top: 6px;
}

.content > *,
.list-grid > * {
  min-width: 0;
}

.verb-card,
.info-card {
  width: 100%;
  padding: 16px;
  border-radius: 8px;
}

.info-card[id] {
  scroll-margin-top: 72px;
}

.card-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
}

.recent-clear-button {
  flex: 0 0 auto;
  padding-inline: 8px;
  font-size: 12px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0;
}

.chips:empty {
  display: none;
}

.chip {
  padding: 6px 9px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.chip.alert {
  background: var(--accent-soft);
  color: var(--accent);
}

.action-row,
.quick-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0;
}

.quick-nav {
  margin-bottom: 0;
}

.tense-group {
  display: grid;
  gap: 8px;
  width: 100%;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.tense-group-title {
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.tense-group-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 6px;
}

.term-button.tense-nav-button {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-height: 56px;
  padding: 7px 9px;
  text-align: left;
}

.tense-nav-button.is-rare {
  opacity: 0.68;
}

.tense-nav-button:hover,
.tense-nav-button:focus-visible {
  opacity: 1;
}

.tense-nav-main {
  display: grid;
  gap: 3px;
  min-width: 0;
}

.tense-nav-main span,
.tense-nav-main small {
  overflow-wrap: anywhere;
}

.tense-nav-main span {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}

.tense-nav-main small {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.tense-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  width: fit-content;
  min-width: max-content;
  min-height: 22px;
  border: 1px solid color-mix(in srgb, var(--accent-2) 35%, var(--line));
  border-radius: 999px;
  padding: 2px 7px;
  background: var(--success-soft);
  color: var(--accent-2);
  font-size: 11px;
  font-weight: 900;
  line-height: 1.2;
  white-space: nowrap;
}

.tense-badge.compound {
  border-color: var(--line);
  background: var(--surface);
  color: var(--muted);
}

.tense-badge.rare {
  border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
  background: var(--accent-soft);
  color: var(--accent);
}

.content > section.group-heading {
  margin-top: 8px;
  padding: 20px 4px 6px;
  border: 0;
  border-top: 2px solid var(--line);
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.content > section.group-heading h2 {
  margin-bottom: 3px;
  color: var(--accent-2);
  font-size: 17px;
  text-transform: uppercase;
}

.content > section.group-heading .muted {
  margin-bottom: 0;
}

.content > section.subgroup-heading {
  margin-top: 2px;
  padding: 10px 4px 0;
  border: 0;
  background: transparent;
  box-shadow: none;
}

.content > section.subgroup-heading h3 {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.table-summary,
.table-mistake {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: var(--surface-2);
}

.table-summary strong,
.table-mistake strong {
  color: var(--accent-2);
}

.table-mistake {
  border-color: color-mix(in srgb, var(--accent) 36%, var(--line));
  background: color-mix(in srgb, var(--accent-soft) 56%, var(--surface));
}

.table-card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.tense-card-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
}

.tense-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.tense-title-row h2 {
  margin-bottom: 0;
}

.tense-card-head .chip {
  flex: 0 1 auto;
  max-width: 42%;
  text-align: right;
}

.formula-button {
  border: 1px solid transparent;
  cursor: pointer;
  font: inherit;
}

.formula-button:hover,
.formula-button:focus-visible {
  border-color: var(--accent-2);
  color: var(--accent-2);
}

.focused-tense-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.focused-tense-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tense-actions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin: 12px 0;
}

.tense-actions .small-button {
  min-width: 0;
}

.tense-actions.is-compact {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.filter-tabs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
  margin: 12px 0;
}

.filter-tabs .small-button.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--on-accent);
}

.table-filter-controls {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 14px;
}

.table-sources {
  margin-top: 12px;
  color: var(--muted);
}

.table-sources summary {
  width: fit-content;
  cursor: pointer;
  color: var(--text);
  font-weight: 700;
}

.table-source-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-top: 9px;
}

.table-source-links a {
  color: var(--accent-2);
  text-underline-offset: 3px;
}

.table-filter-control {
  display: grid;
  gap: 5px;
  min-width: 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

.table-filter-control select {
  width: 100%;
}

.table-filter-control:only-child {
  grid-column: 1 / -1;
}

.toc-toggle,
.tense-toc-toggle {
  width: 100%;
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.7;
}

.toc-toggle:hover,
.tense-toc-toggle:hover {
  opacity: 1;
}

.filter-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 9px;
  background: var(--bg);
  color: var(--muted);
  margin-left: 4px;
  line-height: 1;
}

.small-button.is-active .filter-count {
  background: color-mix(in srgb, var(--on-accent) 16%, transparent);
  color: var(--on-accent);
}

.mood-tabs {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-auto-rows: 1fr;
  gap: 6px;
  margin-top: 12px;
}

.mood-tabs .small-button {
  height: 100%;
  min-height: 62px;
  padding: 6px 9px;
}

.mood-tabs .small-button span,
.mood-tabs .small-button small {
  display: block;
}

.mood-tabs .small-button small {
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.mood-tabs .small-button.is-active {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--on-accent);
}

.mood-tabs .small-button.is-active small {
  color: var(--on-accent);
}

.mood-tabs .small-button.is-related:not(.is-active) {
  border-style: dashed;
  border-color: color-mix(in srgb, var(--accent-2) 55%, var(--line));
}

.mood-chooser-block {
  display: grid;
  gap: 10px;
  margin: 12px 0;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.mood-chooser-block h2,
.mood-chooser-block h3 {
  margin-bottom: 0;
}

.choice-grid,
.mood-trigger-groups,
.confusion-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.choice-card,
.mood-trigger-group,
.confusion-card,
.condicional-note {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: var(--surface-2);
}

button.choice-card {
  width: 100%;
  color: var(--text);
  cursor: pointer;
  font: inherit;
  text-align: left;
}

button.choice-card:hover,
button.choice-card:focus-visible {
  border-color: var(--accent-2);
  background: var(--success-soft);
}

.choice-card strong,
.mood-trigger-group strong,
.confusion-card strong {
  display: block;
  margin-bottom: 4px;
  color: var(--accent-2);
}

.choice-card span,
.mood-trigger-group span,
.confusion-card span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.condicional-note {
  margin: 10px 0;
  border-color: color-mix(in srgb, var(--accent-2) 45%, var(--line));
  background: color-mix(in srgb, var(--success-soft) 58%, var(--surface));
}

.condicional-note strong,
.condicional-note span {
  display: block;
}

.condicional-note span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.mood-tense-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tense-detail-block {
  margin-top: 12px;
}

.example-grid,
.condition-grid {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}

.example-card,
.condition-card {
  display: grid;
  gap: 4px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.example-card strong,
.condition-card strong {
  color: var(--accent-2);
}

.example-card .example-context {
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  line-height: 1.2;
}

@media (min-width: 760px) {
  .example-grid.is-expanded {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

.example-more-button {
  width: fit-content;
  margin: -4px 0 12px;
}

.condition-card code {
  width: fit-content;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 7px;
  background: var(--surface);
  color: var(--accent);
  font: inherit;
  font-size: 12px;
  font-weight: 900;
}

.detail-list {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}

.detail-list div {
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

.small-button {
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 10px;
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  font-weight: 800;
}

.small-button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.small-button.primary {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}

.small-button.success {
  border-color: color-mix(in srgb, var(--success) 60%, var(--line));
  background: var(--success-soft);
  color: var(--success);
}

.small-button.danger {
  border-color: color-mix(in srgb, var(--danger) 60%, var(--line));
  background: var(--danger-soft);
  color: var(--danger);
}

.term-button {
  display: grid;
  gap: 2px;
  height: auto;
  min-height: 44px;
  text-align: left;
}

.term-button span,
.term-button small {
  min-width: 0;
}

.term-button small {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.state-note {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  margin-top: 2px;
  padding: 4px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.forms-line {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin: 10px 0 14px;
}

.forms-line div {
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-2);
}

dt {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

dd {
  margin: 2px 0 0;
  font-weight: 800;
}

.table-wrap {
  max-width: 100%;
  min-width: 0;
  overflow-x: visible;
}

.table-card .table-wrap {
  display: none;
}
.table-card.is-open .table-wrap {
  display: block;
  animation: tableFadeIn 0.18s ease;
}

@keyframes tableFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

table {
  width: 100%;
  min-width: 0;
  table-layout: fixed;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 8px;
}

th,
td {
  padding: 10px;
  border: 1px solid var(--line);
  text-align: left;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: normal;
  vertical-align: top;
}

th {
  background: var(--surface-2);
  color: var(--muted);
  font-size: 12px;
}

td.irregular {
  color: var(--accent);
  font-weight: 900;
}

.compact-exceptions {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

.compact-exceptions h3 {
  margin-bottom: 8px;
}

.exception-subtable {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.exception-subtable h4 {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.compact-exceptions table {
  min-width: 0;
}

.compact-exceptions th,
.compact-exceptions td {
  padding: 7px 8px;
  font-size: 13px;
  white-space: normal;
}

.compact-forms {
  color: var(--accent);
  font-weight: 900;
}

.grammar-slot {
  display: inline-block;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 0.9em;
  font-weight: 900;
}

.verb-link-button {
  min-height: 28px;
  border: 1px solid color-mix(in srgb, var(--accent-2) 55%, var(--line));
  border-radius: 8px;
  padding: 3px 8px;
  background: var(--surface-2);
  color: var(--accent-2);
  cursor: pointer;
  font: inherit;
  font-weight: 900;
}

.verb-link-button:hover {
  border-color: var(--accent-2);
  background: var(--success-soft);
}

.selected-verb-panel table th .verb-link-button {
  width: 100%;
  text-align: left;
}

.list-grid {

// Общие DOM-помощники и строительные блоки UI.
const SELECTORS = {
  content: "#content",
  shell: ".app-shell",
  tabs: ".tab",
  homeTitle: "#homeTitle",
  themeToggle: "#themeToggle",
  floatingTopButton: "#floatingTopButton",
  verbTemplate: "#verbTemplate"
};

function $(selector, root = document) {
  return root.querySelector(selector);
}

function $all(selector, root = document) {
  return Array.from(root.querySelectorAll(selector));
}

function clearContent() {
  clearQuizHotkeys();
  const content = $(SELECTORS.content);
  content.innerHTML = "";
  queueMicrotask(() => prepareResponsiveTables(content));
  return content;
}

function infoSection({ id = "", className = "info-card", html = "" } = {}) {
  const section = document.createElement("section");
  section.className = className;
  if (id) section.id = id;
  section.innerHTML = html;
  return section;
}

function groupHeading(title, description) {
  return infoSection({
    className: "info-card group-heading",
    html: `<h2>${title}</h2><p class="muted">${description}</p>`
  });
}

function subgroupHeading(title) {
  return infoSection({
    className: "info-card subgroup-heading",
    html: `<h3>${title}</h3>`
  });
}

function disclosureButton({ open, target, label, hideLabel = `Скрыть ${label.toLowerCase()}`, action }) {
  return `<button class="small-button ${open ? "danger" : "success"}" type="button" data-${action}="${target}" aria-expanded="${open}">
    ${open ? hideLabel : label}
  </button>`;
}

function bindClickAll(root, selector, handler) {
  $all(selector, root).forEach((element) => element.addEventListener("click", handler));
}

function scrollAppTop() {
  $(SELECTORS.shell).scrollIntoView({ behavior: "smooth", block: "start" });
}

function syncActiveTab(view = state.view) {
  $all(SELECTORS.tabs).forEach((tab) => {
    const active = tab.dataset.view === view;
    tab.classList.toggle("is-active", active);
    if (active) tab.setAttribute("aria-current", "page");
    else tab.removeAttribute("aria-current");
  });
}

function updateRouteHash(route, { replace = false } = {}) {
  const nextHash = `#${route}`;
  if (window.location.hash === nextHash) return;
  window.history[replace ? "replaceState" : "pushState"](null, "", nextHash);
}

function applyRouteHash() {
  let route = window.location.hash.slice(1);
  try {
    route = decodeURIComponent(route);
  } catch {
    route = "";
  }

  const views = ["verbs", "tenses", "moods", "tables", "cards"];
  if (!route || route === "verbs") {
    resetVerbLanding();
  } else if (views.includes(route)) {
    state.view = route;
    if (route === "tenses") state.focusedTense = null;
    if (route === "tables") state.focusedTable = null;
  } else if (route.startsWith("verb-")) {
    const verb = route.slice(5);
    if (!BASE_VERBS.includes(verb)) return false;
    state.view = "verbs";
    state.selectedVerb = verb;
    state.query = verb;
    state.previousVerbQuery = null;
    state.verbCardMode = "basic";
    rememberRecentVerb(verb);
  } else if (route.startsWith("tense-")) {
    const tenseId = route.slice(6);
    if (!tenseById(tenseId)) return false;
    state.view = "tenses";
    state.focusedTense = tenseId;
    state.returnMood = null;
  } else if (route.startsWith("mood-")) {
    const moodId = route.slice(5);
    if (!MOODS.some((mood) => mood.id === moodId)) return false;
    state.view = "moods";
    state.selectedMood = moodId;
    localStorage.setItem("msg:selectedMood", moodId);
    resetMoodDetailState();
  } else if (route.startsWith("table-")) {
    const index = Number(route.slice(6));
    if (!Number.isInteger(index) || !INDEXED_TABLES[index]) return false;
    state.view = "tables";
    state.focusedTable = index;
  } else {
    return false;
  }

  syncActiveTab();
  render();
  if (route.startsWith("verb-") || route.startsWith("tense-") || route.startsWith("table-") || route.startsWith("mood-")) {
    requestAnimationFrame(() => scrollToCard("content"));
  }
  return true;
}

function tenseById(id) {
  return TENSES.find((tense) => tense.id === id);
}

function isReflexive(verb) {
  return verb.endsWith("se") && verb.length > 3;
}

function baseVerb(verb) {
  return isReflexive(verb) ? verb.slice(0, -2) : verb;
}

const REFLEXIVE_PRONOUNS = ["me", "te", "se", "nos", "os", "se"];

function prefixReflexivePronouns(forms) {
  return forms?.map((form, index) => form === "-" ? form : `${REFLEXIVE_PRONOUNS[index]} ${form}`);
}

function verbType(verb) {
  const b = baseVerb(verb);
  if (b.endsWith("ar")) return "ar";
  if (b.endsWith("er")) return "er";
  return "ir";
}

function stem(verb) {
  return baseVerb(verb).slice(0, -2);
}

function regularPresent(verb) {
  const generated = generatedPresent(verb);
  if (generated) return generated;
  const type = verbType(verb);
  const endings = TENSES[0].endings[type];
  return endings.map((ending) => stem(verb) + ending);
}

function regularPresentPattern(verb) {
  const endings = tenseById("presente").endings[verbType(verb)];
  return endings.map((ending) => stem(verb) + ending);
}

function regularIndefinido(verb) {
  const orthographic = orthographicIndefinido(verb);
  if (orthographic) return orthographic;
  const type = verbType(verb);
  const endings = TENSES[2].endings[type];
  return endings.map((ending) => stem(verb) + ending);
}

function regularIndefinidoPattern(verb) {
  const endings = tenseById("indefinido").endings[verbType(verb)];
  return endings.map((ending) => stem(verb) + ending);
}

function regularImperfecto(verb) {
  const type = verbType(verb);
  const endings = TENSES[3].endings[type];
  return endings.map((ending) => stem(verb) + ending);
}

function regularFuture(verb) {
  const simpleVerb = baseVerb(verb);
  const base = irregularFutureStem(simpleVerb) || simpleVerb;
  return tenseById("futuro").endings.all.map((ending) => base + ending);
}

function regularFuturePattern(verb) {
  return tenseById("futuro").endings.all.map((ending) => baseVerb(verb) + ending);
}

function regularCondicional(verb) {
  const simpleVerb = baseVerb(verb);
  const base = irregularFutureStem(simpleVerb) || simpleVerb;
  return tenseById("condicional").endings.all.map((ending) => base + ending);
}

function regularCondicionalPattern(verb) {
  return tenseById("condicional").endings.all.map((ending) => baseVerb(verb) + ending);
}

function regularSubjuntivoPresente(verb) {
  const irregular = generatedSubjuntivoPresente(verb);
  if (irregular) return irregular;
  const endings = tenseById("subjuntivo_presente").endings[verbType(verb)];
  return endings.map((ending) => stem(verb) + ending);
}

function regularSubjuntivoPresentePattern(verb) {
  const endings = tenseById("subjuntivo_presente").endings[verbType(verb)];
  return endings.map((ending) => stem(verb) + ending);
}

function generatedPresent(verb) {
  if (IRREGULARS[verb]?.presente) return IRREGULARS[verb].presente;
  const type = verbType(verb);
  const endings = TENSES[0].endings[type];
  const base = endings.map((ending) => stem(verb) + ending);
  if (STRESSED_IAR_VERBS.has(verb)) {
    const stressedStem = accentLastLetter(stem(verb), "i");
    [0, 1, 2, 5].forEach((index) => {
      base[index] = stressedStem + endings[index];
    });
  }
  if (STRESSED_UAR_VERBS.has(verb)) {
    const stressedStem = accentLastLetter(stem(verb), "u");
    [0, 1, 2, 5].forEach((index) => {
      base[index] = stressedStem + endings[index];
    });
  }
  const yoIrregulars = [
    ["tener", "tengo"], ["poner", "pongo"], ["venir", "vengo"], ["salir", "salgo"],
    ["hacer", "hago"], ["decir", "digo"], ["traer", "traigo"], ["caer", "caigo"],
    ["oir", "oigo"], ["valer", "valgo"]
  ];
  for (const [ending, yo] of yoIrregulars) {
    if (verb.endsWith(ending)) base[0] = verb.slice(0, -ending.length) + yo;
  }
  if (verb.endsWith("facer")) base[0] = verb.slice(0, -5) + "fago";
  else if (verb.endsWith("ducir")) base[0] = verb.slice(0, -3) + "zco";
  else if (verb.endsWith("cer") || verb.endsWith("cir")) base[0] = verb.slice(0, -3) + "zco";
  else if (verb.endsWith("ger") || verb.endsWith("gir")) {
    let root = verb.slice(0, -3);
    if (hasStemChange(verb, "e", "i")) root = stemChange(root, "e", "i");
    base[0] = root + "jo";
  }
  else if (verb.endsWith("guir")) base[0] = stemChange(verb.slice(0, -4) + "g", "e", "i") + "o";
  if (verb.endsWith("uir") && !verb.endsWith("guir")) {
    const root = stem(verb);
    base[0] = root + "yo";
    base[1] = root + "yes";
    base[2] = root + "ye";
    base[5] = root + "yen";
  }

  const stemChangeSpec = [
    ["e", "ie"], ["o", "ue"], ["e", "i"], ["u", "ue"]
  ].find(([from, to]) => hasStemChange(verb, from, to));
  if (stemChangeSpec) {
    const [from, to] = stemChangeSpec;
    [0, 1, 2, 5].forEach((index) => {
      if (!(index === 0 && base[0] !== stem(verb) + endings[0])) {
        base[index] = stemChange(stem(verb), from, to) + endings[index];
      }
    });
  }
  return base.some((form, index) => form !== stem(verb) + endings[index]) ? base : null;
}

function subjuntivoPastStem(verb) {
  const simpleVerb = baseVerb(verb);
  const indefinido = irregularIndefinido(simpleVerb) || regularIndefinido(simpleVerb);
  return indefinido[5].replace(/ron$/, "");
}

function accentLastVowel(value) {
  return value.replace(/([aeiou])([^aeiou]*)$/i, (_, vowel, rest) => accentVowel(vowel) + rest);
}

function regularSubjuntivoImperfecto(verb) {
  const base = subjuntivoPastStem(verb);
  const endings = ["ra", "ras", "ra", "ramos", "rais", "ran"];
  return endings.map((ending, index) => (index === 3 ? accentLastVowel(base) : base) + ending);
}

function regularSubjuntivoFuturo(verb) {
  const base = subjuntivoPastStem(verb);
  const endings = ["re", "res", "re", "remos", "reis", "ren"];
  return endings.map((ending, index) => (index === 3 ? accentLastVowel(base) : base) + ending);
}

function compound(auxKey, verb) {
  return HABER_FORMS[auxKey].map((aux) => `${aux} ${participle(verb)}`);
}

function regularParticiplePattern(verb) {
  return stem(verb) + (verbType(verb) === "ar" ? "ado" : "ido");
}

function compoundPattern(auxKey, verb) {
  const regularParticiple = regularParticiplePattern(verb);
  return HABER_FORMS[auxKey].map((aux) => `${aux} ${regularParticiple}`);
}

function regularImperativoAfirmativo(verb) {
  if (isReflexive(verb)) return reflexiveImperativoAfirmativo(verb);
  const present = regularPresent(verb);
  const subj = regularSubjuntivoPresente(verb);
  return ["-", present[2], subj[2], subj[3], baseVerb(verb).slice(0, -1) + "d", subj[5]];
}

function regularImperativoAfirmativoPattern(verb) {
  const simpleVerb = baseVerb(verb);
  const present = regularPresentPattern(simpleVerb);
  const subj = regularSubjuntivoPresentePattern(simpleVerb);
  const forms = ["-", present[2], subj[2], subj[3], simpleVerb.slice(0, -1) + "d", subj[5]];
  return isReflexive(verb) ? attachReflexiveImperative(simpleVerb, forms) : forms;
}

function regularImperativoNegativoPattern(verb) {
  const forms = regularSubjuntivoPresentePattern(baseVerb(verb));
  if (isReflexive(verb)) {
    return forms.map((form, index) => index === 0 ? "-" : `no ${REFLEXIVE_PRONOUNS[index]} ${form}`);
  }
  return forms.map((form, index) => index === 0 ? "-" : `no ${form}`);
}

function reflexiveImperativoAfirmativo(verb) {
  const simpleVerb = baseVerb(verb);
  const simple = IRREGULARS[simpleVerb]?.imperativo_afirmativo || regularImperativoAfirmativo(simpleVerb);
  return attachReflexiveImperative(simpleVerb, simple);
}

function attachReflexiveImperative(simpleVerb, simple) {
  const attach = (form, pronoun) => addWrittenAccentForEnclitic(form, pronoun);
  const vosotros = simpleVerb === "ir"
    ? "idos"
    : simple[4].endsWith("d") ? simple[4].slice(0, -1) + "os" : attach(simple[4], "os");
  return [
    "-",
    attach(simple[1], "te"),
    attach(simple[2], "se"),
    attach(simple[3].replace(/s$/, ""), "nos"),
    vosotros,
    attach(simple[5], "se")
  ];
}

function reflexiveImperativoNegativo(verb) {
  const subj = regularSubjuntivoPresente(baseVerb(verb));
  return [
    "-",
    `no te ${subj[1]}`,
    `no se ${subj[2]}`,
    `no nos ${subj[3]}`,
    `no os ${subj[4]}`,
    `no se ${subj[5]}`
  ];
}

function addWrittenAccentForEnclitic(form, pronoun) {
  if (/[áéíóú]/.test(form)) return form + pronoun;
  const vowelGroups = [...form.matchAll(/[aeiouü]+/gi)];
  if (vowelGroups.length <= 1) return form + pronoun;
  const normalized = form.toLowerCase();
  const stressGroupIndex = /[aeiouns]$/.test(normalized)
    ? Math.max(0, vowelGroups.length - 2)
    : vowelGroups.length - 1;
  const group = vowelGroups[stressGroupIndex];
  const chars = group[0].split("");
  let offset = -1;
  for (let index = chars.length - 1; index >= 0; index -= 1) {
    if (/[aeo]/i.test(chars[index])) {
      offset = index;
      break;
    }
  }
  if (offset < 0) offset = chars.length - 1;
  const accentIndex = group.index + offset;
  return form.slice(0, accentIndex) + accentVowel(form[accentIndex]) + form.slice(accentIndex + 1) + pronoun;
}

function accentVowel(char) {
  return ({ a: "á", e: "é", i: "í", o: "ó", u: "ú", A: "Á", E: "É", I: "Í", O: "Ó", U: "Ú" })[char] || char;
}

function accentLastLetter(value, letter) {
  const index = value.lastIndexOf(letter);
  return index < 0 ? value : value.slice(0, index) + accentVowel(letter) + value.slice(index + 1);
}

function participle(verb) {
  const simpleVerb = baseVerb(verb);
  if (IRREGULARS[simpleVerb]?.participle) return IRREGULARS[simpleVerb].participle;
  const generated = generatedParticiple(simpleVerb);
  if (generated) return generated;
  return stem(simpleVerb) + (verbType(simpleVerb) === "ar" ? "ado" : "ido");
}

function gerund(verb) {
  if (isReflexive(verb)) return addWrittenAccentForEnclitic(gerund(baseVerb(verb)), "se");
  if (IRREGULARS[verb]?.gerund) return IRREGULARS[verb].gerund;
  const s = stem(verb);
  const type = verbType(verb);
  // -ir verbs with e->ie or e->i change e->i in gerundio
  if (type === "ir" && (hasStemChange(verb, "e", "ie") || hasStemChange(verb, "e", "i"))) {
    return stemChange(s, "e", "i") + "iendo";
  }
  // -ir verbs with o->ue change o->u in gerundio
  if (type === "ir" && hasStemChange(verb, "o", "ue")) {
    return stemChange(s, "o", "u") + "iendo";
  }
  // -uir verbs: y insertion (construir -> construyendo)
  if (verb.endsWith("uir") && !verb.endsWith("guir")) {
    return s + "yendo";
  }
  // -eer/-oir verbs: y insertion (creer -> creyendo, oir -> oyendo)
  if (verb.endsWith("eer") || verb.endsWith("oir")) {
    return s + "yendo";
  }
  return s + (type === "ar" ? "ando" : "iendo");
}

function irregularIndefinido(verb) {
  const irregular = IRREGULARS[verb]?.indefinido;
  if (irregular) return irregular;
  const stem = irregularIndefinidoStem(verb);
  if (stem) {
    const endings = stem.endsWith("j")
      ? ["e", "iste", "o", "imos", "isteis", "eron"]
      : ["e", "iste", "o", "imos", "isteis", "ieron"];
    return endings.map((ending) => stem + ending);
  }
  const vowelStem = vowelStemIndefinido(verb);
  if (vowelStem) return vowelStem;
  const thirdPerson = thirdPersonStemChangeIndefinido(verb);
  if (thirdPerson) return thirdPerson;
  return null;
}

function vowelStemIndefinido(verb) {
  const simpleVerb = baseVerb(verb);
  if (!/(aer|eer|oir)$/.test(simpleVerb)) return null;
  const root = stem(simpleVerb);
  return [
    root + "í",
    root + "íste",
    root + "yó",
    root + "ímos",
    root + "ísteis",
    root + "yeron"
  ];
}

function irregularIndefinidoStem(verb) {
  const patterns = [
    ["tener", "tuv"], ["venir", "vin"], ["poner", "pus"], ["decir", "dij"],
    ["traer", "traj"], ["ducir", "duj"]
  ];
  for (const [ending, replacement] of patterns) {
    if (verb.endsWith(ending)) {
      return verb.slice(0, -ending.length) + replacement;
    }
  }
  if (verb === "andar") return "anduv";
  if (verb === "caber") return "cup";
  if (verb === "querer") return "quis";
  if (verb === "saber") return "sup";
  if (verb === "hacer") return "hic";
  if (verb === "estar") return "estuv";
  if (verb === "poder") return "pud";
  return null;
}

function irregularFutureStem(verb) {
  const exact = {
    caber: "cabr",
    decir: "dir",
    haber: "habr",
    hacer: "har",
    poder: "podr",
    querer: "querr",
    saber: "sabr"
  };
  if (exact[verb]) return exact[verb];
  const patterns = [
    ["poner", "pondr"],
    ["salir", "saldr"],
    ["tener", "tendr"],
    ["valer", "valdr"],
    ["venir", "vendr"]
  ];
  for (const [ending, replacement] of patterns) {
    if (verb.endsWith(ending)) {
      return verb.slice(0, -ending.length) + replacement;
    }
  }
  // Compound verbs of hacer: deshacer, rehacer, etc.
  if (verb.endsWith("hacer")) {
    return verb.slice(0, -5) + "har";
  }
  return null;
}

function thirdPersonStemChangeIndefinido(verb) {
  if (!verb.endsWith("ir")) return null;
  const base = regularIndefinido(verb);
  // e->ie verbs that change to e->i in indefinido 3rd person
  const eieToEI = ["preferir", "sentir", "mentir", "convertir", "divertir", "advertir", "sugerir"];
  if (eieToEI.some((v) => verb.endsWith(v)) || hasStemChange(verb, "e", "i")) {
    const changed = stemChange(stem(verb), "e", "i");
    base[2] = changed + "ió";
    base[5] = changed + "ieron";
    return base;
  }
  if (hasStemChange(verb, "o", "u")) {
    const changed = stemChange(stem(verb), "o", "u");
    base[2] = changed + "ió";
    base[5] = changed + "ieron";
    return base;
  }
  if (verb.endsWith("uir")) {
    const root = stem(verb);
    base[2] = root + "yó";
    base[5] = root + "yeron";
    return base;
  }
  return null;
}

function orthographicIndefinido(verb) {
  if (!verb.endsWith("ar")) return null;
  if (verb.endsWith("car")) {
    const root = verb.slice(0, -3) + "qu";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];
  }
  if (verb.endsWith("gar")) {
    const root = verb.slice(0, -3) + "gu";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];
  }
  if (verb.endsWith("zar")) {
    const root = verb.slice(0, -3) + "c";
    return [root + "é", stem(verb) + "aste", stem(verb) + "ó", stem(verb) + "amos", stem(verb) + "asteis", stem(verb) + "aron"];
  }
  return null;
}

function generatedSubjuntivoPresente(verb) {
  if (IRREGULARS[verb]?.subjuntivo_presente) return IRREGULARS[verb].subjuntivo_presente;
  const a = ["a", "as", "a", "amos", "áis", "an"];
  const e = ["e", "es", "e", "emos", "éis", "en"];
  const make = (root, endings) => endings.map((ending) => root + ending);
  if (STRESSED_IAR_VERBS.has(verb)) {
    const regularStem = stem(verb);
    const stressedStem = accentLastLetter(regularStem, "i");
    return [stressedStem + "e", stressedStem + "es", stressedStem + "e", regularStem + "emos", regularStem + "éis", stressedStem + "en"];
  }
  if (STRESSED_UAR_VERBS.has(verb)) {
    const regularStem = stem(verb);
    const stressedStem = accentLastLetter(regularStem, "u");
    return [stressedStem + "e", stressedStem + "es", stressedStem + "e", regularStem + "emos", regularStem + "éis", stressedStem + "en"];
  }
  if (verb.endsWith("tener")) return make(verb.slice(0, -5) + "teng", a);
  if (verb.endsWith("poner")) return make(verb.slice(0, -5) + "pong", a);
  if (verb.endsWith("venir")) return make(verb.slice(0, -5) + "veng", a);
  if (verb.endsWith("salir")) return make(verb.slice(0, -5) + "salg", a);
  if (verb.endsWith("facer")) return make(verb.slice(0, -5) + "fag", a);
  if (verb.endsWith("hacer")) return make(verb.slice(0, -5) + "hag", a);
  if (verb.endsWith("decir")) return make(verb.slice(0, -5) + "dig", a);
  if (verb.endsWith("traer")) return make(verb.slice(0, -5) + "traig", a);
  if (verb.endsWith("caer")) return make(verb.slice(0, -4) + "caig", a);
  if (verb === "oir") return make("oig", a);
  if (verb.endsWith("valer")) return make(verb.slice(0, -5) + "valg", a);
  if (verb.endsWith("ducir")) return make(verb.slice(0, -3) + "zc", a);
  if (verb.endsWith("cer") || verb.endsWith("cir")) return make(verb.slice(0, -3) + "zc", a);
  if (verb.endsWith("ger") || verb.endsWith("gir")) {
    let root = verb.slice(0, -3) + "j";
    if (hasStemChange(verb, "e", "i")) root = stemChange(verb.slice(0, -3), "e", "i") + "j";
    return make(root, a);
  }
  if (verb.endsWith("guir")) {
    let root = verb.slice(0, -4) + "g";
    if (hasStemChange(verb, "e", "i")) root = stemChange(root, "e", "i");
    return make(root, a);
  }
  if (verb.endsWith("uir")) return make(stem(verb) + "y", a);
  // -guar verbs need diéresis (ü) in all subjuntivo forms
  if (verb.endsWith("guar")) {
    const root = verb.slice(0, -4) + "gü";
    return make(root, e);
  }
  if (verb.endsWith("gar") && hasStemChange(verb, "u", "ue")) {
    const baseRoot = verb.slice(0, -3); // "jug"
    const regularRoot = baseRoot + "gu"; // "jugu"
    const changedRoot = stemChange(baseRoot, "u", "ue") + "gu"; // "juegu"
    return [
      changedRoot + "e",
      changedRoot + "es",
      changedRoot + "e",
      regularRoot + "emos",
      regularRoot + "éis",
      changedRoot + "en"
    ];
  }
  if (verb.endsWith("gar") && (hasStemChange(verb, "e", "ie") || hasStemChange(verb, "o", "ue"))) {
    const baseRoot = verb.slice(0, -3);
    const regularRoot = baseRoot + "gu";
    const changedRoot = stemChange(baseRoot, hasStemChange(verb, "e", "ie") ? "e" : "o", hasStemChange(verb, "e", "ie") ? "ie" : "ue") + "gu";
    return [
      changedRoot + "e",
      changedRoot + "es",
      changedRoot + "e",
      regularRoot + "emos",
      regularRoot + "éis",
      changedRoot + "en"
    ];
  }
  if (verb.endsWith("car")) return make(verb.slice(0, -3) + "qu", e);
  if (verb.endsWith("gar")) return make(verb.slice(0, -3) + "gu", e);
  if (verb.endsWith("zar")) {
    // For -ar verbs with stem change, nosotros/vosotros keep regular stem
    let regularRoot = verb.slice(0, -3) + "c";
    let changedRoot = regularRoot;
    if (hasStemChange(verb, "e", "ie")) changedRoot = stemChange(regularRoot, "e", "ie");
    else if (hasStemChange(verb, "o", "ue")) changedRoot = stemChange(regularRoot, "o", "ue");
    return [
      changedRoot + "e",
      changedRoot + "es",
      changedRoot + "e",
      regularRoot + "emos",
      regularRoot + "éis",
      changedRoot + "en"
    ];
  }
  if (hasStemChange(verb, "e", "ie")) return regularSubjuntivoWithStemChange(verb, "e", "ie");
  if (hasStemChange(verb, "o", "ue")) return regularSubjuntivoWithStemChange(verb, "o", "ue");
  if (hasStemChange(verb, "e", "i")) return regularSubjuntivoWithStemChange(verb, "e", "i");
  if (hasStemChange(verb, "u", "ue")) return regularSubjuntivoWithStemChange(verb, "u", "ue");
  return null;
}

function regularSubjuntivoWithStemChange(verb, from, to) {
  const endings = tenseById("subjuntivo_presente").endings[verbType(verb)];
  return endings.map((ending, index) => {
    let root = stem(verb);
    if (index === 3 || index === 4) {
      // nosotros/vosotros: no stem change for -ar/-er verbs
      // for -ir verbs with e->ie or o->ue, change to e->i or o->u
      if (from === "e" && to === "i") root = stemChange(root, "e", "i");
      else if (from === "e" && to === "ie" && verb.endsWith("ir")) root = stemChange(root, "e", "i");
      else if (from === "o" && to === "ue" && verb.endsWith("ir")) root = stemChange(root, "o", "u");
      // for -ar/-er verbs, keep regular stem (no change)
    } else {
      root = stemChange(root, from, to);
    }
    return root + ending;
  });
}

function generatedParticiple(verb) {
  const participles = [
    ["satisfacer", "satisfecho"], ["absolver", "absuelto"],
    ["abrir", "abierto"], ["cubrir", "cubierto"], ["escribir", "escrito"],
    ["poner", "puesto"], ["volver", "vuelto"], ["resolver", "resuelto"],
    ["romper", "roto"], ["ver", "visto"], ["hacer", "hecho"], ["decir", "dicho"],
    ["morir", "muerto"], ["freir", "frito"], ["imprimir", "impreso"], ["pudrir", "podrido"],
    ["caer", "caído"], ["oir", "oído"], ["creer", "creído"], ["leer", "leído"],
    ["traer", "traído"], ["construir", "construido"], ["huir", "huido"]
  ];
  for (const [ending, form] of participles) {
    if (verb.endsWith(ending)) return verb.slice(0, -ending.length) + form;
  }
  return null;
}

const STEM_CHANGE_GROUPS = {
  "e:ie": ["tener", "venir", "pensar", "cerrar", "empezar", "comenzar", "querer", "entender", "perder", "defender", "encender", "tender", "ascender", "preferir", "sentir", "mentir", "convertir", "divertir", "advertir", "sugerir", "atravesar", "calentar", "apretar", "acertar", "tropezar", "sentar", "despertar", "negar", "regar", "gobernar", "recomendar", "sembrar", "temblar", "enterrar", "manifestar", "cegar", "helar", "serrar", "quebrar", "nevar"],
  "o:ue": ["poder", "dormir", "morir", "volver", "devolver", "resolver", "recordar", "acordar", "contar", "costar", "mostrar", "demostrar", "probar", "almorzar", "soñar", "sonar", "mover", "morder", "doler", "encontrar", "acostar", "apostar", "colgar", "forzar", "esforzar", "rogar", "rodar", "soltar", "volar", "poblar"],
  "e:i": ["decir", "pedir", "repetir", "servir", "vestir", "seguir", "conseguir", "perseguir", "elegir", "corregir", "competir", "impedir", "medir", "despedir", "reir", "sonreir", "freir", "rendir", "regir", "gemir", "concebir", "derretir"],
  "u:ue": ["jugar"]
};
const STEM_CHANGE_EXCEPTIONS = ["agregar", "entregar", "presentar", "representar", "ausentar"];
// RAE/DLE: modelos enviar y actuar. Solo se incluyen verbos comprobados en esos modelos.
const STRESSED_IAR_VERBS = new Set([
  "ampliar", "ansiar", "confiar", "criar", "desafiar", "desconfiar", "desviar",
  "enfriar", "enviar", "fiar", "guiar", "reenviar", "vaciar", "variar"
]);
const STRESSED_UAR_VERBS = new Set([
  "actuar", "acentuar", "continuar", "evaluar", "graduar", "situar"
]);

function hasStemChange(verb, from, to) {
  const b = baseVerb(verb);
  if (STEM_CHANGE_EXCEPTIONS.includes(b)) return false;
  return STEM_CHANGE_GROUPS[`${from}:${to}`]?.some((ending) => b.endsWith(ending));
}

function stemChange(value, from, to) {
  const index = value.lastIndexOf(from);
  if (index < 0) return value;
  return value.slice(0, index) + to + value.slice(index + from.length);
}

function formsFor(verb) {
  const reflexive = isReflexive(verb);
  const simpleVerb = baseVerb(verb);
  const irregular = IRREGULARS[verb] || IRREGULARS[simpleVerb] || {};
  const forms = {
    presente: irregular.presente || regularPresent(simpleVerb),
    perfecto: compound("presente", simpleVerb),
    indefinido: irregularIndefinido(simpleVerb) || regularIndefinido(simpleVerb),
    imperfecto: irregular.imperfecto || regularImperfecto(simpleVerb),
    pluscuamperfecto: compound("imperfecto", simpleVerb),
    preterito_anterior: compound("indefinido", simpleVerb),
    futuro: regularFuture(simpleVerb),
    futuro_perfecto: compound("futuro", simpleVerb),
    condicional: regularCondicional(simpleVerb),
    condicional_compuesto: compound("condicional", simpleVerb),
    subjuntivo_presente: irregular.subjuntivo_presente || regularSubjuntivoPresente(simpleVerb),
    subjuntivo_perfecto: compound("subjPresente", simpleVerb),
    subjuntivo_imperfecto: irregular.subjuntivo_imperfecto || regularSubjuntivoImperfecto(simpleVerb),
    subjuntivo_pluscuamperfecto: compound("subjImperfecto", simpleVerb),
    subjuntivo_futuro: regularSubjuntivoFuturo(simpleVerb),
    subjuntivo_futuro_perfecto: compound("subjFuturo", simpleVerb),
    imperativo_afirmativo: reflexive
      ? reflexiveImperativoAfirmativo(verb)
      : (irregular.imperativo_afirmativo || regularImperativoAfirmativo(simpleVerb)),
    imperativo_negativo: reflexive
      ? reflexiveImperativoNegativo(verb)
      : (irregular.subjuntivo_presente || regularSubjuntivoPresente(simpleVerb)).map((form, index) => index === 0 ? "-" : `no ${form}`),
    formas_no_personales: [verb, gerund(verb), participle(verb), "-", "-", "-"]
  };

  if (reflexive) {
    [
      "presente", "perfecto", "indefinido", "imperfecto", "pluscuamperfecto", "preterito_anterior",
      "futuro", "futuro_perfecto", "condicional", "condicional_compuesto", "subjuntivo_presente",
      "subjuntivo_perfecto", "subjuntivo_imperfecto", "subjuntivo_pluscuamperfecto",
      "subjuntivo_futuro", "subjuntivo_futuro_perfecto"
    ].forEach((tenseId) => {
      forms[tenseId] = prefixReflexivePronouns(forms[tenseId]);
    });
  }

  return forms;
}

const VERB_INFO_CACHE = new Map();

function verbInfo(verb) {
  if (VERB_INFO_CACHE.has(verb)) return VERB_INFO_CACHE.get(verb);
  const irregular = IRREGULARS[verb] || IRREGULARS[baseVerb(verb)];
  const typeLabel = isReflexive(verb) ? `-${verbType(verb)} -se` : `-${verbType(verb)}`;
  const info = {
    infinitive: verb,
    displayInfinitive: displayInfinitive(verb),
    ru: translationFor(verb),
    type: typeLabel,
    tags: irregular?.tags || generatedTags(verb),
    participle: participle(verb),
    gerund: gerund(verb),
    forms: formsFor(verb),
    irregular: Boolean(irregular),
    reflexive: isReflexive(verb)
  };
  VERB_INFO_CACHE.set(verb, info);
  return info;
}

function displayInfinitive(verb) {
  return DISPLAY_INFINITIVES[verb] || verb;
}

function translationFor(verb) {
  return IRREGULARS[verb]?.ru || TRANSLATIONS[verb] || "перевод отсутствует";
}

function generatedTags(verb) {
  const tags = ["правильный", ...verbExceptionLabels(verb)];
  if (isReflexive(verb)) tags.push("-se");
  return Array.from(new Set(tags));
}

function filteredVerbs() {
  const query = normalize(state.query);
  if (!query) {
    return COMMON_VERB_SUGGESTIONS.filter((verb) => BASE_VERBS.includes(verb));
  }
  const matches = BASE_VERBS
    .map((verb, index) => ({ verb, index, match: searchMatchFor(verb, query) }))
    .filter((item) => item.match)
    .sort((a, b) => a.match.score - b.match.score || a.index - b.index);
  const strictMatches = matches.filter((item) => item.match.score < 20);
  const visibleMatches = strictMatches.length > 0
    ? (strictMatches[0].match.score <= 2
      ? strictMatches.filter((item) => item.match.score === strictMatches[0].match.score)
      : strictMatches)
    : matches;
  return visibleMatches
    .map((item) => item.verb);
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 2) return 99;
  let prev = [];
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i - 1] === b[j - 1] ? prev[j - 1] : 1 + Math.min(prev[j - 1], prev[j], curr[j - 1]);
    }
    prev = curr;
  }
  return prev[n];
}

function searchMatchFor(verb, rawQuery) {
  const query = normalize(rawQuery);
  if (!query) return null;
  const info = verbInfo(verb);
  const infinitive = normalize(info.infinitive);
  const display = normalize(info.displayInfinitive);
  const ru = normalize(info.ru);
  const ruWords = normalizedWords(ru);

  if (infinitive === query || display === query) {
    return { score: 0, reason: "Точное совпадение по инфинитиву" };
  }

  const exactForm = findFormMatch(info, query, "exact");
  if (exactForm) {
    return { score: 1, reason: formMatchReason(exactForm) };
  }

  if (ru === query) {
    return { score: 2, reason: "Точное совпадение по русскому переводу" };
  }

  if (infinitive.startsWith(query) || display.startsWith(query)) {
    return { score: 3, reason: "Инфинитив начинается с запроса" };
  }

  if (ruWords.some((word) => word === query || word.startsWith(query))) {
    return { score: 4, reason: "Русский перевод начинается с запроса" };
  }

  if (query.length >= 3) {
    const prefixForm = findFormMatch(info, query, "prefix");
    if (prefixForm) return { score: 5, reason: formMatchReason(prefixForm) };
    if (infinitive.includes(query) || display.includes(query)) {
      return { score: 6, reason: "Запрос входит в инфинитив" };
    }
    if (ru.includes(query)) {
      return { score: 7, reason: "Запрос входит в русский перевод" };
    }
  }

  if (query.length >= 4) {
    const partialForm = findFormMatch(info, query, "contains");
    if (partialForm) return { score: 8, reason: formMatchReason(partialForm) };
  }

  if (query.length >= 4 && /^[a-z]+$/.test(query)) {
    const distance = Math.min(levenshtein(query, infinitive), levenshtein(query, display));
    const limit = query.length >= 5 ? 2 : 1;
    if (distance <= limit) return { score: 20 + distance, reason: "Возможно, опечатка в инфинитиве" };
  }

  if (query.length >= 5 && /[а-яё]/.test(query)) {
    const distance = Math.min(...ruWords.map((word) => levenshtein(query, word)));
    if (distance <= 1) return { score: 23, reason: "Возможно, опечатка в переводе" };
  }

  return null;
}

function normalize(value) {
  return String(value).trim().replace(/\s+/g, " ").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function normalizedWords(value) {
  return normalize(value)
    .split(/[\s,;/()]+/)
    .filter(Boolean);
}

function formMatchReason(match) {
  return `Найдено по форме: ${match.form} = ${match.person}, ${match.tense}`;
}

function saveCards() {
  localStorage.setItem("msg:cards", JSON.stringify(state.cards));
}

function toggleCard(verb) {
  const wasSaved = state.cards.includes(verb);
  state.cards = wasSaved
    ? state.cards.filter((item) => item !== verb)
    : [...state.cards, verb];
  state.cardFeedback = { verb, added: !wasSaved };
  saveCards();
  render();
  window.setTimeout(() => {
    if (state.cardFeedback?.verb === verb) {
      state.cardFeedback = null;
      render();
    }
  }, 900);
}

function rememberRecentVerb(verb) {
  const recent = Array.isArray(state.recentVerbs) ? state.recentVerbs : [];
  state.recentVerbs = [verb, ...recent.filter((item) => item !== verb && BASE_VERBS.includes(item))].slice(0, 8);
  localStorage.setItem("msg:recentVerbs", JSON.stringify(state.recentVerbs));
}

function selectVerb(verb, { keepReturnQuery = true, updateRoute = true } = {}) {
  const sourceQuery = String(state.query).trim();
  state.previousVerbQuery = keepReturnQuery && sourceQuery && normalize(sourceQuery) !== normalize(verb)
    ? sourceQuery
    : null;
  state.view = "verbs";
  state.selectedVerb = verb;
  state.verbCardMode = "basic";
  state.query = verb;
  rememberRecentVerb(verb);
  syncActiveTab("verbs");
  renderVerbs();
  if (updateRoute) updateRouteHash(`verb-${encodeURIComponent(verb)}`);
  scrollToCard("content");
}

function resetVerbLanding() {
  state.view = "verbs";
  state.query = "";
  state.selectedVerb = null;
  state.previousVerbQuery = null;
  state.verbCardMode = "basic";
}

function setView(view, { updateRoute = true } = {}) {
  if (view !== "cards") clearQuizHotkeys();
  if (view === "verbs") {
    resetVerbLanding();
  } else {
    state.view = view;
  }
  syncActiveTab(view);
  render();
  if (updateRoute) updateRouteHash(view);
}

function renderVerbCard(verb) {
  const template = $(SELECTORS.verbTemplate);
  const node = template.content.firstElementChild.cloneNode(true);
  const info = verbInfo(verb);
  node.querySelector("h2").textContent = info.displayInfinitive;
  node.querySelector("h2").lang = "es";
  node.querySelector(".muted").textContent = info.ru;

  const favoriteButton = node.querySelector(".favorite-button");
  favoriteButton.textContent = state.cards.includes(verb) ? "★" : "☆";
  favoriteButton.setAttribute("aria-label", state.cards.includes(verb) ? "Убрать из избранного" : "Добавить в избранное");
  favoriteButton.title = "Избранное";
  favoriteButton.classList.toggle("is-card-feedback", state.cardFeedback?.verb === verb);
  favoriteButton.addEventListener("click", () => toggleCard(verb));

  if (state.previousVerbQuery) {
    const returnButton = document.createElement("button");
    returnButton.className = "small-button return-results-button";
    returnButton.type = "button";
    returnButton.textContent = `← К результатам: «${state.previousVerbQuery}»`;
    returnButton.addEventListener("click", () => {
      state.query = state.previousVerbQuery;
      state.previousVerbQuery = null;
      state.selectedVerb = null;
      state.verbCardMode = "basic";
      updateRouteHash("verbs");
      renderVerbs();
      scrollToCard("content");
      requestAnimationFrame(() => document.getElementById("searchInput")?.focus());
    });
    node.querySelector(".card-head").insertAdjacentElement("afterend", returnButton);
  }

  const chips = node.querySelector(".chips");
  chips.insertAdjacentHTML("beforebegin", verbPassport(info));

  const line = node.querySelector(".forms-line");
  [
    ["Gerundio", info.gerund],
    ["Participio", info.participle]
  ].forEach(([label, value]) => {
    const item = document.createElement("div");
    item.innerHTML = `<dt>${label}</dt><dd lang="es">${value}</dd>`;
    line.appendChild(item);
  });

  const wrap = node.querySelector(".table-wrap");
  const activeTenseIds = state.verbCardMode === "all"
    ? VERB_TENSE_GROUPS.flatMap((group) => group.tenseIds)
    : MAIN_VERB_TENSE_IDS;
  wrap.insertAdjacentHTML("beforebegin", `
    <div class="verb-table-toolbar">
      <div class="verb-card-tabs" aria-label="Режим карточки глагола">
        <button class="small-button ${state.verbCardMode === "basic" ? "is-active" : ""}" type="button" data-verb-mode="basic" aria-pressed="${state.verbCardMode === "basic"}">Основные</button>
        <button class="small-button ${state.verbCardMode === "all" ? "is-active" : ""}" type="button" data-verb-mode="all" aria-pressed="${state.verbCardMode === "all"}">Все времена</button>
      </div>
      ${hasIrregularFormsInTenses(info, activeTenseIds) ? `<span class="irregular-legend">Формы не по шаблону</span>` : ""}
    </div>
  `);
  node.querySelectorAll("[data-verb-mode]").forEach((button) => {
    button.addEventListener("click", () => {
      state.verbCardMode = button.dataset.verbMode;
      renderVerbs();
      scrollToCard("content");
    });
  });
  if (state.verbCardMode === "all") {
    wrap.classList.add("verb-tense-groups");
    VERB_TENSE_GROUPS.forEach((group, index) => {
      const details = document.createElement("details");
      details.className = "verb-tense-group";
      details.open = index === 0;
      details.innerHTML = `<summary><span>${group.title}</span><small>${group.tenseIds.length} ${pluralizeTenses(group.tenseIds.length)}</small></summary>`;
      details.appendChild(conjugationTable(info, group.tenseIds));
      wrap.appendChild(details);
    });
  } else {
    wrap.appendChild(conjugationTable(info, MAIN_VERB_TENSE_IDS));
  }
  return node;
}

function hasIrregularFormsInTenses(info, tenseIds) {
  return tenseIds.some((tenseId) => (info.forms[tenseId] || []).some((form, index) => isIrregularForm(info.infinitive, tenseId, form, index)));
}

function pluralizeTenses(count) {
  if (count % 10 === 1 && count % 100 !== 11) return "время";
  if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return "времени";
  return "времён";
}

function verbPassport(info) {
  const verb = info.infinitive;
  const reflexive = isReflexive(verb);
  const rawTags = info.tags || [];
  const badges = [];

  if (reflexive) {
    badges.push(`<span class="badge-reflexive" title="Возвратный глагол">-se</span>`);
  }

  const status = rawTags.includes("полностью неправильный")
    ? "полностью неправильный"
    : hasIrregularBehavior(info)
      ? "неправильный"
      : "правильный";

  const exceptions = verbExceptionLabels(verb);
  const tooltip = exceptions.length > 0 ? exceptions.join(" · ") : status;

  if (status === "правильный") {
    badges.push(`<span class="badge-regular" title="Правильный глагол">правильный</span>`);
  } else if (status === "полностью неправильный") {
    badges.push(`<span class="badge-special" title="${escapeHTML(tooltip)}">полностью неправильный</span>`);
  } else {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">неправильный</span>`);
  }

  if (rawTags.includes("вспомогательный")) {
    badges.push(`<span title="Вспомогательный глагол">вспомогательный</span>`);
  }

  return `<div class="verb-passport">${badges.join("")}</div>`;
}

function hasYoIrregular(verb) {
  const forms = formsFor(verb).presente;
  const regular = regularPresentPattern(verb);
  return Boolean(forms?.[0] && regular?.[0] && normalize(forms[0]) !== normalize(regular[0]));
}

function hasFullPresentIrregular(verb) {
  const forms = formsFor(verb).presente || [];
  const regular = regularPresentPattern(verb);
  const different = forms.filter((form, index) => regular[index] && normalize(form) !== normalize(regular[index])).length;
  return different >= 4 && !hasStemChange(verb, "e", "ie") && !hasStemChange(verb, "o", "ue") && !hasStemChange(verb, "e", "i") && !hasStemChange(verb, "u", "ue");
}

function hasSpecialSubjuntivo(verb) {
  const forms = formsFor(verb).subjuntivo_presente || [];
  const regular = regularSubjuntivoPresentePattern(verb);
  return forms.some((form, index) => regular[index] && normalize(form) !== normalize(regular[index]));
}

function hasIrregularParticiple(verb) {
  return normalize(participle(verb)) !== normalize(regularParticiplePattern(verb));
}

function hasThirdPersonIndefinidoChange(verb) {
  return Boolean(thirdPersonStemChangeIndefinido(verb));
}

function hasVowelStemIndefinidoChange(verb) {
  return Boolean(vowelStemIndefinido(verb));
}

function hasIndefinidoSpecialStem(verb) {
  return Boolean(IRREGULARS[verb]?.indefinido || irregularIndefinidoStem(verb));
}

function hasOrthographicIndefinidoChange(verb) {
  return Boolean(orthographicIndefinido(verb));
}

function hasCompletelyIrregularProfile(verb) {
  return ["ser", "ir"].includes(baseVerb(verb));
}

function verbExceptionLabels(verb) {
  const simpleVerb = baseVerb(verb);
  const labels = [];
  if (hasCompletelyIrregularProfile(simpleVerb)) labels.push("полностью особые формы");
  if (hasFullPresentIrregular(simpleVerb)) labels.push("presente: особые формы");
  else if (hasYoIrregular(simpleVerb)) labels.push("yo: особая форма");
  if (hasStemChange(simpleVerb, "e", "ie")) labels.push("смена корня: e → ie");
  if (hasStemChange(simpleVerb, "o", "ue")) labels.push("смена корня: o → ue");
  if (hasStemChange(simpleVerb, "e", "i")) labels.push("смена корня: e → i");
  if (hasStemChange(simpleVerb, "u", "ue")) labels.push("смена корня: u → ue");
  if (hasIndefinidoSpecialStem(simpleVerb)) labels.push("indefinido: особая основа");
  else if (hasThirdPersonIndefinidoChange(simpleVerb)) labels.push("indefinido: 3-е лицо меняет корень");
  else if (hasVowelStemIndefinidoChange(simpleVerb)) labels.push("indefinido: í/y после гласной");
  else if (hasOrthographicIndefinidoChange(simpleVerb)) labels.push("indefinido: орфографическая замена");
  if (irregularFutureStem(simpleVerb)) labels.push("futuro/condicional: особая основа");
  if (hasSpecialSubjuntivo(simpleVerb)) labels.push("subjuntivo: особая форма");
  if (hasIrregularParticiple(simpleVerb)) labels.push("participio: особая форма");
  return Array.from(new Set(labels));
}

function regularFormsForComparison(verb, tenseId) {
  const compoundAux = COMPOUND_TENSE_AUX[tenseId];
  if (compoundAux) {
    const forms = compoundPattern(compoundAux, baseVerb(verb));
    return isReflexive(verb) ? prefixReflexivePronouns(forms) : forms;
  }
  const map = {
    presente: regularPresentPattern,
    indefinido: regularIndefinidoPattern,
    imperfecto: regularImperfecto,
    futuro: regularFuturePattern,
    condicional: regularCondicionalPattern,
    subjuntivo_presente: regularSubjuntivoPresentePattern,
    subjuntivo_imperfecto: regularSubjuntivoImperfecto,
    subjuntivo_futuro: regularSubjuntivoFuturo,
    imperativo_afirmativo: regularImperativoAfirmativoPattern,
    imperativo_negativo: regularImperativoNegativoPattern,
    formas_no_personales: (item) => {
      const regularGerund = stem(item) + (verbType(item) === "ar" ? "ando" : "iendo");
      return [
        item,
        isReflexive(item) ? addWrittenAccentForEnclitic(regularGerund, "se") : regularGerund,
        regularParticiplePattern(item),
        "-", "-", "-"
      ];
    }
  };
  const forms = map[tenseId]?.(verb) || null;
  if (!forms || !isReflexive(verb) || tenseId.startsWith("imperativo_") || tenseId === "formas_no_personales") return forms;
  return prefixReflexivePronouns(forms);
}

function isIrregularForm(verb, tenseId, form, index) {
  if (form === "-") return false;
  const regularForms = regularFormsForComparison(verb, tenseId);
  if (!regularForms?.[index]) return false;
  return normalize(form) !== normalize(regularForms[index]);
}

function searchSuggestions(rawQuery) {
  const query = normalize(rawQuery);
  if (query.length < 4) return COMMON_VERB_SUGGESTIONS.slice(0, 5);
  const isRussian = /[а-яё]/.test(query);
  const candidates = BASE_VERBS.map((verb, index) => {
    const info = verbInfo(verb);
    const targets = isRussian
      ? normalizedWords(info.ru)
      : [normalize(info.infinitive), normalize(info.displayInfinitive)];
    const distance = Math.min(...targets.map((target) => levenshtein(query, target)));
    return { verb, index, distance };
  })
    .filter((item) => item.distance <= 2)
    .sort((a, b) => a.distance - b.distance || a.index - b.index)
    .slice(0, 5)
    .map((item) => item.verb);
  return candidates.length > 0 ? candidates : COMMON_VERB_SUGGESTIONS.slice(0, 5);
}

function verbListBadges(info) {
  const verb = info.infinitive;
  const reflexive = isReflexive(verb);
  const badges = [];

  if (reflexive) {
    badges.push(`<span class="badge-reflexive" title="Возвратный глагол">-se</span>`);
  }

  if (!hasIrregularBehavior(info)) {
    badges.push(`<span class="badge-regular" title="Правильный глагол">прав.</span>`);
    return badges;
  }

  const exceptions = verbExceptionLabels(verb);
  const tooltip = exceptions.length > 0 ? exceptions.join(" · ") : "Неправильный";

  if (hasCompletelyIrregularProfile(verb)) {
    badges.push(`<span class="badge-special" title="${escapeHTML(tooltip)}">особый</span>`);
  } else if (
    hasStemChange(verb, "e", "ie") ||
    hasStemChange(verb, "o", "ue") ||
    hasStemChange(verb, "e", "i") ||
    hasStemChange(verb, "u", "ue")
  ) {
    const changes = [];
    if (hasStemChange(verb, "e", "ie")) changes.push("e→ie");
    if (hasStemChange(verb, "o", "ue")) changes.push("o→ue");
    if (hasStemChange(verb, "e", "i")) changes.push("e→i");
    if (hasStemChange(verb, "u", "ue")) changes.push("u→ue");
    badges.push(`<span class="badge-stem" title="${escapeHTML(tooltip)}">смена ${changes.join(", ")}</span>`);
  } else if (hasIndefinidoSpecialStem(verb) || irregularFutureStem(verb)) {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">особая основа</span>`);
  } else if (hasYoIrregular(verb)) {
    badges.push(`<span class="badge-yo" title="${escapeHTML(tooltip)}">yo особ.</span>`);
  } else if (hasIrregularParticiple(verb)) {
    badges.push(`<span class="badge-part" title="${escapeHTML(tooltip)}">part.</span>`);
  } else {
    badges.push(`<span class="badge-irregular" title="${escapeHTML(tooltip)}">неправ.</span>`);
  }

  return badges;
}

function searchMatchReason(info) {
  const query = normalize(state.query);
  if (!query) return "";
  return searchMatchFor(info.infinitive, query)?.reason || "";
}

function findFormMatch(info, query, mode = "exact") {
  for (const tense of TENSES) {
    const forms = info.forms[tense.id] || [];
    const index = forms.findIndex((form) => {
      const n = normalize(form);
      if (!n || n === "-") return false;
      if (mode === "prefix") return n.startsWith(query);
      if (mode === "contains") return n.includes(query);
      return n === query;
    });
    if (index >= 0) {
      const nonPersonalLabels = ["infinitivo", "gerundio", "participio"];
      const person = tense.id === "formas_no_personales"
        ? (nonPersonalLabels[index] || "forma no personal")
        : (PEOPLE[index] || "forma");
      return { form: forms[index], person, tense: tense.name };
    }
  }
  return null;
}

function highlightSearchMatch(value) {
  const source = String(value);
  const query = normalize(state.query);
  if (!query) return escapeHTML(source);
  const normalizedSource = normalize(source);
  const start = normalizedSource.indexOf(query);
  if (start === -1) return escapeHTML(source);
  const end = start + query.length;
  return [
    escapeHTML(source.slice(0, start)),
    `<mark class="search-mark">${escapeHTML(source.slice(start, end))}</mark>`,
    escapeHTML(source.slice(end))
  ].join("");
}



function hasIrregularBehavior(info) {
  return Boolean(
    info.irregular ||
    verbExceptionLabels(info.infinitive).length > 0 ||
    info.tags.some((tag) => tag.includes("неправильный"))
  );
}
